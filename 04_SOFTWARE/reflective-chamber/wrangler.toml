name = "reflective-chamber"
main = "src/index.ts"
compatibility_date = "2026-04-04"
workers_dev = true

# Cloudflare Workflow trigger
[triggers]
crons = ["0 23 * * 0"]  # Sunday 11pm ET

# D1 for telemetry query
[[d1_databases]]
binding = "DB"
database_name = "p31-telemetry"
database_id = "REPLACE_WITH_ACTUAL_ID"

# DO for synthesis persistence
[[durable_objects.bindings]]
name = "OPERATOR_STATE"
class_name = "OperatorState"

[vars]
MASKING_COST_THRESHOLD = "5"
WEEKLY_CHECKIN_ENABLED = "true"