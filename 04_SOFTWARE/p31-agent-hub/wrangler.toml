name = "p31-agent-hub"
main = "src/index.js"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]

# Service Bindings — K₄ Delta mesh
[[services]]
binding = "K4_CAGE"
service = "k4-cage"

[[services]]
binding = "K4_PERSONAL"
service = "k4-personal"

[[services]]
binding = "K4_HUBS"
service = "k4-hubs"

[[services]]
binding = "P31_BOUNCER"
service = "p31-bouncer"

# Workers AI
[ai]
binding = "AI"

# Durable Objects — conversation memory
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentSession"]