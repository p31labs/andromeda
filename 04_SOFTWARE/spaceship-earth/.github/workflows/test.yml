name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check · Unit tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            04_SOFTWARE/spaceship-earth/package-lock.json
            04_SOFTWARE/packages/shared/package-lock.json

      - name: Install shared package
        working-directory: 04_SOFTWARE/packages/shared
        run: npm ci

      - name: Install spaceship-earth
        working-directory: 04_SOFTWARE/spaceship-earth
        run: npm ci

      - name: TypeScript — type check
        working-directory: 04_SOFTWARE/spaceship-earth
        run: npx tsc --noEmit

      - name: Vitest — unit tests
        working-directory: 04_SOFTWARE/spaceship-earth
        run: npm test -- --reporter=verbose

      - name: Vite — production build
        working-directory: 04_SOFTWARE/spaceship-earth
        run: npm run build
        env:
          # Relay URL intentionally absent in CI — relay features are no-ops
          VITE_RELAY_URL: ''
