version: '3.8'

services:
  p31-discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p31-discord-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - p31-network

networks:
  p31-network:
    driver: bridge