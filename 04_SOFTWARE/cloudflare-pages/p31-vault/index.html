// ─── HELPERS ─────────────────────────────────────────────────────────────────

function hashBlock(index, ts, payload, prevHash) {
  const raw = `${index}${ts}${payload}${prevHash}`
  let h = 0
  for (let i = 0; i < raw.length; i++) {
    h = ((h << 5) - h + raw.charCodeAt(i)) | 0
  }
  const hex = Math.abs(h).toString(16).padStart(8, '0').toUpperCase()
  return `P31${hex}${Date.now().toString(16).toUpperCase().slice(-8)}`
}

function shortUrl(url) {
  try {
    const u = new URL(url)
    return u.hostname + (u.pathname !== '/' ? u.pathname.slice(0, 12) + '…' : '')
  } catch {
    return url.slice(0, 24) + '…'
  }
}

function fmtTs(iso) {
  const d = new Date(iso)
  return d.toLocaleTimeString('en-US', { hour12: false }) + ' UTC'
}

function useBreathing() {
  // 4-2-6 cycle: inhale 4s, hold 2s, exhale 6s = 12s total
  const PHASES = [
    { name: 'INHALE', duration: 4 },
    { name: 'HOLD',   duration: 2 },
    { name: 'EXHALE', duration: 6 },
  ]

  const [phaseIdx, setPhaseIdx] = useState(0)
  const [timer, setTimer] = useState(PHASES[0].duration)
  const [pulse, setPulse] = useState(false)
  const [cycleCount, setCycleCount] = useState(0)
  const timerRef = useRef(null)

  useEffect(() => {
    timerRef.current = setInterval(() => {
      setTimer(prev => {
        if (prev <= 1) {
          setPhaseIdx(idx => {
            const next = (idx + 1) % 3
            // exhale start = index 2
            if (next === 2) {
              try { navigator.vibrate([100, 50, 100]) } catch {}
            }
            // full cycle completes when we loop back to 0
            if (next === 0) {
              setCycleCount(c => c + 1)
            }
            setPulse(p => !p)
            return next
          })
          return PHASES[(phaseIdx + 1) % 3].duration
        }
        return prev - 1
      })
    }, 1000)
    return () => clearInterval(timerRef.current)
  }, [phaseIdx])

  const phase = PHASES[phaseIdx].name
  return { phase, timer, pulse, cycleCount }
}

function useFleetStatus() {
  const [nodeStatus, setNodeStatus] = useState({})
  const [commandData, setCommandData] = useState(null)
  const [lastSync, setLastSync] = useState(null)
  const pingIntervalRef = useRef(null)

  const pingNode = useCallback(async (node) => {
    const start = performance.now()
    try {
      const resp = await fetch(node.url, {
        method: 'HEAD',
        mode: 'cors',
        signal: AbortSignal.timeout(5000),
      })
      const latencyMs = Math.round(performance.now() - start)
      return { online: resp.ok || resp.status < 500, latencyMs, statusCode: resp.status }
    } catch {
      // Try GET as fallback for HEAD-unfriendly endpoints
      try {
        const resp2 = await fetch(node.url, {
          method: 'GET',
          mode: 'cors',
          signal: AbortSignal.timeout(5000),
        })
        const latencyMs = Math.round(performance.now() - start)
        return { online: true, latencyMs, statusCode: resp2.status }
      } catch {
        const latencyMs = Math.round(performance.now() - start)
        return { online: false, latencyMs: latencyMs > 5000 ? 5000 : latencyMs, statusCode: 0 }
      }
    }
  }, [])

  const fetchCommandStatus = useCallback(async () => {
    try {
      const resp = await fetch(ENDPOINTS.commandStatus, {
        method: 'GET',
        mode: 'cors',
        signal: AbortSignal.timeout(5000),
      })
      if (resp.ok) {
        const data = await resp.json()
        setCommandData(data)
      }
    } catch {
      // silent
    }
  }, [])

  const pingAll = useCallback(async () => {
    const results = await Promise.all(
      FLEET_NODES.map(async (node) => {
        const status = await pingNode(node)
        return [node.id, status]
      })
    )
    const statusMap = Object.fromEntries(results)
    setNodeStatus(statusMap)
    setLastSync(Date.now())
  }, [pingNode])

  const refresh = useCallback(() => {
    pingAll()
    fetchCommandStatus()
  }, [pingAll, fetchCommandStatus])

  useEffect(() => {
    refresh()
    pingIntervalRef.current = setInterval(pingAll, 30000)
    return () => clearInterval(pingIntervalRef.current)
  }, [refresh, pingAll])

  const onlineCount = Object.values(nodeStatus).filter(s => s?.online).length

  return { nodeStatus, commandData, onlineCount, lastSync, refresh }
}

function useLedger() {
  const [blocks, setBlocks] = useState([GENESIS_BLOCK])

  const mint = useCallback(async (payload) => {
    const ts = new Date().toISOString()
    const prevBlock = blocks[blocks.length - 1] || GENESIS_BLOCK

    const newBlock = {
      index: prevBlock.index + 1,
      ts,
      payload: payload || CARE_PAYLOADS[Math.floor(Math.random() * CARE_PAYLOADS.length)],
      hash: hashBlock(prevBlock.index + 1, ts, payload || '', prevBlock.hash),
      confirmed: false,
      local: false,
    }

    setBlocks(prev => [...prev, newBlock])

    try {
      const resp = await fetch(`${ENDPOINTS.bondingRelay}/room/love-ledger`, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'CARE_EVENT',
          payload: newBlock.payload,
          hash: newBlock.hash,
          ts: newBlock.ts,
        }),
        signal: AbortSignal.timeout(5000),
      })
      setBlocks(prev =>
        prev.map(b => b.hash === newBlock.hash ? { ...b, confirmed: resp.ok } : b)
      )
    } catch {
      setBlocks(prev =>
        prev.map(b => b.hash === newBlock.hash ? { ...b, confirmed: false, local: true } : b)
      )
    }
  }, [blocks])

  return { blocks, mint }
}

function useMesh() {
  const peerIdRef = useRef(`P31-${Math.random().toString(36).substring(2, 8).toUpperCase()}`)
  const [packets, setPackets] = useState([])
  const [relayConnected, setRelayConnected] = useState(false)
  const [roomId] = useState(`vault-${Date.now().toString(36).toUpperCase()}`)
  const animFrameRef = useRef(null)
  const packetIdRef = useRef(0)

  // Paths: 3 distinct routes
  const PATHS = [
    { from: [50, 30],  to: [80, 70],  via: [65, 50],  color: '#06b6d4' },
    { from: [50, 30],  to: [20, 70],  via: [35, 50],  color: '#22c55e' },
    { from: [20, 70],  to: [80, 70],  via: [50, 90],  color: '#a855f7' },
  ]

  // Simulate packet animation
  useEffect(() => {
    let lastTime = 0
    const INTERVAL = 600

    const tick = (time) => {
      if (time - lastTime > INTERVAL) {
        lastTime = time
        const path = PATHS[packetIdRef.current % 3]
        const id = packetIdRef.current++
        setPackets(prev => [
          ...prev.slice(-30),
          { id, path, progress: 0, ts: Date.now() },
        ])
      }

      setPackets(prev =>
        prev
          .map(p => ({ ...p, progress: p.progress + 0.025 }))
          .filter(p => p.progress <= 1)
      )

      animFrameRef.current = requestAnimationFrame(tick)
    }

    animFrameRef.current = requestAnimationFrame(tick)
    return () => cancelAnimationFrame(animFrameRef.current)
  }, [])

  // Attempt relay registration
  useEffect(() => {
    const register = async () => {
      try {
        const resp = await fetch(`${ENDPOINTS.bondingRelay}/room/${roomId}`, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ peerId: peerIdRef.current, ts: Date.now() }),
          signal: AbortSignal.timeout(5000),
        })
        setRelayConnected(resp.ok || resp.status === 409)
      } catch {
        setRelayConnected(false)
      }
    }
    register()
  }, [roomId])

  const totalPackets = packets.length + packetIdRef.current

  return {
    peerId: peerIdRef.current,
    packets,
    relayConnected,
    roomId,
    totalPackets,
    PATHS,
  }
}

// ─── TAB 3: MESH LOOM ────────────────────────────────────────────────────────

function PacketDot({ packet }) {
  const { path, progress } = packet
  // Quadratic bezier interpolation
  const t = progress
  const x = (1 - t) * (1 - t) * path.from[0] + 2 * (1 - t) * t * path.via[0] + t * t * path.to[0]
  const y = (1 - t) * (1 - t) * path.from[1] + 2 * (1 - t) * t * path.via[1] + t * t * path.to[1]

  return (
    <circle
      cx={`${x}%`}
      cy={`${y}%`}
      r={3}
      fill={path.color}
      style={{ filter: `drop-shadow(0 0 5px ${path.color})` }}
    />
  )
}

function TabMeshLoom({ peerId, packets, relayConnected, roomId, totalPackets, PATHS, nodeStatus }) {
  const [copied, setCopied] = useState(false)
  const [connectInput, setConnectInput] = useState('')
  const [handshakeStatus, setHandshakeStatus] = useState(null)
  const bondingOnline = nodeStatus['bonding-relay']?.online

  const copyPeerId = useCallback(async () => {
    try {
      await navigator.clipboard.writeText(peerId)
      setCopied(true)
      setTimeout(() => setCopied(false), 2000)
    } catch {
      // silent
    }
  }, [peerId])

  const simulateHandshake = useCallback(() => {
    if (!connectInput.trim()) return
    setHandshakeStatus('connecting')
    setTimeout(() => {
      setHandshakeStatus(connectInput.startsWith('P31-') ? 'success' : 'failed')
      setTimeout(() => setHandshakeStatus(null), 3000)
    }, 1200)
  }, [connectInput])

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Peer ID */}
      <GlassCard>
        <Label>Your Peer ID</Label>
        <div style={{
          display: 'flex',
          alignItems: 'center',
          gap: 8,
          marginTop: 8,
          background: 'rgba(0,0,0,0.5)',
          borderRadius: 8,
          padding: '8px 12px',
          border: '1px solid #164e63',
        }}>
          <span style={{
            flex: 1,
            fontFamily: 'monospace',
            fontSize: '1rem',
            color: '#06b6d4',
            letterSpacing: '0.15em',
            fontWeight: 700,
          }}>
            {peerId}
          </span>
          <button
            onClick={copyPeerId}
            style={{
              background: 'none',
              border: 'none',
              cursor: 'pointer',
              color: copied ? '#22c55e' : '#475569',
              padding: 4,
              display: 'flex',
              alignItems: 'center',
              transition: 'color 0.2s',
            }}
          >
            {copied ? <Check size={16} /> : <Copy size={16} />}
          </button>
        </div>

        {/* Relay status */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 10 }}>
          <OnlineDot online={relayConnected && bondingOnline} color="#22c55e" />
          <span style={{
            fontFamily: 'monospace',
            fontSize: '0.62rem',
            color: (relayConnected && bondingOnline) ? '#22c55e' : '#ef4444',
            letterSpacing: '0.1em',
          }}>
            RELAY: BONDING-RELAY {(relayConnected && bondingOnline) ? '✓ LIVE' : '✗ OFFLINE'}
          </span>
        </div>
      </GlassCard>

      {/* Packet animation */}
      <GlassCard>
        <Label>Packet Flow — 3-Path Distributed Routing</Label>
        <div style={{ position: 'relative', height: 140, marginTop: 12, borderRadius: 8, overflow: 'hidden', background: 'rgba(0,0,0,0.4)' }}>
          <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
            {/* Path curves */}
            {PATHS.map((path, i) => (
              <path
                key={i}
                d={`M ${path.from[0]}% ${path.from[1]}% Q ${path.via[0]}% ${path.via[1]}% ${path.to[0]}% ${path.to[1]}%`}
                fill="none"
                stroke={path.color}
                strokeWidth="0.5"
                opacity={0.25}
              />
            ))}
            {/* Packets */}
            {packets.map(p => <PacketDot key={p.id} packet={p} />)}
            {/* Node endpoints */}
            {[[50, 30], [80, 70], [20, 70]].map(([x, y], i) => (
              <circle key={i} cx={`${x}%`} cy={`${y}%`} r={4} fill="#050510" stroke="#06b6d4" strokeWidth={1} />
            ))}
          </svg>
        </div>
        <div style={{
          marginTop: 8,
          fontFamily: 'monospace',
          fontSize: '0.6rem',
          color: '#475569',
          letterSpacing: '0.1em',
        }}>
          {totalPackets} PACKETS ROUTED
        </div>
      </GlassCard>

      {/* Connect to peer */}
      <GlassCard>
        <Label>Connect to Peer</Label>
        <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
          <input
            value={connectInput}
            onChange={e => setConnectInput(e.target.value)}
            placeholder="P31-XXXXXX"
            style={{
              flex: 1,
              background: 'rgba(0,0,0,0.5)',
              border: '1px solid #164e63',
              borderRadius: 8,
              padding: '6px 10px',
              fontFamily: 'monospace',
              fontSize: '0.75rem',
              color: '#e2e8f0',
              outline: 'none',
              letterSpacing: '0.1em',
            }}
          />
          <button
            onClick={simulateHandshake}
            disabled={!connectInput.trim() || handshakeStatus === 'connecting'}
            style={{
              background: '#06b6d420',
              border: '1px solid #06b6d4',
              borderRadius: 8,
              padding: '6px 12px',
              color: '#06b6d4',
              fontFamily: 'monospace',
              fontSize: '0.7rem',
              cursor: 'pointer',
              letterSpacing: '0.1em',
              opacity: (!connectInput.trim() || handshakeStatus === 'connecting') ? 0.5 : 1,
            }}
          >
            {handshakeStatus === 'connecting' ? 'LINKING…' : 'CONNECT'}
          </button>
        </div>
        {handshakeStatus === 'success' && (
          <div style={{ marginTop: 6, fontFamily: 'monospace', fontSize: '0.6rem', color: '#22c55e', letterSpacing: '0.1em' }}>
            ✓ HANDSHAKE COMPLETE — PEER LINKED
          </div>
        )}
        {handshakeStatus === 'failed' && (
          <div style={{ marginTop: 6, fontFamily: 'monospace', fontSize: '0.6rem', color: '#ef4444', letterSpacing: '0.1em' }}>
            ✗ INVALID PEER ID FORMAT (EXPECTED P31-XXXXXX)
          </div>
        )}
        <div style={{
          marginTop: 10,
          fontFamily: 'monospace',
          fontSize: '0.55rem',
          color: '#334155',
          letterSpacing: '0.08em',
        }}>
          ROOM: {roomId}
        </div>
      </GlassCard>
    </div>
  )
}

  const bondingOnline = nodeStatus['bonding-relay']?.online
  const careTokenCount = blocks.filter(b => b.index > 0).length
  const listRef = useRef(null)

  useEffect(() => {
    if (listRef.current) {
      listRef.current.scrollTop = listRef.current.scrollHeight

  }, [blocks.length])

  const mintRandom = useCallback(() => {
    mint(CARE_PAYLOADS[Math.floor(Math.random() * CARE_PAYLOADS.length)])

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

              }}>
                {bondingOnline ? 'BONDING-RELAY' : 'LOCAL ONLY'}

          ))}

          <div>
            <Label>Fleet Status</Label>
            <div style={{
              fontFamily: 'monospace',
              fontSize: '0.6rem',
              color: '#475569',

              letterSpacing: '0.08em',
            }}>
              {onlineCount}/{FLEET_NODES.length} ONLINE

          <button
            onClick={refresh}

              alignItems: 'center',
              gap: 4,
              fontFamily: 'monospace',
              fontSize: '0.6rem',
              letterSpacing: '0.1em',
            }}
          >
            <RefreshCw size={12} /> REFRESH
          </button>
        </div>
      </GlassCard>

      {/* Fleet grid */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(2, 1fr)',
        gap: 10,
      }}>
        {FLEET_NODES.map(node => (

                {String(commandData.corp_status)}
              </div>
            </div>
          )}
          {commandData.financial_summary && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontFamily: 'monospace', fontSize: '0.6rem', color: '#22c55e', letterSpacing: '0.1em', marginBottom: 4 }}>
                FINANCIAL SUMMARY
              </div>
              <div style={{ fontFamily: 'monospace', fontSize: '0.65rem', color: '#e2e8f0' }}>
                {typeof commandData.financial_summary === 'object'
                  ? JSON.stringify(commandData.financial_summary, null, 2)
                  : String(commandData.financial_summary)}
              </div>
            </div>
          )}
          {commandData.key_dates && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontFamily: 'monospace', fontSize: '0.6rem', color: '#f59e0b', letterSpacing: '0.1em', marginBottom: 4 }}>
                KEY DATES
              </div>
              {Array.isArray(commandData.key_dates)
                ? commandData.key_dates.map((d, i) => (
                  <div key={i} style={{ fontFamily: 'monospace', fontSize: '0.6rem', color: '#94a3b8', marginBottom: 2 }}>{String(d)}</div>
                ))
                : <div style={{ fontFamily: 'monospace', fontSize: '0.6rem', color: '#94a3b8' }}>{String(commandData.key_dates)}</div>
              }
            </div>
          )}
          {/* Fallback: show all keys if none of the above */}
          {!commandData.corp_status && !commandData.financial_summary && !commandData.key_dates && (
            <pre style={{
              fontFamily: 'monospace',
              fontSize: '0.55rem',
              color: '#475569',
              marginTop: 8,
              whiteSpace: 'pre-wrap',
              wordBreak: 'break-all',
            }}>
              {JSON.stringify(commandData, null, 2).slice(0, 600)}

      </div>
      <div style={{ display: 'flex', justifyContent: 'space-around' }}>
        {TABS.map(tab => {
          const Icon = tab.icon
          const active = activeTab === tab.id
          return (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                background: 'none',
                border: 'none',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: 2,
                padding: '4px 8px',
                color: active ? '#06b6d4' : '#475569',
                cursor: 'pointer',
                fontFamily: 'monospace',
                fontSize: '0.45rem',
                letterSpacing: '0.08em',
                textTransform: 'uppercase',
                transition: 'color 0.2s',
              }}
            >
              <Icon size={16} />
              {tab.label.split(' ')[0]}
            </button>
          )
        })}
      </div>
    </div>
  )
}

// ─── ROOT COMPONENT ──────────────────────────────────────────────────────────

function P31SovereignVault() {
  const [activeTab, setActiveTab] = useState('vagal')
  const [isMobile, setIsMobile] = useState(false)

  // Shared hooks
  const { phase, timer, pulse, cycleCount } = useBreathing()
  const { nodeStatus, commandData, onlineCount, lastSync, refresh } = useFleetStatus()
  const { blocks, mint } = useLedger()
  const { peerId, packets, relayConnected, roomId, totalPackets, PATHS } = useMesh()

  // Auto-mint on each EXHALE
  const lastCycleRef = useRef(-1)
  useEffect(() => {
    if (phase === 'EXHALE' && cycleCount !== lastCycleRef.current) {
      lastCycleRef.current = cycleCount
      mint('BREATH_SYNC')
    }
  }, [phase, cycleCount, mint])

  // Responsive
  useEffect(() => {
    const mq = window.matchMedia('(max-width: 700px)')
    const handler = e => setIsMobile(e.matches)
    setIsMobile(mq.matches)
    mq.addEventListener('change', handler)
    return () => mq.removeEventListener('change', handler)
  }, [])

  const careTokenCount = blocks.filter(b => b.index > 0).length

  return (
    <>
      {/* Global style injection */}
      <style>{`
        @keyframes vaultPulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(0.85); }
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body, #__next, #root {
          background: #050510 !important;
          margin: 0;
          padding: 0;
          height: 100%;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #164e63; border-radius: 2px; }
      `}</style>

      <div style={{
        minHeight: '100vh',
        background: '#050510',
        color: '#e2e8f0',
        fontFamily: 'monospace',
        display: 'flex',
        flexDirection: 'column',
        position: 'relative',
        // Scanline texture
        backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(6,182,212,0.012) 2px, rgba(6,182,212,0.012) 4px)',
      }}>

        {/* Layout */}
        <div style={{
          display: 'flex',
          flex: 1,
          minHeight: '100vh',
        }}>
          {/* Sidebar — desktop only */}
          {!isMobile && (
            <Sidebar
              activeTab={activeTab}
              setActiveTab={setActiveTab}
              onlineCount={onlineCount}
              phase={phase}
              careTokenCount={careTokenCount}
            />
          )}

          {/* Main area */}
          <div style={{
            flex: 1,
            display: 'flex',
            flexDirection: 'column',
            overflowY: 'auto',
            paddingBottom: isMobile ? 80 : 0,
          }}>
            {/* Top bar */}
            <div style={{
              padding: '16px 20px',
              borderBottom: '1px solid #164e6340',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              background: 'rgba(0,0,0,0.4)',
              backdropFilter: 'blur(8px)',
              position: 'sticky',
              top: 0,
              zIndex: 50,
            }}>
              <div>
                {isMobile && (
                  <div style={{
                    fontFamily: 'monospace',
                    fontSize: '0.85rem',
                    color: '#06b6d4',
                    fontWeight: 700,
                    letterSpacing: '0.15em',
                    marginBottom: 2,
                  }}>
                    P31 VAULT
                  </div>
                )}
                <div style={{
                  fontFamily: 'monospace',
                  fontSize: '0.65rem',
                  color: '#06b6d4',
                  letterSpacing: '0.15em',
                  fontWeight: 700,
                }}>
                  {TABS.find(t => t.id === activeTab)?.label}
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <OnlineDot online={onlineCount > 0} color="#22c55e" />
                  <span style={{ fontFamily: 'monospace', fontSize: '0.55rem', color: '#475569', letterSpacing: '0.08em' }}>
                    {onlineCount}/6
                  </span>
                </div>
                <div style={{
                  fontFamily: 'monospace',
                  fontSize: '0.6rem',
                  color: phase === 'INHALE' ? '#06b6d4' : phase === 'HOLD' ? '#f59e0b' : '#818cf8',
                  letterSpacing: '0.12em',
                  fontWeight: 700,
                  transition: 'color 0.4s',
                }}>
                  {phase} {timer}s
                </div>
              </div>
            </div>

            {/* Tab content */}
            <div style={{ padding: '20px', flex: 1 }}>
              {activeTab === 'vagal' && (
                <TabVagalCore phase={phase} timer={timer} cycleCount={cycleCount} />
              )}
              {activeTab === 'k4' && (
                <TabK4Seal
                  breathingPhase={phase}
                  nodeStatus={nodeStatus}
                  commandData={commandData}
                />
              )}
              {activeTab === 'mesh' && (
                <TabMeshLoom
                  peerId={peerId}
                  packets={packets}
                  relayConnected={relayConnected}
                  roomId={roomId}
                  totalPackets={totalPackets}
                  PATHS={PATHS}
                  nodeStatus={nodeStatus}
                />
              )}
              {activeTab === 'ledger' && (
                <TabLedger
                  blocks={blocks}
                  mint={mint}
                  breathingPhase={phase}
                  nodeStatus={nodeStatus}
                />
              )}
              {activeTab === 'fleet' && (
                <TabFleet
                  nodeStatus={nodeStatus}
                  commandData={commandData}
                  onlineCount={onlineCount}
                  lastSync={lastSync}
                  refresh={refresh}
                />
              )}
            </div>
          </div>
        </div>

        {/* Mobile nav */}
        {isMobile && (
          <MobileNav
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            phase={phase}
            onlineCount={onlineCount}
            careTokenCount={careTokenCount}
          />
        )}
      </div>
    </>
  )
}


    const root = createRoot(document.getElementById('root'));
    root.render(<P31SovereignVault />);
  </script>
</body>
</html>
