<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt - P31 Labs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            color: #ff69b4;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .garden {
            position: relative;
            width: 100%;
            height: 60vh;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMwMEZGMDAiLz48L3N2Zz4=');
            background-size: cover;
            border-radius: 10px;
            margin: 20px auto;
            cursor: pointer;
        }
        .egg {
            position: absolute;
            width: 50px;
            height: 70px;
            background-color: #ffd700;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            cursor: pointer;
            display: none;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .egg.found {
            background-color: #ff4500;
            animation: none;
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
        }
        #score {
            font-size: 1.5em;
            margin-top: 20px;
        }
        button {
            background-color: #32cd32;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #228b22;
        }
    </style>
</head>
<body>
    <h1>Happy Easter Egg Hunt!</h1>
    <p>Click around the garden to find hidden Easter eggs. Each egg has a special message!</p>
    <div class="garden" id="garden">
        <!-- Eggs will be added here by JavaScript -->
    </div>
    <div id="score">Eggs found: 0 / 5</div>
    <button onclick="resetHunt()">Start Over</button>
    <div class="message" id="message">
        <p id="messageText"></p>
        <button onclick="closeMessage()">Close</button>
    </div>

    <script>
        const garden = document.getElementById('garden');
        const scoreDisplay = document.getElementById('score');
        const message = document.getElementById('message');
        const messageText = document.getElementById('messageText');

        let eggsFound = 0;
        const totalEggs = 5;
        const messages = [
            "Happy Easter, S.J.! You're the best big brother! 🐣",
            "W.J., you're growing so fast! Love you lots! 🌸",
            "Found one! Here's a virtual hug! 🤗",
            "Easter is about new beginnings, just like our family! ❤️",
            "You found all the eggs! You're egg-cellent! 🥚"
        ];

        function createEggs() {
            for (let i = 0; i < totalEggs; i++) {
                const egg = document.createElement('div');
                egg.className = 'egg';
                egg.style.left = Math.random() * 90 + '%';
                egg.style.top = Math.random() * 80 + '%';
                egg.onclick = () => findEgg(egg, i);
                garden.appendChild(egg);
                setTimeout(() => egg.style.display = 'block', Math.random() * 3000);
            }
        }

        function findEgg(egg, index) {
            if (!egg.classList.contains('found')) {
                egg.classList.add('found');
                eggsFound++;
                scoreDisplay.textContent = `Eggs found: ${eggsFound} / ${totalEggs}`;
                showMessage(messages[index]);
            }
        }

        function showMessage(text) {
            messageText.textContent = text;
            message.style.display = 'block';
        }

        function closeMessage() {
            message.style.display = 'none';
        }

        function resetHunt() {
            eggsFound = 0;
            scoreDisplay.textContent = `Eggs found: 0 / ${totalEggs}`;
            document.querySelectorAll('.egg').forEach(egg => egg.remove());
            createEggs();
        }

        garden.onclick = function(e) {
            if (e.target === garden) {
                showMessage("Keep looking! The eggs are hiding somewhere...");
            }
        };

        createEggs();
    </script>
</body>
</html>
