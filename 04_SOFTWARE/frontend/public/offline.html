<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P31 | Offline Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --void: #080810;
      --surface: #12141b;
      --cloud: #d8d6d0;
      --muted: #6b7280;
      --accent: #4db8a8;
    }
    body {
      min-height: 100vh;
      background: var(--void);
      color: var(--cloud);
      font-family: 'Atkinson Hyperlegible', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .offline-panel {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .shield-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--cloud);
    }
    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(77, 184, 168, 0.12);
      border: 1px solid rgba(77, 184, 168, 0.3);
      color: var(--accent);
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .info-list {
      text-align: left;
      background: var(--surface);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-value { color: var(--cloud); font-family: monospace; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 6px;
      background: var(--accent);
      color: var(--void);
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.12); }
  </style>
</head>
<body>
  <div class="offline-panel">
    <div class="shield-icon">🛡️</div>
    <div class="status-badge">Shield Mode Active</div>
    <h1>Operating Offline</h1>
    <p>
      The Sovereign Cockpit has detected an unstable network connection. 
      All critical functions are now operating from your local cache.
    </p>
    <div class="info-list">
      <div class="info-item">
        <span class="info-label">Mesh Status</span>
        <span class="info-value">LOCAL ONLY</span>
      </div>
      <div class="info-item">
        <span class="info-label">Data Source</span>
        <span class="info-value">ServiceWorker Cache</span>
      </div>
      <div class="info-item">
        <span class="info-label">Q-Factor</span>
        <span class="info-value">MAINTAINED</span>
      </div>
    </div>
    <a href="/" class="btn">Return to Cockpit</a>
  </div>
</body>
</html>
