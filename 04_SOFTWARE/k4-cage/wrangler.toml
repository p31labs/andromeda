name = "k4-cage"
main = "src/index.js"
compatibility_date = "2024-12-01"

# The Calcium Cage — K₄ Complete Graph as Infrastructure
# P31 Labs, Inc. | EIN 42-1888158
# One worker. Four vertices. Six edges. Volumetric enclosure.

# KV Namespace — create first:
# wrangler kv namespace create K4_MESH
# Then paste the id below

[[kv_namespaces]]
binding = "K4_MESH"
id = "a8a2ab8f61174ff6b878eb74cb6bc91d"

# Optional: preview namespace for local dev
# wrangler kv namespace create K4_MESH --preview
# [[kv_namespaces]]
# binding = "K4_MESH"
# preview_id = "PASTE_PREVIEW_ID_HERE"

[vars]
WORKER_VERSION = "1.0.0"
TOPOLOGY = "K4"

# Custom domain (after deploy):
# wrangler domains add k4-cage.trimtab-signal.workers.dev
# Or: routes = [{ pattern = "k4.p31ca.org/*", zone_name = "p31ca.org" }]
