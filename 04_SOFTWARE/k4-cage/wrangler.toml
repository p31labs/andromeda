# k4-cage — CWP-30 unified (K4Topology + FamilyMeshRoom DOs, optional D1 telemetry chain)
# P31 Labs, Inc. | EIN 42-1888158
#
# DO bindings are commented out — deployed in KV-only mode (see migration conflict w/ v2-hibernation tag).
# To re-enable DOs: resolve migration tag conflict in Cloudflare dashboard, then uncomment below
# and run: npx wrangler d1 create p31-telemetry → paste database_id, run schema.sql, deploy.
#
# First-time: npx wrangler secret put ADMIN_TOKEN
# Optional:   npx wrangler secret put INTERNAL_FANOUT_TOKEN
#             [vars] MESH_ROOM_IDS = "family-mesh" (comma-separated room names for ping fan-out)

name = "k4-cage"
main = "src/index.js"
compatibility_date = "2025-10-01"

# [durable_objects]
# bindings = [
#   { name = "K4_TOPOLOGY", class_name = "K4Topology" },
#   { name = "FAMILY_MESH_ROOM", class_name = "FamilyMeshRoom" },
# ]

# [[migrations]]
# tag = "unified-k4-v1"
# new_sqlite_classes = ["K4Topology", "FamilyMeshRoom"]

# [[d1_databases]]
# binding = "DB"
# database_name = "p31-telemetry"
# database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "K4_MESH"
id = "a8a2ab8f61174ff6b878eb74cb6bc91d"

[vars]
WORKER_VERSION = "2.0.0-unified"
TOPOLOGY = "K4"
ENVIRONMENT = "production"
MESH_ROOM_IDS = "family-mesh"
