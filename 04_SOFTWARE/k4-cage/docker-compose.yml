version: '3.8'

services:
  # Local development environment for K4 Cage Messaging
  
  # Redis for session storage and pub/sub
  redis:
    image: redis:7-alpine
    container_name: k4-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # PostgreSQL for development (alternative to D1)
  postgres:
    image: postgres:16-alpine
    container_name: k4-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: p31_telemetry
      POSTGRES_USER: p31
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p31-local-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # MinIO for S3-compatible object storage (R2 alternative)
  minio:
    image: minio/minio:latest
    container_name: k4-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: minio server /data --console-address ":9001"
    restart: unless-stopped

  # LocalStack for AWS-compatible services (optional)
  localstack:
    image: localstack/localstack:latest
    container_name: k4-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3,sts
      - DEBUG=1
    volumes:
      - localstack-data:/var/lib/localstack
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: k4-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: k4-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  minio-data:
    driver: local
  localstack-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  default:
    name: k4-mesh-network
