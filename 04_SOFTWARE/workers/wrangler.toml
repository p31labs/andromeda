name = "p31-workers"
main = "src/index.ts"
compatibility_date = "2026-03-24"

[[kv_namespaces]]
binding = "PASSPORT_KV"
id = "your-passport-kv-id"

[[kv_namespaces]]
binding = "SPOONS_KV"
id = "your-spoons-kv-id"

[[kv_namespaces]]
binding = "THRESHOLDS_KV"
id = "your-thresholds-kv-id"

[[r2_buckets]]
binding = "PASSPORT_R2"
id = "your-passport-r2-id"

[[r2_buckets]]
binding = "LEGAL_R2"
id = "your-legal-r2-id"

[[r2_buckets]]
binding = "MESH_R2"
id = "your-mesh-r2-id"

[[d1_databases]]
binding = "LOVE_D1"
database_name = "love-ledger"
database_id = "your-love-d1-id"

[[d1_databases]]
binding = "SPOONS_D1"
database_name = "spoons-db"
database_id = "your-spoons-d1-id"

[[d1_databases]]
binding = "LEGAL_D1"
database_name = "legal-docs"
database_id = "your-legal-d1-id"

[[d1_databases]]
binding = "MESH_D1"
database_name = "mesh-db"
database_id = "your-mesh-d1-id"

[[d1_databases]]
binding = "TELEMETRY_D1"
database_name = "telemetry-db"
database_id = "your-telemetry-d1-id"

[[durable_objects]]
binding = "LOVE_TRANSACTION"
class_name = "LoveTransactionDO"

[[durable_objects]]
binding = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects]]
binding = "ROOM_STATE"
class_name = "RoomStateDO"

[[queues]]
binding = "TELEMETRY_QUEUE"
queue_name = "telemetry-queue"

[vars]
BRENDA_PHONE = "+19122274980"
BRENDA_USER_ID = "brenda-001"
OPERATOR_USER_ID = "will-001"

# Twilio (optional - for emergency notifications)
# TWILIO_SID = "your-twilio-sid"
# TWILIO_TOKEN = "your-twilio-token"
# TWILIO_PHONE = "+19122274980"
