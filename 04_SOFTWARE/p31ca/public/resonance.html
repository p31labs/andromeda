        .tog.on{background:rgba(37,137,125,0.2);border-color:var(--teal);color:var(--teal)}

        .history-item{font-size:12px;color:rgba(216,214,208,0.5);padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;font-family:'JetBrains Mono',monospace}
        .history-item:hover{color:var(--cloud)}
        @media(max-width:680px){main{grid-template-columns:1fr}.right{display:none}}

<main>
    <div class="left">
        <h1>RESONANCE</h1>
        <div class="sub">Words → Pentatonic Music · ³¹P Larmor Anchor</div>

        <textarea id="text-input" placeholder="Type anything. Each word becomes a note in the P31 pentatonic scale…"></textarea>

        <div class="controls">
            <button class="btn-play" id="btn-play">▶ Play</button>
            <button id="btn-stop">■ Stop</button>
            <button id="btn-chord">Chord Mode</button>
            <button id="btn-loop">Loop</button>
            <button id="btn-clear-text">Clear</button>
        </div>

        <canvas id="viz"></canvas>

        <div class="note-display" id="note-display"></div>

        <div class="ctrl-row">
            <span class="ctrl-lbl">Tempo</span>
            <input type="range" id="sl-tempo" min="40" max="240" value="120">
            <span class="val" id="val-tempo">120</span>
        </div>
        <div class="ctrl-row">
            <span class="ctrl-lbl">Octave</span>
            <input type="range" id="sl-octave" min="2" max="6" value="4" step="1">
            <span class="val" id="val-octave">4</span>
        </div>
        <div class="ctrl-row">
            <span class="ctrl-lbl">Volume</span>
            <input type="range" id="sl-vol" min="0" max="100" value="60">
            <span class="val" id="val-vol">60%</span>
        </div>

        <div class="tog-row">
            <button class="tog on" data-wave="sine">Sine</button>
            <button class="tog" data-wave="triangle">Triangle</button>
            <button class="tog" data-wave="sawtooth">Saw</button>
            <button class="tog" data-wave="square">Square</button>
        </div>

    <div class="right">
        <div class="panel-title">Scale Info</div>
        <div style="font-size:12px;color:rgba(216,214,208,0.5);font-family:'JetBrains Mono',monospace;line-height:1.8" id="scale-info">
            P31 Pentatonic<br>Anchor: 863 Hz (³¹P Larmor)<br>
        </div>
        <div id="scale-notes"></div>

        <div class="panel-title">Mapping</div>
        <div style="font-size:11px;color:rgba(216,214,208,0.4);font-family:'JetBrains Mono',monospace;line-height:2">
            Word length → note<br>
            Vowel count → octave shift<br>
            Consonant ratio → timbre<br>
            Punctuation → rest
        </div>

        <div class="panel-title">History</div>
        <div id="history"></div>
    </div>
</main>

<script>
const vizCanvas = document.getElementById('viz');
const vizCtx = vizCanvas.getContext('2d');
let vizW, vizH;
function resizeViz(){vizW=vizCanvas.width=vizCanvas.offsetWidth;vizH=vizCanvas.height=vizCanvas.offsetHeight;}
resizeViz();
window.addEventListener('resize',resizeViz);

let audioCtx = null;
let masterGain = null;
let playing = false;
let chordMode = false;
let loopMode = false;
let currentNoteIdx = 0;
let playTimeout = null;
let waveType = 'sine';
let analyser = null;
let analyserData = null;

// P31 pentatonic scale built around 863 Hz (³¹P Larmor in Earth's field)
// Pentatonic ratios from 863: 1, 9/8, 6/5, 3/2, 5/3
const P31_BASE = 863;
const PENTA_RATIOS = [1, 9/8, 6/5, 3/2, 5/3, 2, 9/4, 12/5, 3, 10/3];

const NOTE_COLORS = ['#3ba372','#4db8a8','#25897d','#cda852','#cc6247','#8b7cc9','#d8d6d0','#3ba372','#4db8a8','#25897d'];
const NOTE_NAMES = ['P31','α','β','γ','δ','ε','ζ','P31↑','α↑','β↑'];

function getFreq(semitone, octave) {
    const octaveShift = octave - 4;
    return P31_BASE * PENTA_RATIOS[semitone % PENTA_RATIOS.length] * Math.pow(2, octaveShift + Math.floor(semitone / PENTA_RATIOS.length));
}

function wordToNote(word) {
    const clean = word.toLowerCase().replace(/[^a-z]/g,'');
    if (!clean) return null;
    const len = clean.length;
    const vowels = (clean.match(/[aeiou]/g)||[]).length;
    const noteIdx = ((len-1) % PENTA_RATIOS.length + PENTA_RATIOS.length) % PENTA_RATIOS.length;
    const octShift = vowels >= 3 ? 1 : vowels === 0 ? -1 : 0;
    return {noteIdx, octShift, word, color: NOTE_COLORS[noteIdx], name: NOTE_NAMES[noteIdx]};
}

function getWords() {
    return document.getElementById('text-input').value.trim().split(/\s+/).filter(w=>w);
}

function buildNotes() {
    const words = getWords();
    const notes = words.map(wordToNote).filter(Boolean);
    renderNotePills(notes);
    return notes;
}

function renderNotePills(notes) {
    const disp = document.getElementById('note-display');
    disp.innerHTML = '';
    notes.forEach((n,i) => {
        const pill = document.createElement('span');
        pill.className = 'note-pill';
        pill.id = 'pill-'+i;
        pill.textContent = n.word;
        pill.style.background = n.color + '22';
        pill.style.borderColor = n.color + '44';
        pill.style.color = n.color;
        disp.appendChild(pill);
    });
}

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyserData = new Uint8Array(analyser.frequencyBinCount);
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
    masterGain.gain.value = document.getElementById('sl-vol').value / 100;
}

function playNote(freq, duration, detune=0) {
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = waveType;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    env.gain.setValueAtTime(0, audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration * 0.9);
    osc.connect(env); env.connect(masterGain);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

let notes = [];
let noteIdx = 0;

function scheduleNext() {
    if (!playing) return;
    if (noteIdx >= notes.length) {
        if (loopMode) { noteIdx = 0; }
        else { playing = false; document.getElementById('btn-play').classList.remove('active'); return; }
    }
    const n = notes[noteIdx];
    const octave = parseInt(document.getElementById('sl-octave').value) + n.octShift;
    const freq = getFreq(n.noteIdx, Math.max(2,Math.min(8,octave)));
    const bpm = parseInt(document.getElementById('sl-tempo').value);
    const duration = 60/bpm * 0.8;

    if (chordMode) {
        playNote(freq, duration);
        playNote(freq * 1.25, duration, 0);
        playNote(freq * 1.5, duration, 0);
    } else {
        playNote(freq, duration);
    }

    // Highlight pill
    document.querySelectorAll('.note-pill').forEach((p,i) => {
        p.classList.toggle('active', i === noteIdx);
        p.style.transform = i === noteIdx ? 'scale(1.1)' : 'scale(1)';
    });

    noteIdx++;
    playTimeout = setTimeout(scheduleNext, (60/bpm)*1000);
}

document.getElementById('btn-play').addEventListener('click', () => {
    initAudio();
    notes = buildNotes();
    if (!notes.length) return;
    addToHistory(document.getElementById('text-input').value.trim().slice(0,40));
    playing = true;
    noteIdx = 0;
    document.getElementById('btn-play').classList.add('active');
    scheduleNext();
});

document.getElementById('btn-stop').addEventListener('click', () => {
    playing = false;
    clearTimeout(playTimeout);
    document.getElementById('btn-play').classList.remove('active');
    document.querySelectorAll('.note-pill').forEach(p => { p.classList.remove('active'); p.style.transform=''; });
});

document.getElementById('btn-chord').addEventListener('click', function() {
    chordMode = !chordMode;
    this.style.borderColor = chordMode ? 'var(--lav)' : '';
    this.style.color = chordMode ? 'var(--lav)' : '';
});

document.getElementById('btn-loop').addEventListener('click', function() {
    loopMode = !loopMode;
    this.style.borderColor = loopMode ? 'var(--butter)' : '';
    this.style.color = loopMode ? 'var(--butter)' : '';
});

document.getElementById('btn-clear-text').addEventListener('click', () => {
    document.getElementById('text-input').value = '';
    document.getElementById('note-display').innerHTML = '';
    playing = false; clearTimeout(playTimeout);
});

document.getElementById('sl-tempo').addEventListener('input', function(){ document.getElementById('val-tempo').textContent = this.value; });
document.getElementById('sl-octave').addEventListener('input', function(){ document.getElementById('val-octave').textContent = this.value; });
document.getElementById('sl-vol').addEventListener('input', function(){
    document.getElementById('val-vol').textContent = this.value + '%';
    if (masterGain) masterGain.gain.setTargetAtTime(this.value/100, audioCtx.currentTime, 0.05);
});

document.querySelectorAll('[data-wave]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-wave]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    waveType = b.dataset.wave;
}));

document.getElementById('text-input').addEventListener('input', () => {
    if (!playing) buildNotes();
});

const history = [];
function addToHistory(text) {
    if (!text) return;
    history.unshift(text);
    if (history.length > 8) history.pop();
    const el = document.getElementById('history');
    el.innerHTML = '';
    history.forEach((h,i) => {
        const d = document.createElement('div');
        d.className = 'history-item';
        d.textContent = (i===0?'→ ':'')+h;
        d.onclick = () => { document.getElementById('text-input').value = h; buildNotes(); };
        el.appendChild(d);
    });
}

// Scale info
const scaleInfo = document.getElementById('scale-notes');
scaleInfo.innerHTML = PENTA_RATIOS.slice(0,5).map((r,i) =>
    `<div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:${NOTE_COLORS[i]};margin-bottom:4px"><span>${NOTE_NAMES[i]}</span><span>${(P31_BASE*r).toFixed(1)} Hz</span></div>`
).join('');

function drawViz() {
    requestAnimationFrame(drawViz);
    vizCtx.fillStyle = '#161920';
    vizCtx.fillRect(0,0,vizW,vizH);
    if (!analyser||!analyserData) {
        vizCtx.strokeStyle = 'rgba(37,137,125,0.3)';
        vizCtx.lineWidth=1;vizCtx.beginPath();
        for(let x=0;x<vizW;x++){const y=vizH/2+Math.sin(Date.now()*0.001+x*0.05)*4;if(x===0)vizCtx.moveTo(x,y);else vizCtx.lineTo(x,y);}
        vizCtx.stroke();return;
    }
    analyser.getByteFrequencyData(analyserData);
    const bw = vizW/analyserData.length;
    for(let i=0;i<analyserData.length;i++){
        const v=analyserData[i]/255;
        const h=v*vizH;
        const hue=120+i*2;
        vizCtx.fillStyle=`hsla(${hue},70%,50%,${v})`;
        vizCtx.fillRect(i*bw,vizH-h,bw-1,h);
    }
}
drawViz();
</script>
