<style>

  /* Files Tab */
  #files-panel { flex-direction: column; background: var(--void); }

  #file-tree { flex: 1; overflow-y: auto; padding: 8px 0; }

  .file-item.active { background: var(--surface2); color: var(--cyan); }
  .file-del { color: #555; font-size: 11px; padding: 2px 6px; border-radius: 2px; }
  .file-del:hover { color: var(--red); background: rgba(204,98,71,0.1); }

<script>
// ── Constants ──
const QG = {
  SQRT3: 1.7320508075688772,
  INV_SQRT3: 0.5773502691896257,
  SIC_OVERLAP: 1/3,
  MARK1: 0.35,
  GREEN_ENTROPY: 0.15,
  YELLOW_ENTROPY: 0.40,
};

const VERTEX_COLORS = ['#4db8a8', '#8b7cc9', '#3ba372', '#cda852'];
const SIC_LABELS = ['ALPHA', 'BETA', 'GAMMA', 'DELTA'];

// ── Default files ──
const DEFAULT_FILES = {
  'main.ts': `// QG-IDE :: Quantum Geodesic Entry Point
import { QuantumTetrahedron } from './tetrahedron';
import { SICPOVMState } from './sicpovm';

const MARK1 = 0.35;

// Initialize the primary tetrahedron
const tetra = { coherence: MARK1, scale: 1.0 };

// SIC-POVM measurement outcomes
const outcomes = ['ALPHA','BETA','GAMMA','DELTA'];
const r = Math.random();
const pick = outcomes[Math.floor(r * 4)];
console.log('Outcome:', pick);
console.log('Probability:', (0.25).toFixed(4));
console.log('Purity:', 1.0);

// Coherence game loop
function update(trimtab, dt) {
  const drift = (trimtab - 0.5) * dt * 0.1;
  const coh = Math.max(0, Math.min(1, MARK1 + drift));
  const entropy = Math.abs(coh - MARK1) / MARK1;
  if (entropy < 0.15) return 'GREEN_BOARD';
  if (entropy < 0.40) return 'YELLOW_BOARD';
  return 'RED_BOARD';
}

console.log('[QG] Kernel initialized');
console.log('[QG] Board state:', update(0.5, 0.016));
`,
  'tetrahedron.ts': `// Minimum structural system: 4 vertices, 6 edges, 4 faces

const vertices = [
  { x: 0, y: 1, z: 0 },
  { x: 0.9428, y: -0.3333, z: 0 },
  { x: -0.4714, y: -0.3333, z: 0.8165 },
  { x: -0.4714, y: -0.3333, z: -0.8165 },
];

const edges = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];

function rotateY(v, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return { x: v.x*c + v.z*s, y: v.y, z: -v.x*s + v.z*c };
}

function getEntropy(coherence) {
  return Math.abs(coherence - 0.35) / 0.35;
}

function getBoardState(coherence) {
  const e = getEntropy(coherence);
  if (e < 0.15) return 'GREEN';
  if (e < 0.40) return 'YELLOW';
  return 'RED';
}

console.log('Tetrahedron vertices:', vertices.length);
console.log('Edges:', edges.length);
console.log('Board:', getBoardState(0.35));
`,
  'sicpovm.ts': `// SIC-POVM: Symmetric Informationally Complete
// 4 outcomes at tetrahedral angles on Bloch sphere

const labels = ['ALPHA','BETA','GAMMA','DELTA'];

function normalize(v) {
  const len = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
  return { x: v.x/len, y: v.y/len, z: v.z/len };
}

function measure(probabilities) {
  let r = Math.random();
  for (let i = 0; i < probabilities.length; i++) {
    r -= probabilities[i];
    if (r <= 0) return labels[i];
  }
  return labels[3];
}

// Equal superposition: each outcome 1/4
const probs = [0.25, 0.25, 0.25, 0.25];
const sum = probs.reduce((a,b) => a+b, 0);

console.log('SIC-POVM outcomes:', labels.length);
console.log('Probability sum:', sum.toFixed(4));
console.log('Measurement:', measure(probs));
console.log('Pairwise overlap |<pi|pj>|^2 = 1/3');
`,
};

// ── State ──
let state = {
  activeTab: 'code',
  files: {},
  activeFile: 'main.ts',
  consoleLines: [],
  H: 0.35,
  entropy: 0,
  sicProbs: [0.25, 0.25, 0.25, 0.25],
  copilotMsgs: [{ role: 'bot', text: 'Centaur Engine online. Ask about tetrahedra, SIC-POVM, entropy, coherence, or the Bloch sphere.' }],
  phxLog: ['[BOOT] PHX companion initialized', '[BOOT] Coherence nominal'],
  tetraAngle: 0,
};

// ── localStorage ──
function lsGet(key, fallback) {
  try { const v = localStorage.getItem('QGIDE_' + key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem('QGIDE_' + key, JSON.stringify(val)); } catch {}
}

function loadState() {
  state.files = lsGet('files', DEFAULT_FILES);
  state.activeFile = lsGet('activeFile', 'main.ts');
  state.consoleLines = lsGet('console', []);
  state.entropy = lsGet('entropy', 0);
  if (!state.files[state.activeFile]) state.activeFile = Object.keys(state.files)[0] || 'main.ts';
}

function saveFiles() { lsSet('files', state.files); }
function saveActiveFile() { lsSet('activeFile', state.activeFile); }
function saveConsole() { lsSet('console', state.consoleLines.slice(-200)); }
function saveEntropy() { lsSet('entropy', state.entropy); }

// ── Tab switching ──
function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + '-panel').classList.add('active');
  if (tab === 'view') renderTetrahedron();
  if (tab === 'files') renderFileTree();
  if (tab === 'term') {
    const out = document.getElementById('term-output');
    out.scrollTop = out.scrollHeight;
  }
}

// ── Code editor ──
function loadFileIntoEditor() {
  const area = document.getElementById('code-area');
  area.value = state.files[state.activeFile] || '';
  updateGutter();
}

function updateGutter() {
  const area = document.getElementById('code-area');
  const lines = (area.value || '').split('\n').length;
  const gutter = document.getElementById('gutter');
  let html = '';
  for (let i = 1; i <= lines; i++) html += '<div class="ln">' + i + '</div>';
  gutter.innerHTML = html;
}

function onCodeChange() {
  const area = document.getElementById('code-area');
  state.files[state.activeFile] = area.value;
  saveFiles();
  updateGutter();
}

function onCodeScroll() {
  const area = document.getElementById('code-area');
  document.getElementById('gutter').scrollTop = area.scrollTop;
}

// ── Run code ──
function runCode() {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  clog('Running ' + state.activeFile + '...', 'sys');
  const code = state.files[state.activeFile] || '';

  // Strip TypeScript syntax for eval
  let js = code
    .replace(/:\s*(number|string|boolean|any|void|never|Vector3|Outcome)\b/g, '')
    .replace(/\b(interface|type|export|import)[^;\n]*/g, '// [stripped]')
    .replace(/<[A-Z]\w*>/g, '');

  try {
    const logs = [];
    const fakeConsole = {
      log: function() { logs.push(Array.from(arguments).join(' ')); },
      warn: function() { logs.push('[WARN] ' + Array.from(arguments).join(' ')); },
      error: function() { logs.push('[ERR] ' + Array.from(arguments).join(' ')); },
    };
    new Function('console', 'Math', js)(fakeConsole, Math);
    logs.forEach(function(l) { clog(l, 'out'); });
    clog('Execution complete', 'info');
  } catch (e) {
    clog('Error: ' + (e.message || String(e)), 'err');
  }

  // Update entropy based on code complexity
  const complexity = code.length / 2000;
  const noise = (Math.random() - 0.5) * 0.1;
  state.H = Math.max(0.05, Math.min(0.95, state.H + noise * 0.3));
  state.entropy = Math.abs(state.H - QG.MARK1) / QG.MARK1;

  // Update SIC-POVM probabilities with some variation
  const raw = [0.25, 0.25, 0.25, 0.25].map(function(p) { return p + (Math.random() - 0.5) * 0.08; });
  const sum = raw.reduce(function(a, b) { return a + b; }, 0);
  state.sicProbs = raw.map(function(p) { return Math.max(0.01, p / sum); });

  updateEntropyUI();
  saveEntropy();
  switchTab('term');
}

// ── Console ──
function clog(text, cls) {
  cls = cls || 'out';
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  state.consoleLines.push({ text: text, cls: cls, ts: ts });
  if (state.consoleLines.length > 500) state.consoleLines = state.consoleLines.slice(-300);
  saveConsole();
  renderConsole();
}

function renderConsole() {
  const out = document.getElementById('term-output');
  let html = '';
  state.consoleLines.forEach(function(line) {
    html += '<div class="term-line cls-' + line.cls + '"><span class="term-ts">' + line.ts + '</span>' + escHtml(line.text) + '</div>';
  });
  out.innerHTML = html;
  out.scrollTop = out.scrollHeight;
}

function evalTermInput() {
  const input = document.getElementById('term-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  clog('> ' + cmd, 'sys');

  if (cmd === 'clear') { state.consoleLines = []; saveConsole(); renderConsole(); return; }
  if (cmd === 'help') { clog('Commands: clear, help, ls, run, entropy, board, files', 'info'); return; }
  if (cmd === 'ls' || cmd === 'files') {
    Object.keys(state.files).forEach(function(f) { clog('  ' + f, 'out'); });
    return;
  }
  if (cmd === 'entropy') { clog('H = ' + state.H.toFixed(4) + ' | Entropy = ' + (state.entropy * 100).toFixed(1) + '%', 'info'); return; }
  if (cmd === 'board') {
    const b = state.entropy < QG.GREEN_ENTROPY ? 'GREEN' : state.entropy < QG.YELLOW_ENTROPY ? 'YELLOW' : 'RED';
    clog('Board state: ' + b, 'info'); return;
  }
  if (cmd === 'run') { runCode(); return; }

  // Try eval
  try {
    const result = new Function('return ' + cmd)();
    clog(String(result), 'out');
  } catch (e) {
    clog('Error: ' + e.message, 'err');
  }
}

// ── Tetrahedron SVG ──
function renderTetrahedron() {
  const svg = document.getElementById('tetra-svg');
  const cx = 170, cy = 160, scale = 110;
  const angle = state.tetraAngle;

  // 3D vertices of regular tetrahedron
  const verts3d = [
    { x: 0, y: 1, z: 0 },
    { x: 0.9428, y: -0.3333, z: 0 },
    { x: -0.4714, y: -0.3333, z: 0.8165 },
    { x: -0.4714, y: -0.3333, z: -0.8165 },
  ];

  // Rotate Y
  const ca = Math.cos(angle), sa = Math.sin(angle);
  const projected = verts3d.map(function(v) {
    const rx = v.x * ca + v.z * sa;
    const rz = -v.x * sa + v.z * ca;
    // Slight tilt on X for depth
    const ct = Math.cos(0.3), st = Math.sin(0.3);
    const ry = v.y * ct - rz * st;
    const rz2 = v.y * st + rz * ct;
    // Perspective projection
    const d = 3.5 + rz2 * 0.3;
    return { x: cx + rx * scale / d * 3, y: cy - ry * scale / d * 3, z: rz2 };
  });

  const edges = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];

  let html = '';
  // Edges
  edges.forEach(function(e) {
    const a = projected[e[0]], b = projected[e[1]];
    const opacity = 0.3 + 0.3 * (1 - (a.z + b.z) / 4);
    html += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" class="edge" style="opacity:'+opacity.toFixed(2)+'"/>';
  });
  // Vertices
  projected.forEach(function(v, i) {
    const r = 6 + (1 - v.z) * 2;
    html += '<circle cx="'+v.x+'" cy="'+v.y+'" r="'+r.toFixed(1)+'" fill="'+VERTEX_COLORS[i]+'" class="vertex" opacity="0.9"/>';
    html += '<text x="'+v.x+'" y="'+(v.y - r - 6)+'" fill="'+VERTEX_COLORS[i]+'" text-anchor="middle" font-family="var(--font-mono)" font-size="11" font-weight="700">'+SIC_LABELS[i]+'</text>';
  });

  svg.innerHTML = html;

  // SIC-POVM readout
  const readout = document.getElementById('sicpovm-readout');
  let rhtml = '';
  state.sicProbs.forEach(function(p, i) {
    rhtml += '<div class="sic-outcome"><div class="sic-label" style="color:'+VERTEX_COLORS[i]+'">'+SIC_LABELS[i]+'</div><div class="sic-prob">'+p.toFixed(4)+'</div></div>';
  });
  readout.innerHTML = rhtml;
}

// ── Tetrahedron animation ──
let tetraAnimId = null;
function animateTetrahedron() {
  state.tetraAngle += 0.008;
  if (state.activeTab === 'view') renderTetrahedron();
  tetraAnimId = requestAnimationFrame(animateTetrahedron);
}

  'bloch sphere': 'The Bloch sphere represents all pure and mixed states of a qubit. Pure states live on the surface (radius 1). Mixed states are interior points. The 4 SIC-POVM vectors point to vertices of a regular tetrahedron inscribed in the Bloch sphere. This is the most symmetric measurement basis possible.',

  help: 'I can discuss: tetrahedron geometry, SIC-POVM measurement, entropy/coherence, Bloch sphere representation, quantum states, and the geometric foundations of this IDE. What would you like to explore?',
};

function copilotRespond(query) {
  const lower = query.toLowerCase();
  for (var key in COPILOT_KB) {
    if (lower.includes(key)) return COPILOT_KB[key];
  }
  if (lower.includes('what') && lower.includes('can')) return COPILOT_KB['help'];
  return 'Centaur is thinking... The geometry suggests your question touches on the relationship between measurement and structure. In this system, every observable is grounded in the tetrahedral basis. Could you be more specific about which aspect you want to explore?';
}

function sendCopilot() {
  const input = document.getElementById('copilot-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  state.copilotMsgs.push({ role: 'user', text: msg });
  var response = copilotRespond(msg);
  setTimeout(function() {
    state.copilotMsgs.push({ role: 'bot', text: response });
    renderCopilot();
  }, 300 + Math.random() * 400);
  renderCopilot();
}

function renderCopilot() {
  const container = document.getElementById('copilot-msgs');
  let html = '';
  state.copilotMsgs.forEach(function(m) {
    html += '<div class="msg msg-' + m.role + '">' + escHtml(m.text) + '</div>';
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// ── PHX Tab ──
function phxPulse() {
  // Recalibrate toward Mark-1
  const delta = (QG.MARK1 - state.H) * 0.4;
  state.H += delta;
  state.entropy = Math.abs(state.H - QG.MARK1) / QG.MARK1;
  updateEntropyUI();
  updatePhxUI();
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  state.phxLog.push('[' + ts + '] PULSE: Recalibrated H -> ' + state.H.toFixed(4));
  if (state.phxLog.length > 50) state.phxLog = state.phxLog.slice(-30);
  renderPhxLog();
  saveEntropy();
}

function updatePhxUI() {
  document.getElementById('phx-entropy').textContent = (state.entropy * 100).toFixed(1) + '%';
  document.getElementById('phx-entropy').style.color =
    state.entropy < QG.GREEN_ENTROPY ? 'var(--green)' : state.entropy < QG.YELLOW_ENTROPY ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('phx-coherence').textContent = state.H.toFixed(4);

  var suggestion = '';
  if (state.entropy < QG.GREEN_ENTROPY) {
    suggestion = 'System nominal. Full bandwidth available. Structure determines performance.';
  } else if (state.entropy < QG.YELLOW_ENTROPY) {
    suggestion = 'Elevated entropy detected. Consider: reduce context switching, ground in one task, pulse to recalibrate.';
  } else {
    suggestion = 'HIGH ENTROPY. Recommend immediate pulse. Narrow scope. Single-thread until green board restored.';
  }
  document.getElementById('phx-suggestion').textContent = suggestion;
}

function renderPhxLog() {
  const el = document.getElementById('phx-log');
  let html = '';
  state.phxLog.forEach(function(line) {
    html += '<div class="phx-log-line">' + escHtml(line) + '</div>';
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ── Files Tab ──
function renderFileTree() {
  const tree = document.getElementById('file-tree');
  const sorted = Object.keys(state.files).sort();
  let html = '';
  sorted.forEach(function(name) {
    const active = name === state.activeFile ? ' active' : '';
    html += '<div class="file-item' + active + '" onclick="openFile(\'' + escAttr(name) + '\')">';
    html += '<span>' + escHtml(name) + '</span>';
    html += '<button class="file-del" onclick="event.stopPropagation();deleteFile(\'' + escAttr(name) + '\')">x</button>';
    html += '</div>';
  });
  tree.innerHTML = html;
}

function openFile(name) {
  state.activeFile = name;
  saveActiveFile();
  loadFileIntoEditor();
  switchTab('code');
}

function newFile() {
  var name = prompt('File name (e.g. utils.ts):');
  if (!name || !name.trim()) return;
  name = name.trim();
  if (state.files[name]) { alert('File already exists.'); return; }
  state.files[name] = '// ' + name + '\n';
  saveFiles();
  openFile(name);
}

function deleteFile(name) {
  if (Object.keys(state.files).length <= 1) { alert('Cannot delete the last file.'); return; }
  if (!confirm('Delete ' + name + '?')) return;
  delete state.files[name];
  saveFiles();
  if (state.activeFile === name) {
    state.activeFile = Object.keys(state.files)[0];
    saveActiveFile();
    loadFileIntoEditor();
  }
  renderFileTree();
}

// ── Entropy UI ──
function updateEntropyUI() {
  const pct = Math.min(100, state.entropy * 100 / 0.6);
  const fill = document.getElementById('entropy-fill');
  fill.style.width = pct + '%';

  var color, label;
  if (state.entropy < QG.GREEN_ENTROPY) { color = 'var(--green)'; label = 'GREEN'; }
  else if (state.entropy < QG.YELLOW_ENTROPY) { color = 'var(--yellow)'; label = 'YELLOW'; }
  else { color = 'var(--red)'; label = 'RED'; }

  fill.style.background = color;
  document.getElementById('entropy-val').textContent = (state.entropy * 100).toFixed(1) + '%';
  var badge = document.getElementById('board-badge');
  badge.textContent = label;
  badge.style.background = color;
  badge.style.color = state.entropy < QG.GREEN_ENTROPY ? '#0a2a20' : state.entropy < QG.YELLOW_ENTROPY ? '#2a2200' : '#fff';
}

// ── Coherence drift ──
function coherenceDrift() {
  state.H += (Math.random() - 0.502) * 0.002;
  state.H = Math.max(0.05, Math.min(0.95, state.H));
  state.entropy = Math.abs(state.H - QG.MARK1) / QG.MARK1;
  updateEntropyUI();
  if (state.activeTab === 'phx') updatePhxUI();
}

// ── Helpers ──
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ── Boot ──
function boot() {
  loadState();
  loadFileIntoEditor();

  var area = document.getElementById('code-area');
  area.addEventListener('input', onCodeChange);
  area.addEventListener('scroll', onCodeScroll);
  area.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = this.selectionStart, end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
      onCodeChange();
    }
  });

  document.getElementById('term-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') evalTermInput();
  });
  document.getElementById('copilot-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendCopilot();
  });

  // Keyboard shortcut: Ctrl+Enter to run
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
  });

  // Boot console
  if (state.consoleLines.length === 0) {
    var ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    var boot = [
      { text: String.fromCharCode(9472).repeat(40), cls: 'sys', ts: ts },
      { text: '  QUANTUM GEODESIC IDE v1.0', cls: 'sys', ts: ts },
      { text: '  Kernel: TETRAHEDRAL', cls: 'sys', ts: ts },
      { text: '  Physics: FISHER-ESCOLA', cls: 'sys', ts: ts },
      { text: '  Verification: SIC-POVM', cls: 'sys', ts: ts },
      { text: String.fromCharCode(9472).repeat(40), cls: 'sys', ts: ts },
      { text: 'Quantum kernel initialized', cls: 'info', ts: ts },
      { text: 'File system loaded (' + Object.keys(state.files).length + ' files)', cls: 'info', ts: ts },
      { text: 'SIC-POVM calibrated: 4 outcomes nominal', cls: 'info', ts: ts },
      { text: 'Hardware bridge: OFFLINE', cls: 'warn', ts: ts },
      { text: 'Structure Determines Performance.', cls: 'sys', ts: ts },
    ];
    state.consoleLines = boot;
    saveConsole();
  }
  renderConsole();
  renderCopilot();
  updateEntropyUI();
  updatePhxUI();
  renderPhxLog();
  renderFileTree();

  // Start animations
  animateTetrahedron();
  setInterval(coherenceDrift, 500);
}

document.addEventListener('DOMContentLoaded', boot);
</script>
