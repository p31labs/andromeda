<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub" style="color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Health — P31 Labs</title>
<meta name="description" content="Real-time health status of all P31 Labs Cloudflare Workers and services.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- R08: P31 telemetry -->
<script src="/p31-telemetry.js" defer></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-void: #0f1115;
  --bg-panel: #161921;
  --bg-card: #1c2028;
  --coral: #ff6b6b;
  --teal: #4ecdc4;
  --phosphor: #e8ff6b;
  --green: #51cf66;
  --red: #ff6b6b;
  --yellow: #ffd43b;
  --text: #e2e8f0;
  --text-dim: #718096;
  --border: rgba(255,255,255,0.06);
  --font: 'JetBrains Mono', monospace;
}
html { background: var(--bg-void); color: var(--text); font-family: var(--font); }
body { min-height: 100vh; padding: 24px 20px; max-width: 960px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.15em; color: var(--teal); text-transform: uppercase; }
.header .subtitle { font-size: 0.7rem; color: var(--text-dim); }
.last-check { font-size: 0.65rem; color: var(--text-dim); }

/* Status banner */
.status-banner { padding: 12px 16px; border-radius: 6px; margin-bottom: 24px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid; }
.status-banner.all-ok { background: rgba(81,207,102,0.08); border-color: rgba(81,207,102,0.3); color: var(--green); }
.status-banner.degraded { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); color: var(--red); }
.status-banner.checking { background: rgba(255,212,59,0.08); border-color: rgba(255,212,59,0.3); color: var(--yellow); }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; transition: border-color 0.2s; }
.card.ok { border-left: 3px solid var(--green); }
.card.fail { border-left: 3px solid var(--red); }
.card.checking { border-left: 3px solid var(--yellow); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-name { font-size: 0.8rem; font-weight: 700; color: var(--text); }
.card-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; }
.badge-ok { background: rgba(81,207,102,0.15); color: var(--green); border: 1px solid rgba(81,207,102,0.3); }
.badge-fail { background: rgba(255,107,107,0.15); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }
.badge-checking { background: rgba(255,212,59,0.15); color: var(--yellow); border: 1px solid rgba(255,212,59,0.3); }

.card-domain { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; }
.card-latency { font-size: 0.65rem; color: var(--text-dim); }
.card-latency span { color: var(--teal); }
.card-error { font-size: 0.65rem; color: var(--red); margin-top: 4px; word-break: break-all; }

/* Nav */
.nav { margin-top: 32px; font-size: 0.65rem; color: var(--text-dim); display: flex; gap: 16px; flex-wrap: wrap; }
.nav a { color: var(--coral); text-decoration: none; }
.nav a:hover { text-decoration: underline; }

/* Refresh btn */
.refresh-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); font-family: var(--font); font-size: 0.65rem; padding: 4px 12px; border-radius: 4px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
.refresh-btn:hover { border-color: var(--teal); color: var(--teal); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>System Health</h1>
    <div class="subtitle">P31 Labs — Cloudflare Workers</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <span class="last-check" id="last-check">Checking…</span>
    <button class="refresh-btn" onclick="runChecks()">↻ Refresh</button>
  </div>
</div>

<div class="status-banner checking" id="status-banner">● Checking all systems…</div>

<div class="grid" id="grid"></div>

<nav class="nav">
  <a href="/">← Hub</a>
  <a href="/telemetry.html">Telemetry →</a>
</nav>

<script>
const WORKERS = [
  { name: 'bonding-relay',      url: 'https://bonding-relay.trimtab-signal.workers.dev/health',  purpose: 'BONDING multiplayer relay' },
  { name: 'spaceship-relay',    url: 'https://spaceship-relay.trimtab-signal.workers.dev/health', purpose: 'Spaceship Earth telemetry' },
  { name: 'genesis-gate',       url: 'https://genesis.p31ca.org/health',                          purpose: 'Central event bus' },
  { name: 'p31-cortex',         url: 'https://p31-cortex.trimtab-signal.workers.dev/health',      purpose: 'AI multi-agent cortex' },
  { name: 'kenosis-mesh',       url: 'https://kenosis-mesh.trimtab-signal.workers.dev/health',    purpose: 'K4 7-node mesh' },
  { name: 'p31-telemetry',      url: 'https://p31-telemetry.trimtab-signal.workers.dev/health',   purpose: 'Performance telemetry' },
  { name: 'p31-kofi-webhook',   url: 'https://kofi.p31ca.org/health',                             purpose: 'Ko-fi payments' },
  { name: 'p31-social-worker',  url: 'https://social.p31ca.org/health',                           purpose: 'Social automation' },
  { name: 'donate-api',         url: 'https://donate-api.phosphorus31.org/health',                purpose: 'Stripe checkout' },
];

async function checkWorker(w) {
  const start = Date.now();
  try {
    const res = await fetch(w.url, { signal: AbortSignal.timeout(8000) });
    const latency = Date.now() - start;
    return { ...w, ok: res.ok, status: res.status, latency, error: null };
  } catch (e) {
    return { ...w, ok: false, status: 0, latency: null, error: e.message };
  }
}

function renderCard(result) {
  const state = result.ok ? 'ok' : result.latency === null ? 'fail' : 'fail';
  const badge = result.ok ? 'ok' : 'fail';
  const latencyText = result.latency !== null
    ? `<span>${result.latency}ms</span>`
    : '<span style="color:var(--red)">timeout</span>';
  return `
    <div class="card ${state}">
      <div class="card-header">
        <span class="card-name">${result.name}</span>
        <span class="card-badge badge-${badge}">${result.ok ? '● OK' : '● FAIL'}</span>
      </div>
      <div class="card-domain">${result.purpose}</div>
      <div class="card-latency">Latency: ${latencyText}</div>
      ${result.error ? `<div class="card-error">${result.error}</div>` : ''}
    </div>`;
}

async function runChecks() {
  const grid = document.getElementById('grid');
  const banner = document.getElementById('status-banner');
  const lastCheck = document.getElementById('last-check');

  banner.className = 'status-banner checking';
  banner.textContent = '● Checking all systems…';

  // Render checking state
  grid.innerHTML = WORKERS.map(w => `
    <div class="card checking">
      <div class="card-header">
        <span class="card-name">${w.name}</span>
        <span class="card-badge badge-checking">● …</span>
      </div>
      <div class="card-domain">${w.purpose}</div>
    </div>`).join('');

  const results = await Promise.all(WORKERS.map(checkWorker));

  grid.innerHTML = results.map(renderCard).join('');

  const failCount = results.filter(r => !r.ok).length;
  if (failCount === 0) {
    banner.className = 'status-banner all-ok';
    banner.textContent = `● All ${results.length} systems operational`;
  } else {
    banner.className = 'status-banner degraded';
    banner.textContent = `● ${failCount} system${failCount > 1 ? 's' : ''} degraded`;
  }

  lastCheck.textContent = 'Last check: ' + new Date().toLocaleTimeString();

  if (window.p31) window.p31.track('health_check', { pass: results.length - failCount, fail: failCount });
}

runChecks();
setInterval(runChecks, 60_000);
</script>
</body>
</html>
