<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORGE | Special Interest Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/p31-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --phosphorus: #3ba372; }
        body { overflow: hidden; background: var(--p31-void); color: var(--p31-cloud); font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; }
        #graph-container { position: absolute; inset: 0; z-index: 1; }
        svg { width: 100%; height: 100%; }

        #ui { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.6rem; }
        .glass { background: rgba(22,25,32,0.88); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; pointer-events: auto; }
        .panel { display: flex; gap: 0.5rem; width: 100%; max-width: 560px; padding: 0.85rem; align-items: center; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #d8d6d0; padding: 0.65rem 0.9rem; border-radius: 8px; outline: none; font-family: 'Atkinson Hyperlegible', sans-serif; flex: 1; min-width: 0; }
        input::placeholder { color: rgba(216,214,208,0.35); }
        .add-btn { background: var(--phosphorus); color: var(--p31-void); font-weight: 700; border: none; padding: 0.65rem 1.1rem; border-radius: 8px; cursor: pointer; font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; white-space: nowrap; transition: 0.15s; }
        .add-btn:hover { background: #4dcf90; }
        .hint { font-size: 10px; color: rgba(216,214,208,0.3); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; pointer-events: none; }
        .back { color: rgba(59,163,114,0.55); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-decoration: none; padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(59,163,114,0.15); background: rgba(22,25,32,0.7); }

        /* Node tooltip */
        #tooltip { position: absolute; z-index: 20; pointer-events: none; background: rgba(22,25,32,0.95); border: 1px solid rgba(59,163,114,0.4); border-radius: 10px; padding: 0.75rem 1rem; font-size: 12px; max-width: 200px; display: none; }
        #tooltip .t-name { font-family: 'JetBrains Mono', monospace; color: var(--phosphorus); font-weight: 700; margin-bottom: 4px; }
        #tooltip .t-count { color: rgba(216,214,208,0.5); font-size: 11px; }

        /* Side drawer */
        #drawer { position: absolute; right: 0; top: 0; bottom: 0; width: 280px; z-index: 15; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        #drawer.open { transform: translateX(0); }
        .drawer-inner { background: rgba(22,25,32,0.97); border-left: 1px solid rgba(59,163,114,0.2); height: 100%; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
        .drawer-title { font-family: 'JetBrains Mono', monospace; color: var(--phosphorus); font-weight: 700; font-size: 1rem; }
        .drawer-close { position: absolute; top: 1rem; right: 1rem; background: none; border: 1px solid rgba(255,255,255,0.1); color: #d8d6d0; border-radius: 6px; cursor: pointer; padding: 4px 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .entry-form { display: flex; flex-direction: column; gap: 0.5rem; }
        .entry-form textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #d8d6d0; padding: 0.65rem; border-radius: 8px; resize: none; font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 13px; outline: none; min-height: 70px; }
        .entry-form button { background: var(--phosphorus); color: var(--p31-void); border: none; border-radius: 8px; padding: 0.6rem; font-weight: 700; cursor: pointer; font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; }
        .entry-list { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; overflow-y: auto; }
        .entry-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 0.65rem; font-size: 12px; color: rgba(216,214,208,0.7); line-height: 1.4; }
        .entry-date { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(216,214,208,0.25); margin-top: 4px; }
        .export-btn { background: rgba(59,163,114,0.1); border: 1px solid rgba(59,163,114,0.3); color: var(--phosphorus); border-radius: 8px; padding: 0.6rem; font-size: 12px; cursor: pointer; font-family: 'JetBrains Mono', monospace; text-align: center; }
        .export-btn:hover { background: rgba(59,163,114,0.2); }

        #loading { position: fixed; inset: 0; background: var(--p31-void); display: flex; align-items: center; justify-content: center; z-index: 100; font-family: var(--p31-font-mono), 'JetBrains Mono', monospace; color: rgba(59,163,114,0.6); font-size: 13px; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div id="loading">INITIALIZING VAULT…</div>
    <div id="graph-container"><svg id="svg"></svg></div>

    <div id="ui">
        <div class="flex w-full" style="display:flex; gap:0.75rem; max-width:560px; align-items:center;">
            <form id="topic-form" class="glass panel" style="flex:1; margin:0;">
                <input type="text" id="topic-input" placeholder="Add a special interest…" autocomplete="off" required>
                <button type="submit" class="add-btn">Forge</button>
            </form>
            <a href="forge.html" class="back glass" style="white-space:nowrap;">← FORGE</a>
        </div>
        <div class="hint">Click a node to add entries · Drag to rearrange · Double-click to link</div>
    </div>

    <div id="tooltip">
        <div class="t-name" id="tt-name"></div>
        <div class="t-count" id="tt-count"></div>
    </div>

    <div id="drawer">
        <div class="drawer-inner">
            <button class="drawer-close" id="drawer-close">✕</button>
            <div class="drawer-title" id="drawer-topic-name">—</div>
            <div class="entry-form">
                <textarea id="entry-text" placeholder="Add a note, link, or thought…" rows="3"></textarea>
                <button id="entry-submit">Add Entry</button>
            </div>
            <button class="export-btn" id="export-btn">Export .forge (JSON)</button>
            <div class="entry-list" id="entry-list"></div>
        </div>
    </div>

    <script>
        let SQL, database;
        let nodes = [], links = [];
        let selectedNodeId = null;
        let linkSource = null; // for double-click linking

        // D3 simulation
        let svg, sim, nodeGroup, linkGroup, W, H;

        async function init() {
            SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });

            // Load from localStorage (binary persistence)
            const saved = localStorage.getItem('forge_db');
            if (saved) {
                const arr = new Uint8Array(atob(saved).split('').map(c => c.charCodeAt(0)));
                database = new SQL.Database(arr);
            } else {
                database = new SQL.Database();
            }

            database.run(`
                CREATE TABLE IF NOT EXISTS topics (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT UNIQUE NOT NULL, created_at INTEGER);
                CREATE TABLE IF NOT EXISTS entries (id INTEGER PRIMARY KEY AUTOINCREMENT, topic_id INTEGER, body TEXT, created_at INTEGER, FOREIGN KEY(topic_id) REFERENCES topics(id));
                CREATE TABLE IF NOT EXISTS topic_links (a INTEGER, b INTEGER, PRIMARY KEY(a,b));
            `);

            document.getElementById('loading').style.display = 'none';
            initGraph();
            loadData();
        }

        function saveDB() {
            const data = database.export();
            const b64 = btoa(String.fromCharCode(...data));
            localStorage.setItem('forge_db', b64);
        }

        function loadData() {
            nodes = database.exec('SELECT id, name FROM topics ORDER BY id')[0]?.values.map(([id, name]) => {
                const count = database.exec(`SELECT COUNT(*) FROM entries WHERE topic_id=${id}`)[0]?.values[0][0] || 0;
                return { id, name, count, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200 };
            }) || [];

            const linkRows = database.exec('SELECT a, b FROM topic_links')[0]?.values || [];
            links = linkRows.map(([a, b]) => ({ source: a, target: b }));

            updateGraph();
        }

        function initGraph() {
            W = window.innerWidth; H = window.innerHeight;
            svg = d3.select('#svg').attr('viewBox', `0 0 ${W} ${H}`);
            linkGroup = svg.append('g').attr('class', 'links');
            nodeGroup = svg.append('g').attr('class', 'nodes');

            sim = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-280))
                .force('center', d3.forceCenter(W/2, H/2))
                .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 12))
                .on('tick', ticked);

            window.addEventListener('resize', () => {
                W = window.innerWidth; H = window.innerHeight;
                svg.attr('viewBox', `0 0 ${W} ${H}`);
                sim.force('center', d3.forceCenter(W/2, H/2)).alpha(0.1).restart();
            });
        }

        function nodeRadius(d) { return 28 + Math.min(d.count * 4, 32); }

        function updateGraph() {
            // Links
            const link = linkGroup.selectAll('line').data(links, d => `${d.source.id||d.source}-${d.target.id||d.target}`);
            link.enter().append('line').attr('stroke', 'rgba(59,163,114,0.25)').attr('stroke-width', 1.5);
            link.exit().remove();

            // Node groups
            const node = nodeGroup.selectAll('g.node').data(nodes, d => d.id);
            const nodeEnter = node.enter().append('g').attr('class', 'node').call(
                d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd)
            );

            // Depth rings (1 per 3 entries, max 4)
            nodeEnter.each(function(d) {
                const g = d3.select(this);
                const rings = Math.min(Math.floor(d.count / 3), 4);
                for (let r = rings; r >= 1; r--) {
                    g.append('circle')
                        .attr('r', nodeRadius(d) + r * 8)
                        .attr('fill', 'none')
                        .attr('stroke', 'rgba(59,163,114,0.08)')
                        .attr('stroke-width', 1)
                        .attr('class', 'ring');
                }
                g.append('circle').attr('class', 'body')
                    .attr('r', nodeRadius(d))
                    .attr('fill', 'rgba(22,25,32,0.92)')
                    .attr('stroke', '#3ba372')
                    .attr('stroke-width', 2);
                g.append('text').attr('class', 'label')
                    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                    .attr('fill', '#d8d6d0').attr('font-size', '12px')
                    .attr('font-family', 'Atkinson Hyperlegible, sans-serif')
                    .attr('pointer-events', 'none');
            });

            // Update all nodes
            nodeGroup.selectAll('g.node').each(function(d) {
                const g = d3.select(this);
                const r = nodeRadius(d);
                g.selectAll('.ring').remove();
                const rings = Math.min(Math.floor(d.count / 3), 4);
                for (let ri = rings; ri >= 1; ri--) {
                    g.insert('circle', '.body')
                        .attr('r', r + ri * 8)
                        .attr('fill', 'none')
                        .attr('stroke', 'rgba(59,163,114,0.08)')
                        .attr('stroke-width', 1)
                        .attr('class', 'ring');
                }
                g.select('.body').attr('r', r);
                const txt = d.name.length > 12 ? d.name.slice(0, 10) + '…' : d.name;
                g.select('.label').text(txt).attr('font-size', Math.max(10, Math.min(14, r * 0.45)) + 'px');
            });

            nodeGroup.selectAll('g.node')
                .on('click', (e, d) => { e.stopPropagation(); openDrawer(d); })
                .on('dblclick', (e, d) => {
                    e.stopPropagation();
                    if (!linkSource) {
                        linkSource = d;
                        d3.select(e.currentTarget).select('.body').attr('stroke', '#cda852');
                    } else if (linkSource.id !== d.id) {
                        addLink(linkSource.id, d.id);
                        d3.selectAll('.body').attr('stroke', '#3ba372');
                        linkSource = null;
                    }
                })
                .on('mouseover', (e, d) => {
                    const tt = document.getElementById('tooltip');
                    tt.style.display = 'block';
                    tt.style.left = (e.clientX + 14) + 'px';
                    tt.style.top = (e.clientY - 10) + 'px';
                    document.getElementById('tt-name').textContent = d.name;
                    document.getElementById('tt-count').textContent = `${d.count} entr${d.count === 1 ? 'y' : 'ies'}`;
                })
                .on('mouseout', () => { document.getElementById('tooltip').style.display = 'none'; });

            node.exit().remove();

            sim.nodes(nodes);
            sim.force('link').links(links);
            sim.alpha(0.3).restart();
        }

        function ticked() {
            linkGroup.selectAll('line')
                .attr('x1', d => (d.source.x||0)).attr('y1', d => (d.source.y||0))
                .attr('x2', d => (d.target.x||0)).attr('y2', d => (d.target.y||0));
            nodeGroup.selectAll('g.node')
                .attr('transform', d => `translate(${d.x||0},${d.y||0})`);
        }

        function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
        function dragEnd(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }

        // Topic form
        document.getElementById('topic-form').addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('topic-input').value.trim();
            if (!name) return;
            try {
                database.run('INSERT INTO topics (name, created_at) VALUES (?, ?)', [name, Date.now()]);
                saveDB();
                document.getElementById('topic-input').value = '';
                loadData();
            } catch(err) { /* duplicate name */ }
        });

        // Drawer
        function openDrawer(d) {
            selectedNodeId = d.id;
            document.getElementById('drawer-topic-name').textContent = d.name;
            document.getElementById('drawer').classList.add('open');
            loadEntries(d.id);
        }

        document.getElementById('drawer-close').addEventListener('click', () => {
            document.getElementById('drawer').classList.remove('open');
            selectedNodeId = null;
        });

        document.getElementById('entry-submit').addEventListener('click', () => {
            if (!selectedNodeId) return;
            const body = document.getElementById('entry-text').value.trim();
            if (!body) return;
            database.run('INSERT INTO entries (topic_id, body, created_at) VALUES (?, ?, ?)', [selectedNodeId, body, Date.now()]);
            saveDB();
            document.getElementById('entry-text').value = '';
            loadEntries(selectedNodeId);
            // Update node count
            const node = nodes.find(n => n.id === selectedNodeId);
            if (node) {
                node.count = database.exec(`SELECT COUNT(*) FROM entries WHERE topic_id=${selectedNodeId}`)[0]?.values[0][0] || 0;
                updateGraph();
            }
        });

        function loadEntries(topicId) {
            const rows = database.exec(`SELECT body, created_at FROM entries WHERE topic_id=${topicId} ORDER BY created_at DESC`)[0]?.values || [];
            const list = document.getElementById('entry-list');
            list.innerHTML = rows.map(([body, ts]) => {
                const d = new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric', year: '2-digit' });
                return `<div class="entry-item">${escHtml(body)}<div class="entry-date">${d}</div></div>`;
            }).join('') || '<div style="font-size:11px;color:rgba(216,214,208,0.25);font-family:JetBrains Mono,monospace;">No entries yet.</div>';
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function addLink(a, b) {
            const [lo, hi] = a < b ? [a, b] : [b, a];
            try { database.run('INSERT INTO topic_links (a, b) VALUES (?, ?)', [lo, hi]); saveDB(); loadData(); } catch(e) {}
        }

        // Export
        document.getElementById('export-btn').addEventListener('click', () => {
            const topics = database.exec('SELECT * FROM topics')[0]?.values || [];
            const entries = database.exec('SELECT * FROM entries')[0]?.values || [];
            const topicLinks = database.exec('SELECT * FROM topic_links')[0]?.values || [];
            const payload = JSON.stringify({ topics, entries, topicLinks, exported: new Date().toISOString() }, null, 2);
            const blob = new Blob([payload], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `forge-vault-${Date.now()}.forge`;
            a.click();
        });

        svg && svg.on('click', () => {
            if (linkSource) {
                d3.selectAll('.body').attr('stroke', '#3ba372');
                linkSource = null;
            }
        });

        init();
    </script>
</body>
</html>
