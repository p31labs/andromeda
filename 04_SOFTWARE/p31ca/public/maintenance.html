<script type="module">
  // Read ETA from query string or page meta — operator sets ?eta=2026-05-05
  const params = new URLSearchParams(location.search);
  const eta = params.get('eta') || document.querySelector('meta[name="maintenance-eta"]')?.content;
  if (eta) {
    try {
      const d = new Date(eta);
      if (!isNaN(d)) {
        const fmt = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        document.getElementById('eta-display').textContent = `Expected back: ${fmt}`;
      }
    } catch {}
  }

  // PHOS voice — only if speech available and user hasn't turned it off
  const voiceOff = localStorage.getItem('p31-phos-voice') === 'off';
  const motionReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!voiceOff && !motionReduced && 'speechSynthesis' in window) {
    const msg = document.getElementById('phos-msg').textContent.trim();
    const greet = "This page is getting some care. " + msg;
    setTimeout(() => {
      const utt = new SpeechSynthesisUtterance(greet);
      utt.rate = 0.92;
      window.speechSynthesis.speak(utt);
    }, 800);
  }
</script>
