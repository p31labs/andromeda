<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1115">
    <title>FORGE | Special Interest Vault | P31 Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--void:#0f1115;--surface:#161920;--teal:#25897d;--cyan:#4db8a8;--cloud:#d8d6d0;--butter:#cda852;--lav:#8b7cc9;--coral:#cc6247;--phos:#3ba372}
        body{background:var(--void);color:var(--cloud);font-family:'Atkinson Hyperlegible',sans-serif;min-height:100vh;display:flex;flex-direction:column}
        header{padding:12px 20px;background:rgba(15,17,21,0.95);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--cloud);font-weight:700}
        a.back{color:rgba(216,214,208,0.4);font-family:'JetBrains Mono',monospace;font-size:12px;text-decoration:none}
        a.back:hover{color:var(--cloud)}
        .layout{flex:1;display:grid;grid-template-columns:260px 1fr;min-height:0}
        @media(max-width:600px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
        .sidebar{background:var(--surface);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow-y:auto}
        .sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .search-box{width:100%;background:var(--void);border:1px solid rgba(255,255,255,0.08);color:var(--cloud);padding:8px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;margin-bottom:10px}
        .search-box:focus{border-color:var(--teal)}
        .cat-list{padding:8px}
        .cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:all 0.15s}
        .cat-item:hover,.cat-item.active{background:rgba(255,255,255,0.04)}
        .cat-item.active{border-left:2px solid var(--teal);padding-left:8px}
        .cat-name{font-size:13px}
        .cat-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(216,214,208,0.3);background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:10px}
        .cat-add{padding:10px;border-top:1px solid rgba(255,255,255,0.05)}
        .cat-add input{width:100%;background:var(--void);border:1px solid rgba(255,255,255,0.08);color:var(--cloud);padding:7px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
        .cat-add input:focus{border-color:var(--teal)}
        .main-area{display:flex;flex-direction:column;overflow:hidden}
        .main-toolbar{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
        .main-title{font-size:16px;font-weight:700;flex:1}
        button{font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--cloud);transition:all 0.2s}
        button:hover{border-color:var(--teal);color:var(--teal)}
        .btn-primary{border-color:var(--teal);color:var(--teal);background:rgba(37,137,125,0.1)}
        .btn-primary:hover{background:rgba(37,137,125,0.25)}
        .items-grid{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;align-content:start}
        .item-card{background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:border-color 0.2s;position:relative}
        .item-card:hover{border-color:rgba(255,255,255,0.12)}
        .item-card:hover .item-del{opacity:1}
        .item-emoji{font-size:24px}
        .item-title{font-weight:700;font-size:14px}
        .item-desc{font-size:12px;color:rgba(216,214,208,0.55);line-height:1.5}
        .item-tags{display:flex;gap:4px;flex-wrap:wrap}
        .item-tag{padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(37,137,125,0.1);color:var(--teal);border:1px solid rgba(37,137,125,0.2)}
        .item-del{position:absolute;top:10px;right:10px;opacity:0;background:transparent;border:none;color:rgba(204,98,71,0.6);cursor:pointer;font-size:14px;padding:2px 6px;transition:opacity 0.2s}
        .item-del:hover{color:var(--coral)}
        .item-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(216,214,208,0.2)}
        .empty-state{padding:48px;text-align:center;color:rgba(216,214,208,0.2);font-family:'JetBrains Mono',monospace;font-size:13px;grid-column:1/-1}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-box{background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:28px;width:440px;max-width:90vw}
        .modal-box h3{font-size:16px;margin-bottom:16px;color:var(--butter)}
        .modal-box input,.modal-box textarea,.modal-box select{width:100%;background:var(--void);border:1px solid rgba(255,255,255,0.1);color:var(--cloud);padding:10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;margin-bottom:10px}
        .modal-box input:focus,.modal-box textarea:focus{border-color:var(--teal)}
        .modal-box textarea{min-height:80px;resize:vertical}
        .modal-actions{display:flex;gap:8px;justify-content:flex-end}
        .emoji-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
        .ep-opt{font-size:20px;cursor:pointer;padding:4px;border-radius:4px;transition:background 0.1s}
        .ep-opt:hover,.ep-opt.sel{background:rgba(255,255,255,0.08)}
        .stats-bar{display:flex;gap:20px;padding:12px 20px;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0}
        .stat{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(216,214,208,0.3)}
        .stat span{color:var(--teal)}
    </style>
</head>
<body>
<header>
    <a href="/" class="logo">
        <svg width="24" height="24" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#25897d"/><circle cx="390" cy="120" r="48" fill="#cc6247"/><text x="256" y="340" font-family="system-ui" font-weight="900" font-size="220" fill="#d8d6d0" text-anchor="middle">P31</text><rect x="156" y="380" width="200" height="16" rx="8" fill="#cda852"/></svg>
        FORGE
    </a>
    <div style="display:flex;gap:10px;align-items:center">
        <button id="btn-export" style="font-size:11px;padding:5px 10px">Export JSON</button>
        <a href="/" class="back">← Hub</a>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <input class="search-box" id="search" placeholder="Search interests…">
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(216,214,208,0.3)">Categories</div>
        </div>
        <div class="cat-list" id="cat-list"></div>
        <div class="cat-add">
            <input id="new-cat" placeholder="+ New category…" maxlength="30">
        </div>
    </div>
    <div class="main-area">
        <div class="main-toolbar">
            <span class="main-title" id="main-title">All Interests</span>
            <button class="btn-primary" id="btn-add-item">+ Add Interest</button>
        </div>
        <div class="items-grid" id="items-grid"></div>
        <div class="stats-bar">
            <div class="stat">Items: <span id="stat-items">0</span></div>
            <div class="stat">Categories: <span id="stat-cats">0</span></div>
            <div class="stat">Tags: <span id="stat-tags">0</span></div>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modal-title">Add Interest</h3>
        <div class="emoji-picker" id="emoji-picker"></div>
        <input id="item-name" placeholder="Name / title" maxlength="60">
        <textarea id="item-desc" placeholder="Notes, why it matters, links, references…"></textarea>
        <input id="item-tags" placeholder="Tags (comma separated)">
        <select id="item-cat"><option value="">Uncategorized</option></select>
        <div class="modal-actions">
            <button id="btn-cancel-modal">Cancel</button>
            <button class="btn-primary" id="btn-save-item">Save</button>
        </div>
    </div>
</div>

<script>
const DB_KEY = 'forge-vault';
const EMOJIS = ['🔬','🧠','🎵','📚','🌿','⚛️','🔭','🎨','🏗️','🧬','💡','🌊','🎯','🔮','🧩','🦠','🌌','📐','🎭','🦋'];
let selectedEmoji = '🔬';
let selectedCat = null;
let searchQ = '';
let editId = null;

function load() {
    try { return JSON.parse(localStorage.getItem(DB_KEY)) || {cats:['Physics','Music','Biology','Chemistry','Math'],items:[
        {id:1,name:'³¹P NMR Spectroscopy',desc:'Phosphorus-31 Larmor precession at 863 Hz in Earth\'s magnetic field. Core to the P31 Labs identity.',tags:['nmr','physics','phosphorus'],cat:'Physics',emoji:'⚛️',date:'2026-04-01'},
        {id:2,name:'K₄ Graph Theory',desc:'Complete graph on 4 vertices. Planar, volumetric enclosure. β₂=1. Foundation of the Sovereign Stack architecture.',tags:['graph','topology','math'],cat:'Math',emoji:'🔮',date:'2026-04-05'},
        {id:3,name:'Echolalia & Script Practice',desc:'Involuntary and voluntary repetition of speech for regulation and communication. Using ECHO app for safe practice.',tags:['audhd','stim','language'],cat:'Biology',emoji:'🧠',date:'2026-04-10'},
    ]}; }
    catch(e){return {cats:[],items:[]};}
}
function save(d){localStorage.setItem(DB_KEY,JSON.stringify(d));}

function render() {
    const d = load();
    const cats = d.cats;
    const items = d.items;

    // Stats
    const allTags = new Set(items.flatMap(i=>i.tags||[]));
    document.getElementById('stat-items').textContent = items.length;
    document.getElementById('stat-cats').textContent = cats.length;
    document.getElementById('stat-tags').textContent = allTags.size;

    // Categories
    const catList = document.getElementById('cat-list');
    catList.innerHTML = '';
    const allDiv = document.createElement('div');
    allDiv.className = 'cat-item'+(selectedCat===null?' active':'');
    allDiv.innerHTML = `<span class="cat-name">All</span><span class="cat-count">${items.length}</span>`;
    allDiv.onclick = () => { selectedCat=null; render(); };
    catList.appendChild(allDiv);

    cats.forEach(cat => {
        const count = items.filter(i=>i.cat===cat).length;
        const div = document.createElement('div');
        div.className = 'cat-item'+(selectedCat===cat?' active':'');
        div.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-count">${count}</span>`;
        div.onclick = () => { selectedCat=cat; render(); };
        catList.appendChild(div);
    });

    // Update modal cat select
    const sel = document.getElementById('item-cat');
    sel.innerHTML = '<option value="">Uncategorized</option>';
    cats.forEach(c => { const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o); });

    // Main title
    document.getElementById('main-title').textContent = selectedCat || 'All Interests';

    // Filter items
    let filtered = items;
    if (selectedCat) filtered = filtered.filter(i=>i.cat===selectedCat);
    if (searchQ) {
        const q = searchQ.toLowerCase();
        filtered = filtered.filter(i=>
            i.name.toLowerCase().includes(q)||
            (i.desc||'').toLowerCase().includes(q)||
            (i.tags||[]).some(t=>t.toLowerCase().includes(q)));
    }

    // Render grid
    const grid = document.getElementById('items-grid');
    grid.innerHTML = '';
    if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No interests here yet.<br>Add your first one above.</div>';
        return;
    }
    filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <span class="item-emoji">${item.emoji||'🔬'}</span>
                <button class="item-del" onclick="deleteItem(${item.id},event)">✕</button>
            </div>
            <div class="item-title">${esc(item.name)}</div>
            ${item.desc?`<div class="item-desc">${esc(item.desc)}</div>`:''}
            ${(item.tags||[]).length?`<div class="item-tags">${item.tags.map(t=>`<span class="item-tag">${esc(t)}</span>`).join('')}</div>`:''}
            <div class="item-date">${item.date||''} ${item.cat?`· ${item.cat}`:''}</div>`;
        grid.appendChild(card);
    });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function deleteItem(id, e) {
    e.stopPropagation();
    const d = load();
    d.items = d.items.filter(i=>i.id!==id);
    save(d); render();
}

// Emoji picker
const picker = document.getElementById('emoji-picker');
EMOJIS.forEach(em => {
    const span = document.createElement('span');
    span.className = 'ep-opt'+(em===selectedEmoji?' sel':'');
    span.textContent = em;
    span.onclick = () => {
        selectedEmoji=em;
        document.querySelectorAll('.ep-opt').forEach(s=>s.classList.remove('sel'));
        span.classList.add('sel');
    };
    picker.appendChild(span);
});

// Add item modal
document.getElementById('btn-add-item').onclick = () => {
    editId=null;
    document.getElementById('modal-title').textContent='Add Interest';
    document.getElementById('item-name').value='';
    document.getElementById('item-desc').value='';
    document.getElementById('item-tags').value='';
    document.getElementById('item-cat').value=selectedCat||'';
    document.getElementById('modal').classList.add('show');
    setTimeout(()=>document.getElementById('item-name').focus(),50);
};

document.getElementById('btn-cancel-modal').onclick = () => document.getElementById('modal').classList.remove('show');

document.getElementById('btn-save-item').onclick = () => {
    const name = document.getElementById('item-name').value.trim();
    if (!name) return;
    const d = load();
    const tags = document.getElementById('item-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const item = {
        id: Date.now(),
        name,
        desc: document.getElementById('item-desc').value.trim(),
        tags,
        cat: document.getElementById('item-cat').value||'',
        emoji: selectedEmoji,
        date: new Date().toISOString().slice(0,10)
    };
    d.items.unshift(item);
    save(d);
    document.getElementById('modal').classList.remove('show');
    render();
};

// New category
document.getElementById('new-cat').addEventListener('keydown', e => {
    if (e.key==='Enter') {
        const v = e.target.value.trim();
        if (!v) return;
        const d=load();
        if(!d.cats.includes(v)){d.cats.push(v);save(d);}
        e.target.value='';
        render();
    }
});

// Search
document.getElementById('search').addEventListener('input', e => {
    searchQ=e.target.value;render();
});

// Export
document.getElementById('btn-export').onclick = () => {
    const d=load();
    const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='forge-vault.json';a.click();
};

render();
</script>
</body>
</html>
