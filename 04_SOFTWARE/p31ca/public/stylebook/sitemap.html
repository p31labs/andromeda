  <style>
    /* Tree visualization */
    .smap-tree {
      font-family: var(--p31-font-mono);
      font-size: 13px;
      line-height: 1.7;
      background: var(--p31-void);
      border: 1px solid var(--p31-border-subtle);
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
    }
    .smap-tree ul {
      list-style: none;
      padding-left: 24px;
      margin: 0;
      position: relative;
    }
    .smap-tree > ul { padding-left: 0; }
    .smap-tree li {
      position: relative;
      padding-left: 24px;
    }
    .smap-tree li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--p31-border-subtle);
    }
    .smap-tree li:last-child::before {
      bottom: 50%;
    }
    .smap-tree li::after {
      content: '';
      position: absolute;
      left: 0;
      top: 14px;
      width: 16px;
      height: 1px;
      background: var(--p31-border-subtle);
    }
    .smap-tree > ul > li::before,
    .smap-tree > ul > li::after { display: none; }
    .smap-tree > ul > li { padding-left: 0; }
    
    .smap-node {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .smap-node:hover { background: var(--p31-surface); }
    .smap-route {
      color: var(--p31-cyan);
      text-decoration: none;
    }
    .smap-route:hover { color: var(--p31-coral); }
    .smap-label {
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      font-size: 12px;
    }
    .smap-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .smap-tag.live { background: rgba(0,255,136,0.12); color: var(--p31-phosphor); }
    .smap-tag.dev { background: rgba(205,168,82,0.12); color: var(--p31-amber); }
    .smap-tag.draft { background: rgba(139,124,201,0.15); color: var(--p31-lavender); }
    .smap-tag.api { background: rgba(77,184,168,0.12); color: var(--p31-cyan); }
    .smap-tag.worker { background: rgba(204,98,71,0.12); color: var(--p31-coral); }
    .smap-tag.redirect { background: var(--p31-surface2); color: var(--p31-muted); }
    
    .smap-domain {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--p31-surface2);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .smap-domain-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .smap-domain-name {
      font-family: var(--p31-font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--p31-paper);
    }
    .smap-domain-meta {
      font-size: 11px;
      color: var(--p31-muted);
    }
    
    /* Visual map (graph) */
    .smap-graph {
      width: 100%;
      height: 480px;
      background: var(--p31-surface);
      border: 1px solid var(--p31-border-subtle);
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    .smap-graph::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--p31-border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--p31-border-subtle) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
      opacity: 0.4;
    }
    
    /* Routes table */
    .smap-routes {
      width: 100%;
      border-collapse: collapse;
      background: var(--p31-surface);
      border: 1px solid var(--p31-border-subtle);
      border-radius: 12px;
      overflow: hidden;
    }
    .smap-routes th {
      text-align: left;
      padding: 10px 14px;
      background: var(--p31-surface2);
      font-family: var(--p31-font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--p31-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--p31-border-subtle);
    }
    .smap-routes td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--p31-border-subtle);
      font-size: 13px;
      vertical-align: top;
    }
    .smap-routes tr:last-child td { border-bottom: none; }
    .smap-routes code {
      font-family: var(--p31-font-mono);
      font-size: 12px;
      color: var(--p31-cyan);
    }
    .smap-routes tr.hidden { display: none; }
    .smap-routes-search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .smap-routes-search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--p31-muted);
    }
    .smap-routes-search {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--p31-surface);
      border: 1px solid var(--p31-border-subtle);
      border-radius: 10px;
      color: var(--p31-cloud);
      font-family: var(--p31-font-sans);
      font-size: 14px;
      outline: none;
    }
    .smap-routes-search:focus {
      border-color: var(--p31-primary);
      box-shadow: 0 0 0 3px rgba(37,137,125,0.15);
    }
  </style>
</head>
