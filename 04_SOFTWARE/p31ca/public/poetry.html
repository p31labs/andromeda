<script>(function(){var r=document.documentElement;if(/[?&]alive=1(?:&|$)/.test(location.search))return;r.classList.add("p31-gray-rock");function wake(){r.classList.remove("p31-gray-rock")}document.addEventListener("pointerdown",wake,{once:true,capture:true});document.addEventListener("keydown",wake,{once:true,capture:true})})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIMINAL | Node Poetry Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/p31-style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: var(--p31-void); color: var(--p31-cloud); font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; padding: 1.25rem; box-sizing: border-box; display: flex; flex-direction: column; gap: 0.75rem; }
        .glass-input { background: rgba(22, 25, 32, 0.85); border: 1px solid rgba(139, 124, 201, 0.3); border-radius: 99px; padding: 0.9rem 1.4rem; color: var(--p31-cloud); width: 100%; font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; font-size: 1rem; outline: none; pointer-events: auto; backdrop-filter: blur(10px); transition: border-color 0.2s; }
        .glass-input:focus { border-color: #8b7cc9; }
        .btn { background: rgba(139, 124, 201, 0.12); border: 1px solid rgba(139, 124, 201, 0.3); color: #8b7cc9; padding: 0.5rem 1.1rem; border-radius: 99px; cursor: pointer; font-size: 0.85rem; font-family: var(--p31-font-sans), 'Atkinson Hyperlegible', sans-serif; transition: all 0.2s; pointer-events: auto; }
        .btn:hover { background: rgba(139, 124, 201, 0.22); }
        .btn.active { background: #8b7cc9; color: var(--p31-void); }
        .back-link { color: rgba(139,124,201,0.6); font-size: 11px; text-decoration: none; letter-spacing: 0.08em; font-family: var(--p31-font-mono), 'JetBrains Mono', monospace; pointer-events: auto; background: rgba(22,25,32,0.7); padding: 4px 10px; border-radius: 99px; border: 1px solid rgba(139,124,201,0.15); }
    </style>
<meta property="og:type" content="website">
<meta property="og:title" content="LIMINAL | Node Poetry Canvas">
<meta property="og:description" content="LIMINAL | Node Poetry Canvas">
<meta property="og:url" content="https://p31ca.org/poetry.html">
<meta name="twitter:card" content="summary_large_image">

</head>
<body>
<a href="#main" style="position:absolute;left:-9999px;top:0;padding:0.5rem 1rem;background:var(--p31-void);color:var(--p31-teal);font-size:0.875rem;z-index:9999;border-radius:0 0 4px 4px;text-decoration:none" onfocus="this.style.left='0'" onblur="this.style.left='-9999px'">Skip to main content</a>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="flex items-center gap-3 max-w-2xl w-full mx-auto">
            <form id="word-form" style="flex:1; pointer-events:auto;">
                <input type="text" id="word-input" class="glass-input" placeholder="Type a thought and press enter..." autocomplete="off">
            </form>
            <a href="liminal.html" class="back-link">← LIMINAL</a>
        </div>
        <div class="flex gap-2 justify-center pointer-events-auto">
            <button class="btn active" id="btn-gravity">Gravity: ON</button>
            <button class="btn" id="btn-clear">Clear Mind</button>
        </div>
        <p class="text-center text-xs text-gray-600 tracking-widest uppercase pointer-events-none">Drag words to arrange · Toggle gravity to float</p>
    </div>

    <script>
        const Engine = Matter.Engine, Runner = Matter.Runner, Bodies = Matter.Bodies,
              Composite = Matter.Composite, Mouse = Matter.Mouse, MouseConstraint = Matter.MouseConstraint;

        const engine = Engine.create();
        const container = document.getElementById('canvas-container');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        container.appendChild(canvas);

        let width = window.innerWidth, height = window.innerHeight;
        let words = [], gravityEnabled = true;

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            Matter.Body.setPosition(floor, { x: width / 2, y: height + 50 });
            Matter.Body.setPosition(leftWall, { x: -50, y: height / 2 });
            Matter.Body.setPosition(rightWall, { x: width + 50, y: height / 2 });
        }

        const opts = { isStatic: true };
        const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, opts);
        const leftWall = Bodies.rectangle(-50, height / 2, 100, height * 2, opts);
        const rightWall = Bodies.rectangle(width + 50, height / 2, 100, height * 2, opts);
        Composite.add(engine.world, [floor, leftWall, rightWall]);

        const mouse = Mouse.create(canvas);
        const mConstraint = MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.1, render: { visible: false } } });
        Composite.add(engine.world, mConstraint);

        // Prevent canvas touch from scrolling
        canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

        document.getElementById('word-form').addEventListener('submit', e => {
            e.preventDefault();
            const text = document.getElementById('word-input').value.trim();
            if (!text) return;

            ctx.font = "18px 'Atkinson Hyperlegible'";
            const tw = ctx.measureText(text).width;
            const radius = Math.max(tw / 2 + 18, 32);

            const body = Bodies.circle(
                Math.random() * (width - 120) + 60, -60, radius,
                { restitution: 0.55, friction: 0.08 }
            );
            body.text = text;
            body.radius = radius;
            words.push(body);
            Composite.add(engine.world, body);
            document.getElementById('word-input').value = '';
        });

        document.getElementById('btn-gravity').addEventListener('click', e => {
            gravityEnabled = !gravityEnabled;
            engine.world.gravity.y = gravityEnabled ? 1 : 0;
            e.target.innerText = `Gravity: ${gravityEnabled ? 'ON' : 'OFF'}`;
            e.target.classList.toggle('active');
            if (!gravityEnabled) {
                words.forEach(w => Matter.Body.applyForce(w, w.position, {
                    x: (Math.random() - 0.5) * 0.04,
                    y: (Math.random() - 0.5) * 0.04
                }));
            }
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            words.forEach(w => Composite.remove(engine.world, w));
            words = [];
        });

        // Starfield background
        const stars = Array.from({ length: 120 }, () => ({
            x: Math.random(), y: Math.random(),
            r: Math.random() * 1.2 + 0.3,
            a: Math.random() * 0.4 + 0.1
        }));

        function render() {
            // Dark background with very subtle trail
            ctx.fillStyle = 'rgba(15,17,21,0.92)';
            ctx.fillRect(0, 0, width, height);

            // Stars
            stars.forEach(s => {
                ctx.globalAlpha = s.a;
                ctx.fillStyle = '#d8d6d0';
                ctx.beginPath();
                ctx.arc(s.x * width, s.y * height, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Word bubbles
            words.forEach(body => {
                const pos = body.position;
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(body.angle);

                // Glow
                const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, body.radius);
                grd.addColorStop(0, 'rgba(139,124,201,0.15)');
                grd.addColorStop(1, 'rgba(139,124,201,0)');
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(0, 0, body.radius * 1.3, 0, Math.PI * 2);
                ctx.fill();

                // Circle
                ctx.beginPath();
                ctx.arc(0, 0, body.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(22,25,32,0.75)';
                ctx.fill();
                ctx.lineWidth = 1.2;
                ctx.strokeStyle = 'rgba(139,124,201,0.45)';
                ctx.stroke();

                // Text
                ctx.fillStyle = '#d8d6d0';
                ctx.font = "17px 'Atkinson Hyperlegible'";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(body.text, 0, 0);

                ctx.restore();
            });
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        resize();
        Runner.run(Runner.create(), engine);
        render();

        // Seed initial words
        const seeds = ['breathe', 'settle', 'float'];
        seeds.forEach((w, i) => setTimeout(() => {
            document.getElementById('word-input').value = w;
            document.getElementById('word-form').dispatchEvent(new Event('submit'));
        }, 400 + i * 600));
    </script>
</body>
</html>
