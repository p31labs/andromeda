<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIOM | Posner Molecule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/p31-style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: var(--p31-void); color: var(--p31-cloud); font-family: var(--p31-font-mono), 'JetBrains Mono', monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; padding: 1.5rem; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .glass-panel { background: rgba(22, 25, 32, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 12px; padding: 1.5rem; pointer-events: auto; }
        .tol-ca { color: #332288; font-weight: bold; }
        .tol-p { color: #88CCEE; font-weight: bold; }
        .tol-o { color: #CC6677; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #3ba372; margin-right: 8px; box-shadow: 0 0 8px #3ba372; }
        .back-link { color: rgba(59,163,114,0.6); font-size: 12px; text-decoration: none; letter-spacing: 0.08em; pointer-events: auto; }
        .back-link:hover { color: #3ba372; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="flex justify-between items-start">
            <div class="glass-panel max-w-xs">
                <h1 class="text-xl font-bold mb-1 flex items-center"><span class="status-dot"></span>AXIOM · Posner Molecule</h1>
                <p class="text-xs text-gray-400 mb-3 uppercase tracking-widest">Ca₉(PO₄)₆ — Exploded View</p>
                <p class="text-xs leading-relaxed text-gray-300 mb-3">
                    <span class="tol-ca">■ Calcium (Ca)</span> · 9 ions · protective outer cage<br>
                    <span class="tol-p">■ Phosphorus (P)</span> · 6 groups · quantum bridge<br>
                    <span class="tol-o">■ Oxygen (O)</span> · 24 atoms · binding scaffold
                </p>
                <p class="text-xs text-gray-500">P31 quantum cognition basis · 863 Hz ³¹P Larmor field</p>
            </div>
            <a href="axiom.html" class="back-link glass-panel py-2 px-3">← AXIOM</a>
        </div>
        <div class="text-center text-xs text-gray-600 tracking-widest uppercase pb-2">
            Touch & drag to rotate · Pinch to zoom
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f1115, 0.018);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x8b7cc9, 0.4);
        backLight.position.set(-10, -10, -10);
        scene.add(backLight);

        // Tol Accessible Palette materials
        const matCa = new THREE.MeshStandardMaterial({ color: 0x332288, roughness: 0.2, metalness: 0.3, emissive: 0x110a33 });
        const matP  = new THREE.MeshStandardMaterial({ color: 0x88CCEE, roughness: 0.4, emissive: 0x0a2030 });
        const matO  = new THREE.MeshStandardMaterial({ color: 0xCC6677, roughness: 0.5, transparent: true, opacity: 0.9 });
        const matBond = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 });

        // Larmor pulse ring
        const ringGeo = new THREE.TorusGeometry(1.5, 0.06, 8, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x3ba372, transparent: true, opacity: 0.7 });
        const larmorRing = new THREE.Mesh(ringGeo, ringMat);
        scene.add(larmorRing);

        const molecule = new THREE.Group();
        scene.add(molecule);
        const geoAtom = new THREE.SphereGeometry(1, 32, 32);

        function addAtom(mat, scale, x, y, z) {
            const m = new THREE.Mesh(geoAtom, mat);
            m.scale.setScalar(scale);
            m.position.set(x, y, z);
            molecule.add(m);
            return m;
        }

        function addBond(v1, v2) {
            const dist = v1.distanceTo(v2);
            const geo = new THREE.CylinderGeometry(0.08, 0.08, dist, 6);
            const m = new THREE.Mesh(geo, matBond);
            m.position.copy(v1).lerp(v2, 0.5);
            m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), v2.clone().sub(v1).normalize());
            molecule.add(m);
        }

        // Ca₉ positions — 1 center + 4 upper ring + 4 lower ring
        const caPos = [new THREE.Vector3(0, 0, 0)];
        for (let i = 0; i < 4; i++) {
            const a = (i / 4) * Math.PI * 2;
            caPos.push(new THREE.Vector3(Math.cos(a) * 3, 3, Math.sin(a) * 3));
            caPos.push(new THREE.Vector3(Math.cos(a) * 3, -3, Math.sin(a) * 3));
        }
        caPos.forEach(p => addAtom(matCa, 0.8, p.x, p.y, p.z));

        // 6 PO₄ groups
        const pPos = [];
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const y = i % 2 === 0 ? 1.8 : -1.8;
            const p = new THREE.Vector3(Math.cos(a) * 6, y, Math.sin(a) * 6);
            pPos.push(p);
            addAtom(matP, 0.55, p.x, p.y, p.z);

            // 4 oxygen per phosphate
            for (let j = 0; j < 4; j++) {
                const ax = (j / 4) * Math.PI * 2;
                const ay = j % 2 === 0 ? 0.8 : -0.8;
                const oPos = new THREE.Vector3(p.x + Math.cos(ax) * 1.3, p.y + ay, p.z + Math.sin(ax) * 1.3);
                addAtom(matO, 0.38, oPos.x, oPos.y, oPos.z);
                addBond(p, oPos);
            }

            // Bond to nearest Ca
            let nearest = caPos[0], minD = Infinity;
            caPos.forEach(c => { const d = c.distanceTo(p); if (d < minD) { minD = d; nearest = c; } });
            addBond(p, nearest);
        }

        // Battery-safe idle detection
        let isIdle = false, idleTimer, needsRender = true;
        function resetIdle() {
            isIdle = false; needsRender = true;
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { isIdle = true; }, 4000);
        }
        window.addEventListener('mousemove', resetIdle);
        window.addEventListener('touchmove', resetIdle, { passive: true });
        window.addEventListener('wheel', resetIdle);
        controls.addEventListener('change', () => { needsRender = true; });
        resetIdle();

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (controls.autoRotate || !isIdle || needsRender) {
                time += 0.016;
                controls.update();
                // Larmor ring pulse
                const pulse = 0.85 + Math.sin(time * 5.4) * 0.15; // 863 Hz scaled
                larmorRing.scale.setScalar(pulse);
                ringMat.opacity = 0.4 + Math.sin(time * 5.4) * 0.3;
                renderer.render(scene, camera);
                needsRender = false;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            needsRender = true;
        });

        animate();
    </script>
</body>
</html>
