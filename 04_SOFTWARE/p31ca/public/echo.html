<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1115">
    <title>ECHO | Vocal Loop Station | P31 Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--void:#0f1115;--surface:#161920;--teal:#25897d;--cyan:#4db8a8;--cloud:#d8d6d0;--butter:#cda852;--lav:#8b7cc9;--coral:#cc6247}
        body{background:var(--void);color:var(--cloud);font-family:'Atkinson Hyperlegible',sans-serif;min-height:100vh;display:flex;flex-direction:column}
        header{padding:12px 20px;background:rgba(15,17,21,0.95);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--cloud);font-weight:700}
        a.back{color:rgba(216,214,208,0.4);font-family:'JetBrains Mono',monospace;font-size:12px;text-decoration:none}
        a.back:hover{color:var(--cloud)}
        main{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%}
        h1{font-size:28px;margin-bottom:4px}
        .sub{color:var(--butter);font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:24px}
        .viz{width:100%;height:80px;background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:16px}
        .controls-main{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        button{font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 18px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--cloud);transition:all 0.2s}
        button:hover{border-color:var(--teal);color:var(--teal)}
        .btn-rec{border-color:var(--coral);color:var(--coral);background:rgba(204,98,71,0.1)}
        .btn-rec:hover{background:rgba(204,98,71,0.25)}
        .btn-rec.recording{background:rgba(204,98,71,0.3);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        .btn-play{border-color:var(--teal);color:var(--teal);background:rgba(37,137,125,0.1)}
        .btn-play:hover,.btn-play.active{background:rgba(37,137,125,0.25)}
        .loops-section{margin-bottom:24px}
        .section-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(216,214,208,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
        .loop-card{background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
        .loop-card.playing{border-color:var(--teal)}
        .loop-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0}
        .loop-viz{flex:1;height:32px;border-radius:4px;background:rgba(0,0,0,0.3);overflow:hidden;position:relative}
        .loop-waveform{position:absolute;inset:0}
        .loop-dur{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(216,214,208,0.4);width:40px;text-align:right}
        .loop-btns{display:flex;gap:6px}
        .loop-btn{padding:4px 10px;font-size:10px}
        .empty-loops{text-align:center;padding:32px;color:rgba(216,214,208,0.2);font-family:'JetBrains Mono',monospace;font-size:12px}
        .pitch-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;background:var(--surface);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:14px}
        .pitch-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(216,214,208,0.4);white-space:nowrap}
        input[type=range]{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;outline:none;-webkit-appearance:none;cursor:pointer}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--lav);cursor:pointer}
        .pitch-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--lav);width:40px;text-align:right}
        .status-bar{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(216,214,208,0.3);text-align:center;padding:8px}
        .rec-timer{font-size:16px;color:var(--coral);font-weight:bold}
    </style>
</head>
<body>
<header>
    <a href="/" class="logo">
        <svg width="24" height="24" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#25897d"/><circle cx="390" cy="120" r="48" fill="#cc6247"/><text x="256" y="340" font-family="system-ui" font-weight="900" font-size="220" fill="#d8d6d0" text-anchor="middle">P31</text><rect x="156" y="380" width="200" height="16" rx="8" fill="#cda852"/></svg>
        ECHO
    </a>
    <a href="/" class="back">← Hub</a>
</header>

<main>
    <h1>ECHO</h1>
    <div class="sub">Vocal Loop Station · Private · Offline</div>

    <canvas class="viz" id="viz-canvas"></canvas>

    <div class="controls-main">
        <button class="btn-rec" id="btn-rec">⏺ Record</button>
        <button class="btn-play" id="btn-all">▶ Play All</button>
        <button id="btn-stop-all">■ Stop All</button>
        <button id="btn-clear">✕ Clear All</button>
        <span class="rec-timer" id="rec-timer" style="display:none">⏺ 0.0s</span>
    </div>

    <div class="pitch-row">
        <span class="pitch-label">Pitch Shift</span>
        <input type="range" id="pitch-sl" min="-12" max="12" value="0" step="1">
        <span class="pitch-val" id="pitch-val">0</span>
        <span style="font-size:11px;color:rgba(216,214,208,0.3);font-family:'JetBrains Mono',monospace">semitones</span>
    </div>

    <div class="loops-section">
        <div class="section-title">Loops <span id="loop-count">(0/6)</span></div>
        <div id="loop-list">
            <div class="empty-loops" id="empty-msg">No loops yet — click Record to capture</div>
        </div>
    </div>

    <div class="status-bar" id="status">Ready · Click Record to begin · No audio stored outside your browser</div>
</main>

<script>
const vizCanvas = document.getElementById('viz-canvas');
const vizCtx = vizCanvas.getContext('2d');
let W, H;
function resizeViz() {
    W = vizCanvas.width = vizCanvas.offsetWidth;
    H = vizCanvas.height = vizCanvas.offsetHeight;
}
resizeViz();
window.addEventListener('resize', resizeViz);

let audioCtx = null;
let mediaStream = null;
let mediaRecorder = null;
let analyser = null;
let sourceNode = null;
let recording = false;
let recChunks = [];
let recStart = 0;
let recTimer = null;

const loops = []; // {buffer, duration, playing, source, gainNode, pitchShift}
const MAX_LOOPS = 6;

const btnRec = document.getElementById('btn-rec');
const btnAll = document.getElementById('btn-all');
const btnStopAll = document.getElementById('btn-stop-all');
const btnClear = document.getElementById('btn-clear');
const loopList = document.getElementById('loop-list');
const emptyMsg = document.getElementById('empty-msg');
const status = document.getElementById('status');
const recTimerEl = document.getElementById('rec-timer');
const pitchSlider = document.getElementById('pitch-sl');
const pitchVal = document.getElementById('pitch-val');

pitchSlider.addEventListener('input', () => {
    pitchVal.textContent = pitchSlider.value;
});

async function initAudio() {
    if (audioCtx) return true;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mediaStream = await navigator.mediaDevices.getUserMedia({audio: true});
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        sourceNode = audioCtx.createMediaStreamSource(mediaStream);
        sourceNode.connect(analyser);
        setStatus('Microphone ready');
        return true;
    } catch(e) {
        setStatus('Mic access denied — grant permission to record');
        return false;
    }
}

btnRec.addEventListener('click', async () => {
    if (recording) {
        stopRecording();
    } else {
        if (loops.length >= MAX_LOOPS) { setStatus('Max 6 loops — clear one first'); return; }
        const ok = await initAudio();
        if (!ok) return;
        startRecording();
    }
});

function startRecording() {
    recChunks = [];
    mediaRecorder = new MediaRecorder(mediaStream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.onstop = finishRecording;
    mediaRecorder.start();
    recording = true;
    recStart = Date.now();
    btnRec.textContent = '⏹ Stop';
    btnRec.classList.add('recording');
    recTimerEl.style.display = 'inline';
    recTimer = setInterval(() => {
        recTimerEl.textContent = '⏺ ' + ((Date.now()-recStart)/1000).toFixed(1) + 's';
    }, 100);
    setStatus('Recording…');
}

function stopRecording() {
    if (!mediaRecorder || !recording) return;
    mediaRecorder.stop();
    recording = false;
    clearInterval(recTimer);
    btnRec.textContent = '⏺ Record';
    btnRec.classList.remove('recording');
    recTimerEl.style.display = 'none';
}

async function finishRecording() {
    const blob = new Blob(recChunks, {type: 'audio/webm'});
    const arrayBuf = await blob.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
    const duration = audioBuf.duration;
    const pitchSemitones = parseInt(pitchSlider.value);
    const loop = {buffer: audioBuf, duration, playing: false, source: null, gainNode: null, pitchSemitones, id: Date.now()};
    loops.push(loop);
    renderLoops();
    setStatus(`Loop ${loops.length} captured · ${duration.toFixed(1)}s`);
}

function renderLoops() {
    const count = loops.length;
    document.getElementById('loop-count').textContent = `(${count}/6)`;
    emptyMsg.style.display = count === 0 ? 'block' : 'none';

    loopList.innerHTML = '';
    if (count === 0) { loopList.appendChild(emptyMsg); return; }

    loops.forEach((loop, i) => {
        const card = document.createElement('div');
        card.className = 'loop-card' + (loop.playing ? ' playing' : '');
        card.innerHTML = `
            <div class="loop-num">${i+1}</div>
            <canvas class="loop-waveform" id="wv-${loop.id}" height="32"></canvas>
            <span class="loop-dur">${loop.duration.toFixed(1)}s</span>
            <div class="loop-btns">
                <button class="loop-btn btn-play" onclick="toggleLoop(${loop.id})">${loop.playing?'■ Stop':'▶ Play'}</button>
                <button class="loop-btn" onclick="removeLoop(${loop.id})">✕</button>
            </div>`;
        loopList.appendChild(card);
        setTimeout(() => drawWaveform(loop, document.getElementById('wv-'+loop.id)), 10);
    });
    loopList.appendChild(emptyMsg);
}

function drawWaveform(loop, cvs) {
    if (!cvs) return;
    cvs.width = cvs.offsetWidth || 200;
    const c = cvs.getContext('2d');
    const data = loop.buffer.getChannelData(0);
    const step = Math.ceil(data.length / cvs.width);
    const h = cvs.height;
    c.clearRect(0, 0, cvs.width, h);
    c.strokeStyle = loop.playing ? '#4db8a8' : '#25897d';
    c.lineWidth = 1;
    c.beginPath();
    for (let x=0; x<cvs.width; x++) {
        let max = 0;
        for (let j=0; j<step; j++) { const v = Math.abs(data[x*step+j]||0); if(v>max)max=v; }
        const y = (1-max)*h/2;
        if (x===0) c.moveTo(x, h/2); else c.lineTo(x, h/2-max*h/2);
    }
    c.stroke();
    c.beginPath();
    for (let x=0; x<cvs.width; x++) {
        let max = 0;
        for (let j=0; j<step; j++) { const v = Math.abs(data[x*step+j]||0); if(v>max)max=v; }
        if (x===0) c.moveTo(x, h/2); else c.lineTo(x, h/2+max*h/2);
    }
    c.stroke();
}

function toggleLoop(id) {
    const loop = loops.find(l => l.id === id);
    if (!loop) return;
    if (loop.playing) stopLoop(loop);
    else playLoop(loop);
}

function playLoop(loop) {
    if (!audioCtx) return;
    const src = audioCtx.createBufferSource();
    src.buffer = loop.buffer;
    src.loop = true;
    const rate = Math.pow(2, loop.pitchSemitones / 12);
    src.playbackRate.value = rate;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.8;
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
    loop.source = src;
    loop.gainNode = gain;
    loop.playing = true;
    renderLoops();
}

function stopLoop(loop) {
    if (loop.source) { try { loop.source.stop(); } catch(e){} loop.source = null; }
    loop.playing = false;
    renderLoops();
}

function removeLoop(id) {
    const idx = loops.findIndex(l => l.id === id);
    if (idx === -1) return;
    stopLoop(loops[idx]);
    loops.splice(idx, 1);
    renderLoops();
    setStatus('Loop removed');
}

btnAll.addEventListener('click', async () => {
    const ok = await initAudio();
    if (!ok) return;
    loops.forEach(l => { if (!l.playing) playLoop(l); });
    setStatus('All loops playing');
});

btnStopAll.addEventListener('click', () => {
    loops.forEach(l => { if (l.playing) stopLoop(l); });
    setStatus('All stopped');
});

btnClear.addEventListener('click', () => {
    loops.forEach(l => stopLoop(l));
    loops.length = 0;
    renderLoops();
    setStatus('Cleared');
});

function setStatus(msg) { status.textContent = msg; }

// Visualizer
let dataArr;
function drawViz() {
    requestAnimationFrame(drawViz);
    if (!analyser) {
        vizCtx.fillStyle = '#161920';
        vizCtx.fillRect(0,0,W,H);
        vizCtx.fillStyle = 'rgba(37,137,125,0.3)';
        for(let x=0;x<W;x+=4){
            const y = H/2 + Math.sin(Date.now()*0.001+x*0.04)*8;
            vizCtx.fillRect(x,y,2,2);
        }
        return;
    }
    if (!dataArr) dataArr = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(dataArr);
    vizCtx.fillStyle = '#161920';
    vizCtx.fillRect(0,0,W,H);
    vizCtx.strokeStyle = recording ? '#cc6247' : '#25897d';
    vizCtx.lineWidth = 2;
    vizCtx.beginPath();
    const step = W / dataArr.length;
    for (let i=0;i<dataArr.length;i++) {
        const y = (dataArr[i]/128)*H/2;
        if (i===0) vizCtx.moveTo(0,y); else vizCtx.lineTo(i*step,y);
    }
    vizCtx.stroke();
}
drawViz();
renderLoops();
</script>
</body>
</html>
