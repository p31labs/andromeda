<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Q-Factor">
  <meta name="theme-color" content="#050505">
  <link rel="manifest" href="/pwa/manifest-qfactor.json">
  <link rel="apple-touch-icon" href="/pwa/p31-tetra-icon.svg">
  <title>Q-Factor — P31</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Noto+Serif:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { p31: { cloud: '#ede8e0', void: '#050505', emerald: '#10b981', violet: '#8b5cf6', coral: '#f43f5e', amber: '#f59e0b', slate: '#64748b' } },
          fontFamily: { serif: ['"Noto Serif"', 'serif'], mono: ['"JetBrains Mono"', 'monospace'], sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :root {
      --q: #10b981;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      background: #050505; color: #ede8e0; min-height: 100vh; font-family: 'Inter', sans-serif;
      background-image: radial-gradient(rgba(139,92,246,0.12) 1px, transparent 1px);
      background-size: 24px 24px; background-attachment: fixed;
    }
    .glass {
      background: rgba(12,12,18,0.78); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    /* Ring */
    .rg { fill: none; stroke: #16181f; stroke-width: 12; }
    .rf { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset .8s ease, stroke .4s; }
    /* Slider */
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%;
      background: var(--sc, #8b5cf6); cursor: pointer; margin-top: -11px;
      box-shadow: 0 0 10px var(--sc, #8b5cf6); border: 2px solid rgba(255,255,255,0.25);
    }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; }
    input[type=range]:focus { outline: none; }
    /* Pips */
    .pip { width: 13px; height: 13px; border-radius: 3px; background: #1e2229; transition: background .15s; flex-shrink: 0; }
    .pip.on { background: var(--q); }
    /* Spoon btns */
    .sb {
      width: 54px; height: 54px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(16,185,129,0.1); color: #ede8e0; font-size: 24px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .1s, background .15s; flex-shrink: 0;
    }
    .sb:active { transform: scale(.88); background: rgba(16,185,129,0.25); }
    /* Calcium bar */
    .ca-track { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .ca-fill { height: 100%; border-radius: 3px; transition: width .6s ease, background .4s; }
    /* Transmit */
    #xmit {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; font-weight: 700;
      color: #050505; cursor: pointer; text-transform: uppercase;
      background: var(--q); transition: opacity .15s, transform .1s, background .4s, box-shadow .4s;
      box-shadow: 0 0 20px rgba(16,185,129,0.2);
    }
    #xmit:active { transform: scale(.97); opacity: .85; }
    #xmit:disabled { background: #1e2229; color: #444; cursor: default; box-shadow: none; }
    /* Age bar */
    .age-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; margin-top: 8px; overflow: hidden; }
    .age-fill { height: 100%; background: var(--q); transition: width 300s linear; }
    /* Toast */
    #toast {
      position: fixed; bottom: calc(90px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #111827; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px;
      padding: 9px 16px; opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body class="antialiased">

  <main class="flex flex-col gap-4 px-4" style="padding-top:calc(1rem + var(--safe-top));padding-bottom:calc(148px + var(--safe-bottom))">

    <!-- Header -->
    <div class="flex items-center justify-between mt-1">
      <div>
        <div class="flex items-center gap-2 mb-0.5">
          <div id="dot" class="w-1.5 h-1.5 rounded-full transition-all duration-300" style="background:#333"></div>
          <span id="status-label" class="text-[9px] font-mono tracking-widest uppercase text-gray-600">CONNECTING</span>
        </div>
        <h1 class="text-3xl font-serif">Q-Factor</h1>
      </div>
      <div class="w-10 h-10 rounded-full border border-violet-500/30 bg-violet-500/10 flex items-center justify-center">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="#8b5cf6" stroke-width="1.5" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
    </div>

    <!-- Ring card -->
    <div class="glass rounded-2xl p-5 flex flex-col items-center gap-3">
      <div class="relative" style="width:144px;height:144px">
        <svg viewBox="0 0 160 160" width="144" height="144" style="transform:rotate(-90deg)">
          <circle class="rg" cx="80" cy="80" r="68"/>
          <circle id="ring" class="rf" cx="80" cy="80" r="68" stroke-dasharray="427.26" stroke-dashoffset="427.26" stroke="#10b981"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center gap-0.5">
          <span id="q-num" class="text-5xl font-serif leading-none" style="color:var(--q)">—</span>
          <span class="text-[9px] font-mono tracking-widest text-gray-600">Q-SCORE</span>
        </div>
      </div>
      <div id="q-badge" class="text-[11px] font-mono tracking-widest px-4 py-1.5 rounded-full border"
        style="color:var(--q);border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.08)">LOADING</div>
      <p id="q-summary" class="text-[11px] text-gray-500 text-center leading-relaxed" style="max-width:280px">Fetching coherence state…</p>
    </div>

    <!-- HRV slider (manual input; synced from API when online) -->
    <div class="glass rounded-2xl p-5 flex flex-col gap-3">
      <div class="flex justify-between items-end">
        <div>
          <p class="text-[9px] font-mono tracking-widest uppercase text-gray-600 mb-0.5">HRV · RMSSD</p>
          <h2 class="text-sm font-semibold text-white">Vagal Tone</h2>
        </div>
        <div><span id="val-hrv" class="text-2xl font-mono" style="color:var(--q)">45</span><span class="text-xs text-gray-600 ml-0.5">ms</span></div>
      </div>
      <input type="range" id="sl-hrv" min="10" max="120" value="45" style="--sc:#8b5cf6">
    </div>

    <!-- Spoon economy -->
    <div class="glass rounded-2xl p-5 flex flex-col gap-3">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-[9px] font-mono tracking-widest uppercase text-gray-600 mb-0.5">SPOON ECONOMY</p>
          <h2 class="text-sm font-semibold text-white">Available Energy</h2>
        </div>
        <span id="spoon-count" class="text-2xl font-mono" style="color:var(--q)">—</span>
      </div>
      <div class="flex items-center gap-3">
        <button class="sb" onclick="adjustSpoon(-1)" aria-label="Spend spoon">−</button>
        <div id="pips" class="flex flex-wrap gap-1 flex-1 justify-center"></div>
        <button class="sb" onclick="adjustSpoon(1)" aria-label="Gain spoon">+</button>
      </div>
    </div>

    <!-- Calcium -->
    <div class="glass rounded-2xl p-5 flex flex-col gap-3">
      <div class="flex justify-between items-end">
        <div>
          <p class="text-[9px] font-mono tracking-widest uppercase text-gray-600 mb-0.5">SERUM CALCIUM</p>
          <h2 class="text-sm font-semibold text-white">Physiological</h2>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span id="ca-val" class="text-2xl font-mono text-white">—</span>
          <span class="text-xs text-gray-600">mg/dL</span>
          <span id="ca-badge" class="text-[10px] font-mono px-2 py-0.5 rounded-full border" style="color:#64748b;border-color:rgba(100,116,139,0.3);background:rgba(100,116,139,0.1)">—</span>
        </div>
      </div>
      <div class="ca-track"><div id="ca-fill" class="ca-fill" style="width:0%;background:#10b981"></div></div>
    </div>

    <!-- Recommendations (shown when populated) -->
    <div id="recs-card" class="glass rounded-2xl p-5 flex-col gap-2" style="display:none">
      <p class="text-[9px] font-mono tracking-widest uppercase text-gray-600 mb-1">RECOMMENDATIONS</p>
      <div id="recs"></div>
    </div>

    <!-- HA payload (shown when populated) -->
    <div id="ha-card" class="glass rounded-2xl p-5" style="display:none">
      <p class="text-[9px] font-mono tracking-widest uppercase text-gray-600 mb-3">AUTOMATION PAYLOAD</p>
      <div id="ha-grid" class="grid grid-cols-2 gap-3"></div>
    </div>

  </main>

  <!-- Sticky bottom bar -->
  <div class="fixed bottom-0 left-0 right-0 glass border-t border-white/[0.07] rounded-t-3xl px-5 pt-4 z-50"
    style="padding-bottom:calc(1.25rem + var(--safe-bottom))">
    <div class="flex justify-between items-center mb-3">
      <div>
        <p class="text-[9px] font-mono tracking-widest text-gray-600 mb-0.5">STATE</p>
        <p id="out-quad" class="text-sm font-bold font-mono tracking-wide" style="color:var(--q)">—</p>
      </div>
      <div class="text-right">
        <p class="text-[9px] font-mono tracking-widest text-gray-600 mb-0.5">COHERENCE</p>
        <p id="out-score" class="text-4xl font-serif leading-none" style="color:var(--q)">—</p>
      </div>
    </div>
    <button id="xmit" onclick="pushUpdate()">TRANSMIT TO K₄</button>
    <div class="age-bar"><div id="age-fill" class="age-fill" style="width:100%"></div></div>
  </div>

  <div id="toast"></div>

<script>
'use strict';

const API = 'https://api.p31ca.org';
const MAX_SPOONS = 10;

function getLocalDid() {
  let did = localStorage.getItem('p31-did');
  if (!did) {
    did = Array.from(crypto.getRandomValues(new Uint8Array(3)))
      .map(b => b.toString(16).padStart(2, '0')).join('');
    localStorage.setItem('p31-did', did);
  }
  return did;
}
const USER = getLocalDid();
const CIRC = 427.26; // 2π × 68

const Q_COLORS = {
  Q1_FLOW: '#10b981', Q2_BURN: '#f43f5e', Q3_DEPLETED: '#64748b', Q4_RECOVERY: '#8b5cf6',
  Q2_ANXIOUS: '#f59e0b', Q3_EXHAUSTED: '#f43f5e', Q4_CALM: '#8b5cf6',
};
const Q_LABELS = {
  Q1_FLOW: 'Q1 · FLOW', Q2_BURN: 'Q2 · BURN', Q3_DEPLETED: 'Q3 · DEPLETED', Q4_RECOVERY: 'Q4 · RECOVERY',
  Q2_ANXIOUS: 'Q2 · BURN', Q3_EXHAUSTED: 'Q3 · DEPLETED', Q4_CALM: 'Q4 · RECOVERY',
};

let st = {
  qScore: null, quadrant: null, spoonBalance: null, calciumMgDl: null,
  calciumStatus: 'unknown', recommendations: [], haPayload: null,
  lastFetch: null, offline: true, manualHrv: 45,
};

// ── Persistence ────────────────────────────────────────────────────────────
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k) ?? 'null'); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ── Local Q algorithm (offline fallback — Russell's Circumplex) ────────────
function localQ(hrv, spoons, ca) {
  const norm = Math.max(0, Math.min(1, (hrv - 25) / 40));
  const arousal = (1 - norm) * 100;
  let valence = (spoons / MAX_SPOONS) * 100;
  if (ca < 7.8) valence = Math.max(0, valence - (7.8 - ca) * 50);
  else if (ca < 8.0) valence = Math.max(0, valence - (8.0 - ca) * 20);
  const dx = arousal - 70, dy = valence - 75;
  const score = Math.max(0, Math.round(100 - Math.sqrt(dx*dx + dy*dy) / Math.sqrt(9625) * 100));
  const q = arousal >= 50 && valence >= 50 ? 'Q1_FLOW'
          : arousal >= 50 ? 'Q2_BURN'
          : valence < 50  ? 'Q3_DEPLETED'
          : 'Q4_RECOVERY';
  return { qScore: score, quadrant: q };
}

// ── Network ────────────────────────────────────────────────────────────────
async function fetchState() {
  try {
    const r = await fetch(`${API}/qfactor/current?userId=${USER}`, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw 0;
    const d = await r.json();
    if (!d.offline) {
      Object.assign(st, d, { offline: false, lastFetch: Date.now() });
      if (d.hrv) { st.manualHrv = d.hrv; document.getElementById('sl-hrv').value = d.hrv; }
      S.set('p31-qstate', st);
    }
    return true;
  } catch {
    const c = S.get('p31-qstate');
    if (c) Object.assign(st, c, { offline: true });
    else st.offline = true;
    return false;
  }
}

async function sendEvent(type, value) {
  try {
    const r = await fetch(`${API}/qfactor/event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: USER, source: 'mobile-pwa', type, value }),
      signal: AbortSignal.timeout(8000),
    });
    if (!r.ok) throw 0;
    const d = await r.json();
    if (!d.offline) { Object.assign(st, d, { offline: false, lastFetch: Date.now() }); S.set('p31-qstate', st); }
    return true;
  } catch { return false; }
}

// ── Spoons ─────────────────────────────────────────────────────────────────
function adjustSpoon(delta) {
  st.spoonBalance = Math.max(0, Math.min(MAX_SPOONS, (st.spoonBalance ?? 5) + delta));
  S.set('p31-spoons', st.spoonBalance);
  renderSpoons();
  if (st.offline || st.qScore == null) recomputeLocal();
  if (navigator.vibrate) navigator.vibrate(delta > 0 ? 25 : [12, 8, 12]);
}

function renderSpoons() {
  const n = st.spoonBalance ?? S.get('p31-spoons') ?? 5;
  const cnt = document.getElementById('spoon-count');
  const pips = document.getElementById('pips');
  if (cnt) cnt.textContent = n;
  if (pips) {
    pips.innerHTML = '';
    for (let i = 0; i < MAX_SPOONS; i++) {
      const d = document.createElement('div');
      d.className = 'pip' + (i < n ? ' on' : '');
      pips.appendChild(d);
    }
  }
}

// ── Local recompute (HRV slider / offline) ─────────────────────────────────
function recomputeLocal() {
  const spoons = st.spoonBalance ?? S.get('p31-spoons') ?? 5;
  const ca = st.calciumMgDl ?? 8.5;
  const { qScore, quadrant } = localQ(st.manualHrv, spoons, ca);
  st.qScore = qScore;
  st.quadrant = quadrant;
  applyColor();
  setRing(qScore, Q_COLORS[quadrant] || '#10b981');
  const el = document.getElementById('q-num');
  if (el) { el.textContent = qScore; el.style.color = Q_COLORS[quadrant] || '#10b981'; }
  const osq = document.getElementById('out-score');
  const oqd = document.getElementById('out-quad');
  if (osq) osq.textContent = qScore;
  if (oqd) oqd.textContent = Q_LABELS[quadrant] || quadrant;
}

// ── Render helpers ─────────────────────────────────────────────────────────
function applyColor() {
  const c = Q_COLORS[st.quadrant] || '#10b981';
  document.documentElement.style.setProperty('--q', c);
  return c;
}

function setRing(score, color) {
  const ring = document.getElementById('ring');
  if (!ring) return;
  ring.style.strokeDashoffset = CIRC - (score / 100) * CIRC;
  ring.style.stroke = color;
}

// ── Full render ────────────────────────────────────────────────────────────
function render() {
  const color = applyColor();
  const score = st.qScore ?? 0;

  // Status dot
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('status-label');
  if (dot) { dot.style.background = st.offline ? '#444' : color; dot.style.boxShadow = st.offline ? 'none' : `0 0 5px ${color}`; }
  // "HARDWARE OFFLINE — CLOUD RELAY ACTIVE" is intentional psychological seed:
  // every WYE user sees their hardware is missing, priming the Node Zero upgrade.
  if (lbl) lbl.textContent = st.offline ? 'OFFLINE — LOCAL STORE' : 'HARDWARE OFFLINE — CLOUD RELAY ACTIVE';

  // Ring + score
  setRing(score, color);
  const qNum = document.getElementById('q-num');
  if (qNum) { qNum.textContent = st.qScore != null ? Math.round(st.qScore) : '—'; qNum.style.color = color; }

  // Badge
  const badge = document.getElementById('q-badge');
  if (badge) {
    badge.textContent = (Q_LABELS[st.quadrant] || st.quadrant || 'UNKNOWN').toUpperCase();
    badge.style.color = color;
    badge.style.borderColor = color + '4d';
    badge.style.background = color + '14';
  }

  // Summary
  const sumEl = document.getElementById('q-summary');
  if (sumEl) sumEl.textContent = st.offline ? 'Offline — local mode active' : (st.summary || '');

  // HRV slider (sync from API if available)
  if (st.hrv != null) {
    const sl = document.getElementById('sl-hrv');
    const vl = document.getElementById('val-hrv');
    if (sl) sl.value = st.hrv;
    if (vl) vl.textContent = Math.round(st.hrv);
    st.manualHrv = st.hrv;
  }

  // Spoons
  renderSpoons();

  // Calcium
  const ca = st.calciumMgDl;
  const caEl = document.getElementById('ca-val');
  if (caEl) caEl.textContent = ca != null ? ca.toFixed(1) : '—';
  const caFill = document.getElementById('ca-fill');
  if (caFill && ca != null) {
    caFill.style.width = Math.max(0, Math.min(100, ((ca - 7.0) / 3.5) * 100)) + '%';
    caFill.style.background = ca < 7.8 ? '#f43f5e' : ca < 8.0 ? '#f59e0b' : '#10b981';
  }
  const caBadge = document.getElementById('ca-badge');
  if (caBadge) {
    const s = st.calciumStatus || 'unknown';
    const map = { critical:['CRITICAL','#f43f5e'], warning:['WARNING','#f59e0b'], normal:['NORMAL','#10b981'], unknown:['—','#64748b'] };
    const [txt, clr] = map[s] || map.unknown;
    caBadge.textContent = txt; caBadge.style.color = clr;
    caBadge.style.borderColor = clr + '4d'; caBadge.style.background = clr + '14';
  }

  // Recommendations
  const recs = st.recommendations || [];
  const recsCard = document.getElementById('recs-card');
  const recsEl = document.getElementById('recs');
  if (recsCard) recsCard.style.display = recs.length ? 'flex' : 'none';
  if (recsEl) recsEl.innerHTML = recs.map(r => {
    const u = /CRITICAL|CALCIUM/.test(r);
    return `<div style="font-size:12px;color:${u?'#f43f5e':'#9ca3af'};line-height:1.5;padding-left:14px;position:relative;margin-bottom:4px"><span style="position:absolute;left:0;font-size:10px;top:2px;color:${u?'#f43f5e':'#10b981'}">${u?'!':'▸'}</span>${r}</div>`;
  }).join('');

  // HA payload
  const ha = st.haPayload;
  const haCard = document.getElementById('ha-card');
  const haGrid = document.getElementById('ha-grid');
  if (haCard) haCard.style.display = ha ? '' : 'none';
  if (haGrid && ha) haGrid.innerHTML = [
    ['SPOON TIER', ha.spoonTier], ['HAPTIC', ha.hapticPattern || 'none'],
    ['LIGHT SCENE', (ha.lightScene || '').replace(/_/g,' ')], ['NOTIFY', ha.notificationLevel],
  ].map(([k,v]) => `<div><p style="font-size:9px;letter-spacing:1px;color:#6b7280;margin-bottom:2px">${k}</p><p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#ede8e0">${v||'—'}</p></div>`).join('');

  // Bottom bar
  const osq = document.getElementById('out-score');
  const oqd = document.getElementById('out-quad');
  if (osq) osq.textContent = st.qScore != null ? Math.round(st.qScore) : '—';
  if (oqd) oqd.textContent = (Q_LABELS[st.quadrant] || st.quadrant || '—').toUpperCase();
}

// ── Push update ────────────────────────────────────────────────────────────
async function pushUpdate() {
  const btn = document.getElementById('xmit');
  if (btn) { btn.disabled = true; btn.textContent = 'TRANSMITTING…'; }

  const spoons = st.spoonBalance ?? S.get('p31-spoons') ?? 5;
  const ok = await sendEvent('spoon', spoons);
  if (ok) await fetchState();
  render();
  toast(ok ? 'STATE SYNCED ✓' : 'OFFLINE — SAVED LOCALLY');

  if (btn) { btn.disabled = false; btn.textContent = 'TRANSMIT TO K₄'; }

  const fill = document.getElementById('age-fill');
  if (fill) {
    fill.style.transition = 'none'; fill.style.width = '100%';
    requestAnimationFrame(() => { fill.style.transition = 'width 300s linear'; fill.style.width = '0%'; });
  }
}

// ── HRV slider ─────────────────────────────────────────────────────────────
document.getElementById('sl-hrv').addEventListener('input', function() {
  st.manualHrv = +this.value;
  const vl = document.getElementById('val-hrv');
  if (vl) vl.textContent = Math.round(st.manualHrv);
  recomputeLocal();
});

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTmr;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  // Restore persisted spoons
  const saved = S.get('p31-spoons');
  if (saved != null) st.spoonBalance = saved;

  // Show cached state instantly
  const cached = S.get('p31-qstate');
  if (cached) { Object.assign(st, cached, { offline: true }); render(); }
  else { renderSpoons(); }

  // URL shortcut (home screen "Log Spoon" shortcut)
  if (new URLSearchParams(location.search).get('action') === 'spoon-minus') adjustSpoon(-1);

  // Fetch live
  await fetchState();
  render();

  // Age bar decay
  const fill = document.getElementById('age-fill');
  if (fill) requestAnimationFrame(() => { fill.style.width = '0%'; });

  // Poll every 5 min
  setInterval(async () => { await fetchState(); render(); }, 300_000);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/qfactor/sw.js', { scope: '/qfactor/' }).catch(() => {});
}

init();
</script>
