<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P31 | K4 Market Tomography</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
        }
    }
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #0f1115;
            color: #d8d6d0;
            font-family: 'Atkinson Hyperlegible', sans-serif;
        }
        canvas { display: block; }

        .mono { font-family: 'JetBrains Mono', monospace; }

        #ui-layer {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .top-bar {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            pointer-events: auto;
        }
        .top-bar a {
            color: rgba(59,163,114,0.6); font-size: 13px;
            text-decoration: none; letter-spacing: 0.06em;
            font-family: 'JetBrains Mono', monospace; font-weight: 700;
        }
        .top-bar a:hover { color: #3ba372; }

        .field-input, .field-select {
            background: #161920; color: #3ba372;
            border: 1px solid rgba(59,163,114,0.25);
            padding: 6px 10px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; outline: none;
        }
        .field-input:focus, .field-select:focus {
            border-color: #3ba372;
        }
        .field-input { width: 80px; text-transform: uppercase; }

        .btn {
            background: #3ba372; color: #0f1115;
            border: none; padding: 6px 14px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 700; cursor: pointer;
        }
        .btn:hover { background: #4bb882; }
        .btn:active { background: #2e8a5f; }

        .error-msg {
            margin-left: auto;
            font-size: 11px; color: #cc6247;
            font-family: 'JetBrains Mono', monospace;
        }

        .top-right {
            position: absolute; top: 16px; right: 20px;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto;
        }
        .toggle-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-family: 'JetBrains Mono', monospace;
            color: #888; cursor: pointer; user-select: none;
        }
        .toggle-row input { accent-color: #3ba372; cursor: pointer; }

        .bottom-bar {
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
            pointer-events: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: #666;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block;
        }
        .price-display {
            margin-left: auto;
            font-size: 13px; color: #d8d6d0; font-weight: 700;
        }
        .data-count { color: #555; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="top-bar">
        <a href="k4market.html">&larr; K4 MARKET</a>
        <input id="symbolInput" class="field-input" type="text" value="GME" maxlength="6" placeholder="SYM">
        <select id="timeframeSelect" class="field-select">
            <option value="1H">1 Hour</option>
            <option value="1D" selected>1 Day</option>
            <option value="1W">1 Week</option>
            <option value="1M">1 Month</option>
        </select>
        <button id="refreshBtn" class="btn" title="Refresh data">&#x21bb;</button>
        <span id="errorMsg" class="error-msg"></span>
    </div>

    <div class="bottom-bar">
        <div class="legend-item"><span class="legend-dot" style="background:#3ba372;box-shadow:0 0 6px #3ba372"></span> Support</div>
        <div class="legend-item"><span class="legend-dot" style="background:#cc6247;box-shadow:0 0 6px #cc6247"></span> Resistance</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4db8a8;box-shadow:0 0 6px #4db8a8"></span> Volume</div>
        <div class="legend-item"><span class="legend-dot" style="background:#cda852;box-shadow:0 0 6px #cda852"></span> Larmor ring</div>
        <span class="data-count" id="dataCount"></span>
        <span class="price-display" id="priceDisplay"></span>
    </div>
</div>

<div class="top-right">
    <label class="toggle-row">
        <input type="checkbox" id="wireframeToggle" checked> Wireframe
    </label>
    <label class="toggle-row">
        <input type="checkbox" id="autoRotateToggle" checked> Auto-rotate
    </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Seed-based PRNG ──────────────────────────────────────────────
function hashSeed(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return h >>> 0;
}
function mulberry32(seed) {
    let s = seed | 0;
    return () => {
        s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

// ── Generate OHLCV data ──────────────────────────────────────────
function generateOHLCV(symbol, timeframe, count = 60) {
    const seed = hashSeed(symbol + timeframe);
    const rand = mulberry32(seed + Date.now() % 10000);

    // symbol-dependent base price
    const basePrice = 10 + (hashSeed(symbol) % 400);
    const volatility = 0.008 + (hashSeed(symbol + 'vol') % 100) / 5000;
    const data = [];
    let price = basePrice;

    for (let i = 0; i < count; i++) {
        const change = (rand() - 0.48) * volatility * price;
        const open = price;
        const close = open + change;
        const highExtra = rand() * volatility * price * 0.6;
        const lowExtra = rand() * volatility * price * 0.6;
        const high = Math.max(open, close) + highExtra;
        const low = Math.min(open, close) - lowExtra;
        const volume = (500000 + rand() * 2000000) * (1 + rand() * 2);

        data.push({
            open: +open.toFixed(2),
            high: +high.toFixed(2),
            low: +low.toFixed(2),
            close: +close.toFixed(2),
            volume: Math.round(volume),
            index: i,
        });
        price = close;
    }
    return data;
}

// ── Tetrahedron vertices (regular, centered) ─────────────────────
const TETRA_SCALE = 2.2;
const TETRA_VERTICES = [
    new THREE.Vector3( 1,  1,  1).multiplyScalar(TETRA_SCALE),  // OPEN
    new THREE.Vector3( 1, -1, -1).multiplyScalar(TETRA_SCALE),  // HIGH
    new THREE.Vector3(-1,  1, -1).multiplyScalar(TETRA_SCALE),  // LOW
    new THREE.Vector3(-1, -1,  1).multiplyScalar(TETRA_SCALE),  // CLOSE
];
const VERTEX_LABELS = ['OPEN', 'HIGH', 'LOW', 'CLOSE'];

// ── Map OHLCV point to tetrahedral barycentric coordinates ───────
function ohlcvToPosition(d, globalMin, globalMax) {
    const range = globalMax - globalMin || 1;
    const wO = (d.open  - globalMin) / range;
    const wH = (d.high  - globalMin) / range;
    const wL = (d.low   - globalMin) / range;
    const wC = (d.close - globalMin) / range;
    const sum = wO + wH + wL + wC || 1;

    const pos = new THREE.Vector3();
    for (let i = 0; i < 4; i++) {
        const w = [wO, wH, wL, wC][i] / sum;
        pos.addScaledVector(TETRA_VERTICES[i], w);
    }
    return pos;
}

// ── Classify data point ──────────────────────────────────────────
function classifyPoint(d, data) {
    const volMax = Math.max(...data.map(p => p.volume));
    const priceMin = Math.min(...data.map(p => p.low));
    const priceMax = Math.max(...data.map(p => p.high));
    const priceRange = priceMax - priceMin || 1;

    const volRatio = d.volume / volMax;
    const pricePos = (d.close - priceMin) / priceRange;

    if (volRatio > 0.7) return 'volume';
    if (pricePos < 0.3) return 'support';
    if (pricePos > 0.7) return 'resistance';
    // mixed: choose by dominant characteristic
    return pricePos < 0.5 ? 'support' : 'resistance';
}

const COLOR_MAP = {
    support:    new THREE.Color(0x3ba372),
    resistance: new THREE.Color(0xcc6247),
    volume:     new THREE.Color(0x4db8a8),
};

// ── Scene setup ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0f1115);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0f1115, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 4, 6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;
controls.minDistance = 3;
controls.maxDistance = 20;

// Lights
scene.add(new THREE.AmbientLight(0x404050, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);

// ── Build tetrahedron wireframe ──────────────────────────────────
const tetraGroup = new THREE.Group();
scene.add(tetraGroup);

// Wireframe edges
const edgeGeo = new THREE.BufferGeometry();
const edgeIndices = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
const edgePositions = [];
for (const [a, b] of edgeIndices) {
    edgePositions.push(...TETRA_VERTICES[a].toArray(), ...TETRA_VERTICES[b].toArray());
}
edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
const edgeMat = new THREE.LineBasicMaterial({ color: 0x3ba372, opacity: 0.4, transparent: true });
const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
tetraGroup.add(edgeLines);

// Solid faces (toggled off by default)
const faceGeo = new THREE.TetrahedronGeometry(1);
// Manually set vertices to match our layout
const faceCustomGeo = new THREE.BufferGeometry();
const faceVerts = [];
const faceIdx = [[0,1,2],[0,1,3],[0,2,3],[1,2,3]];
for (const tri of faceIdx) {
    for (const vi of tri) faceVerts.push(...TETRA_VERTICES[vi].toArray());
}
faceCustomGeo.setAttribute('position', new THREE.Float32BufferAttribute(faceVerts, 3));
faceCustomGeo.computeVertexNormals();
const faceMat = new THREE.MeshStandardMaterial({
    color: 0x3ba372, opacity: 0.08, transparent: true,
    side: THREE.DoubleSide, depthWrite: false,
});
const faceMesh = new THREE.Mesh(faceCustomGeo, faceMat);
faceMesh.visible = true;
tetraGroup.add(faceMesh);

// Vertex spheres + labels
const labelSprites = [];
const vertexSpheres = [];
for (let i = 0; i < 4; i++) {
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x3ba372, emissive: 0x3ba372, emissiveIntensity: 0.6 })
    );
    sphere.position.copy(TETRA_VERTICES[i]);
    tetraGroup.add(sphere);
    vertexSpheres.push(sphere);

    // Canvas text label
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 48;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#3ba372';
    ctx.font = 'bold 22px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(VERTEX_LABELS[i], 64, 30);

    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(TETRA_VERTICES[i]).multiplyScalar(1.18);
    sprite.scale.set(1.2, 0.45, 1);
    tetraGroup.add(sprite);
    labelSprites.push(sprite);
}

// ── Larmor ring ──────────────────────────────────────────────────
const larmorGeo = new THREE.TorusGeometry(TETRA_SCALE * 1.15, 0.035, 16, 80);
const larmorMat = new THREE.MeshStandardMaterial({
    color: 0xcda852, emissive: 0xcda852, emissiveIntensity: 0.5,
    transparent: true, opacity: 0.7,
});
const larmorRing = new THREE.Mesh(larmorGeo, larmorMat);
larmorRing.rotation.x = Math.PI / 3;
scene.add(larmorRing);

// ── Data point meshes ────────────────────────────────────────────
const dataGroup = new THREE.Group();
scene.add(dataGroup);

const pointGeo = new THREE.SphereGeometry(0.06, 12, 12);

function populateDataPoints(data) {
    // Clear old
    while (dataGroup.children.length) {
        const c = dataGroup.children[0];
        c.geometry?.dispose?.();
        c.material?.dispose?.();
        dataGroup.remove(c);
    }
    if (!data.length) return;

    const allPrices = data.flatMap(d => [d.open, d.high, d.low, d.close]);
    const globalMin = Math.min(...allPrices);
    const globalMax = Math.max(...allPrices);

    for (const d of data) {
        const cls = classifyPoint(d, data);
        const color = COLOR_MAP[cls];
        const mat = new THREE.MeshStandardMaterial({
            color, emissive: color, emissiveIntensity: 0.4,
            transparent: true, opacity: 0.85,
        });
        const mesh = new THREE.Mesh(pointGeo, mat);
        mesh.position.copy(ohlcvToPosition(d, globalMin, globalMax));
        // scale volume spheres slightly bigger
        if (cls === 'volume') mesh.scale.setScalar(1.4);
        dataGroup.add(mesh);
    }

    // UI updates
    const lastClose = data[data.length - 1].close;
    document.getElementById('priceDisplay').textContent =
        `$${lastClose.toFixed(2)} \u2190 ${document.getElementById('symbolInput').value.toUpperCase()}`;
    document.getElementById('dataCount').textContent = `${data.length} data points`;
}

// ── State & interaction ──────────────────────────────────────────
let currentData = [];

function refresh() {
    const sym = document.getElementById('symbolInput').value.toUpperCase() || 'GME';
    const tf = document.getElementById('timeframeSelect').value;
    document.getElementById('symbolInput').value = sym;
    document.getElementById('errorMsg').textContent = '';
    try {
        currentData = generateOHLCV(sym, tf);
        populateDataPoints(currentData);
    } catch (e) {
        document.getElementById('errorMsg').textContent = 'Generation failed';
    }
}

document.getElementById('refreshBtn').addEventListener('click', refresh);
document.getElementById('symbolInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') refresh();
});
document.getElementById('timeframeSelect').addEventListener('change', refresh);

document.getElementById('wireframeToggle').addEventListener('change', e => {
    const wire = e.target.checked;
    edgeLines.visible = true;
    faceMesh.visible = !wire;
    faceMat.opacity = wire ? 0 : 0.08;
});

document.getElementById('autoRotateToggle').addEventListener('change', e => {
    controls.autoRotate = e.target.checked;
});

// ── Animation loop ───────────────────────────────────────────────
const LARMOR_HZ = 0.86;
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Larmor rotation: 0.86 Hz = 0.86 * 2PI rad/s
    larmorRing.rotation.z = elapsed * LARMOR_HZ * Math.PI * 2;

    controls.update();
    renderer.render(scene, camera);
}

// ── Resize ───────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Boot ─────────────────────────────────────────────────────────
refresh();
animate();
</script>
</body>
</html>
