<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const mount = document.getElementById('three-mount');
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true, powerPreference: 'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2.25));
renderer.setClearColor(0x0f1115,1);
const canvas = renderer.domElement;
canvas.id = 'geodesic-canvas';
canvas.setAttribute('role', 'application');
canvas.setAttribute('aria-label', '3D build space. Drag on empty area to turn the view; drag a shape to move it.');
mount.appendChild(canvas);
canvas.style.touchAction = 'none';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,1,0.1,1000);
camera.position.set(0,4,12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.08;

// Lights
scene.add(new THREE.AmbientLight(0x404060,2));
const dir=new THREE.DirectionalLight(0x4db8a8,3);dir.position.set(5,10,5);scene.add(dir);
const dir2=new THREE.DirectionalLight(0xcda852,1.5);dir2.position.set(-5,-5,5);scene.add(dir2);

// Grid
const grid=new THREE.GridHelper(20,20,0x1e2630,0x1a1f26);scene.add(grid);

const COLORS={tet:0x3ba372,oct:0x4db8a8,ico:0x8b7cc9,cube:0xcda852};
const SHAPE_INFO={
    tet:{verts:4,edges:6,faces:4},
    oct:{verts:6,edges:12,faces:8},
    ico:{verts:12,edges:30,faces:20},
    cube:{verts:8,edges:12,faces:6}
};

let shapes=[];
let wireMode=true, solidMode=false;
let selectedShape='tet';
let shapeCount={tet:0,oct:0,ico:0,cube:0};

let isLiveMode = false;
let autoSnapOn = false;
let buildDrag = null; // { group, pointerId, yLock, plane: THREE.Plane }

function hitShapeGroup(obj) {
    let o = obj;
    for (let i = 0; i < 24 && o; i++) {
        if (shapes.includes(o)) return o;
        o = o.parent;
    }
    return null;
}

function cornersFromBox3(box) {
    const o = [];
    const { min, max } = box;
    for (const x of [min.x, max.x]) {
        for (const y of [min.y, max.y]) {
            for (const z of [min.z, max.z]) {
                o.push(new THREE.Vector3(x, y, z));
            }
        }
    }
    return o;
}

function tryCornerSnap(dragged) {
    if (!autoSnapOn || !dragged) return;
    const boxA = new THREE.Box3().setFromObject(dragged);
    const cornersA = cornersFromBox3(boxA);
    let bestD = 1e9;
    let best = null;
    for (const other of shapes) {
        if (other === dragged) continue;
        const boxB = new THREE.Box3().setFromObject(other);
        const cornersB = cornersFromBox3(boxB);
        for (const ca of cornersA) {
            for (const cb of cornersB) {
                const d = ca.distanceTo(cb);
                if (d < bestD) {
                    bestD = d;
                    best = { ca, cb };
                }
            }
        }
    }
    if (!best || bestD > 5.5) return;
    const delta = new THREE.Vector3().subVectors(best.cb, best.ca);
    dragged.position.add(delta);
    updateInfo();
    fireCoachEvent('snap_used');
}

window.toggleAutoSnap = function (btn) {
    autoSnapOn = !autoSnapOn;
    if (btn) btn.classList.toggle('active', autoSnapOn);
    else document.getElementById('btn-snap')?.classList.toggle('active', autoSnapOn);
    updateBuildHelp();
    if (autoSnapOn) fireCoachEvent('snap_enabled');
};

function updateBuildHelp() {
    const el = document.getElementById('info-help');
    const hud = document.getElementById('hud-text');
    if (isLiveMode) return;
    if (el) {
        const snap = autoSnapOn ? 'On — on release, nearest corners glue if within 5.5u' : 'Off';
        el.innerHTML =
            '<b>Grab & move</b> any wire or solid in the 3D view (table plane at its height).<br>' +
            '<b>Orbit / zoom</b> empty area: one finger to drag, scroll or <b>pinch</b> to zoom. <b>Auto-snap:</b> ' +
            snap;
    }
    if (hud) {
        hud.textContent = autoSnapOn
            ? 'Drag shapes on the table · release near another to join corners (Auto-snap on)'
            : 'Drag a shape to place it · Orbit: drag the void · enable Auto-snap to glue by corners';
    }
}

function makeGeom(type) {
    switch(type){
        case 'tet': return new THREE.TetrahedronGeometry(1);
        case 'oct': return new THREE.OctahedronGeometry(1);
        case 'ico': return new THREE.IcosahedronGeometry(1);
        case 'cube': return new THREE.BoxGeometry(1.5,1.5,1.5);
    }
}

window.addShape = function(type, btn) {
    selectedShape=type;
    document.querySelectorAll('.toolbar button').forEach(b=>{
        if(['btn-tet','btn-oct','btn-ico','btn-cube'].includes(b.id))b.classList.remove('active');
    });
    if(btn)btn.classList.add('active');

    const color=COLORS[type];
    const geom=makeGeom(type);
    const group=new THREE.Group();

    if(solidMode||!wireMode) {
        const mat=new THREE.MeshPhongMaterial({color,transparent:true,opacity:0.4,side:THREE.DoubleSide});
        const mesh=new THREE.Mesh(geom,mat);
        group.add(mesh);
    }
    if(wireMode) {
        const wireMat=new THREE.LineBasicMaterial({color});
        const wireGeo=new THREE.WireframeGeometry(geom);
        const wire=new THREE.LineSegments(wireGeo,wireMat);
        group.add(wire);
    }

    const x=(Math.random()-0.5)*6, y=0.5, z=(Math.random()-0.5)*6;
    group.position.set(x,y,z);
    const shapeId = Math.random().toString(36).slice(2,10) + '-' + type;
    group.userData={type,id:shapeId};
    scene.add(group);
    shapes.push(group);

    if (isLiveMode) {
        liveShapeMap[shapeId] = group;
        if (liveWs?.readyState === WebSocket.OPEN) {
            liveWs.send(JSON.stringify({ type:'ADD_SHAPE', shapeId, shapeType:type, x, y, z }));
        }
    }

    updateInfo();
    fireCoachEvent('shape_added:' + type);
    fireCoachEvent('shape_count:' + shapes.length);
};

window.toggleWire=function(){
    wireMode=!wireMode;
    document.getElementById('btn-wire').classList.toggle('active',wireMode);
    document.getElementById('btn-wire').setAttribute('aria-pressed', wireMode ? 'true' : 'false');
    rebuildAll();
};
window.toggleSolid=function(){
    solidMode=!solidMode;
    document.getElementById('btn-solid').classList.toggle('active',solidMode);
    document.getElementById('btn-solid').setAttribute('aria-pressed', solidMode ? 'true' : 'false');
    rebuildAll();
};

function rebuildAll(){
    const data=shapes.map(s=>({type:s.userData.type,id:s.userData.id,pos:s.position.clone()}));
    shapes.forEach(s=>scene.remove(s));
    shapes=[];
    if (isLiveMode) liveShapeMap={};
    data.forEach(d=>{
        const color=COLORS[d.type];const geom=makeGeom(d.type);const group=new THREE.Group();
        if(solidMode||!wireMode){const mat=new THREE.MeshPhongMaterial({color,transparent:true,opacity:0.4,side:THREE.DoubleSide});group.add(new THREE.Mesh(geom,mat));}
        if(wireMode){const wire=new THREE.LineSegments(new THREE.WireframeGeometry(geom),new THREE.LineBasicMaterial({color}));group.add(wire);}
        group.position.copy(d.pos);group.userData={type:d.type,id:d.id};
        scene.add(group);shapes.push(group);
        if(isLiveMode&&d.id)liveShapeMap[d.id]=group;
    });
    updateInfo();
}

window.resetScene=function(){
    if (isLiveMode) {
        if (!confirm('Remove all shapes from the shared live room?')) return;
        if (liveWs?.readyState === WebSocket.OPEN) {
            liveWs.send(JSON.stringify({type:'RESET_SHAPES'}));
        }
        return;
    }
    shapes.forEach(s=>scene.remove(s));
    shapes=[];
    updateInfo();
};

window.autoArrange=function(){
    shapes.forEach((s,i)=>{
        const angle=i*(Math.PI*2/shapes.length);
        const r=Math.max(2,shapes.length*0.8);
        s.position.set(Math.cos(angle)*r,0.5,Math.sin(angle)*r);
    });
};

function calcRigidity() {
    let E=0,V=0,F=0;
    shapes.forEach(s=>{const info=SHAPE_INFO[s.userData.type];V+=info.verts;E+=info.edges;F+=info.faces;});
    if(V===0)return{E,V,F,r:'—'};
    const euler=V-E+F;
    const rig=E>=3*V-6?'Rigid ✓':'Flexible';
    return{E,V,F,r:rig};
}

function updateInfo(){
    const {E,V,F,r}=calcRigidity();
    document.getElementById('inf-shapes').textContent=shapes.length;
    document.getElementById('inf-verts').textContent=V;
    document.getElementById('inf-edges').textContent=E;
    document.getElementById('inf-faces').textContent=F;
    document.getElementById('inf-rig').textContent=r;
    document.getElementById('rigidity-score').textContent=shapes.length?`Maxwell: ${E}≥${3*V-6}?`:'' ;
}

const COACH_KEY = 'geodesic:progress:v1';
let coachTrackIdx = 0;
let coachStepIdx  = 0;
let coachDone     = false;
let coachMinimized = false;

(function loadCoachProgress() {
  try {
    const s = JSON.parse(localStorage.getItem(COACH_KEY) ?? 'null');
    if (s && typeof s.track === 'number') {
      coachTrackIdx = Math.min(Math.max(0, s.track), CAMPAIGN.tracks.length - 1);
      coachStepIdx  = Math.min(Math.max(0, s.step ?? 0), CAMPAIGN.tracks[coachTrackIdx].steps.length - 1);
      coachDone     = !!s.done;
    }
  } catch {}
})();

function saveCoachProgress() {
  localStorage.setItem(COACH_KEY, JSON.stringify({ track: coachTrackIdx, step: coachStepIdx, done: coachDone }));
}

function coachCurrentStep() {
  return CAMPAIGN.tracks[coachTrackIdx]?.steps[coachStepIdx] ?? null;
}

function coachUnlockThrough(trackIdx) {
  for (let i = 0; i <= trackIdx; i++) {
    for (const id of (CAMPAIGN.tracks[i]?.unlock ?? [])) {
      document.getElementById(id)?.classList.remove('locked');
    }
  }
}

function showCoachToast(msg) {
  if (!msg) return;
  const el = document.getElementById('coach-toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2200);
}

function renderCoach() {
  const coach = document.getElementById('coach');
  if (!coach) return;
  if (isLiveMode || coachDone) { coach.style.display = 'none'; document.getElementById('coach-pill').style.display = 'none'; return; }

  const step  = coachCurrentStep();
  if (!step)  { coach.style.display = 'none'; document.getElementById('coach-pill').style.display = 'none'; return; }

  const track = CAMPAIGN.tracks[coachTrackIdx];
  document.getElementById('coach-emoji').textContent     = step.emoji;
  document.getElementById('coach-msg').textContent       = step.msg;
  document.getElementById('coach-step-label').textContent = `${track.label} · ${coachStepIdx + 1}/${track.steps.length}`;

  if (coachMinimized) {
    coach.style.display = 'none';
    const pill = document.getElementById('coach-pill');
    pill.style.display  = '';
    pill.textContent    = `${step.emoji} ${coachStepIdx + 1}/${track.steps.length} — tap to show`;
  } else {
    coach.style.display = '';
    document.getElementById('coach-pill').style.display = 'none';
  }
}

function coachUnminimize() {
  coachMinimized = false;
  renderCoach();
}

function advanceCoach() {
  const step = coachCurrentStep();
  if (!step) return;
  if (step.celebration) showCoachToast(step.celebration);

  coachStepIdx++;
  const track = CAMPAIGN.tracks[coachTrackIdx];

  if (coachStepIdx >= track.steps.length) {
    coachTrackIdx++;
    coachStepIdx = 0;

    if (coachTrackIdx >= CAMPAIGN.tracks.length) {
      coachDone = true;
      saveCoachProgress();
      showCoachToast('All tools unlocked!');
      renderCoach();
      return;
    }
    coachUnlockThrough(coachTrackIdx);
    if (CAMPAIGN.tracks[coachTrackIdx].id === 'scootch') showPlacementRing();
  }

  if (track.id === 'scootch') hidePlacementRing();
  saveCoachProgress();
  renderCoach();
}

function fireCoachEvent(type) {
  if (coachDone || isLiveMode) return;
  const step = coachCurrentStep();
  if (!step) return;
  const wf = step.waitFor;
  if (wf === 'any_tap' || wf === type) { advanceCoach(); return; }
  if (wf.startsWith('shape_count:') && type.startsWith('shape_count:')) {
    if (parseInt(type.split(':')[1]) >= parseInt(wf.split(':')[1])) advanceCoach();
  }
  if (wf.startsWith('shape_added:') && wf === type) advanceCoach();
}

window.skipCampaign = function() {
  coachDone = true;
  saveCoachProgress();
  coachUnlockThrough(CAMPAIGN.tracks.length - 1);
  hidePlacementRing();
  renderCoach();
  updateBuildHelp();
};

// ── Live Room ──────────────────────────────────────────────────────────────
const WS_BASE = 'wss://geodesic-room.trimtab-signal.workers.dev';

const VERTEX_COLORS = { v0:0x4db8a8, v1:0x3ba372, v2:0xcda852, v3:0x8b7cc9 };
const EDGE_PAIRS = [['v0','v1'],['v0','v2'],['v0','v3'],['v1','v2'],['v1','v3'],['v2','v3']];

let liveRoomId = null;
let liveWs = null;
let liveGroup = null;          // THREE.Group containing spheres + edge lines
let liveVertexMeshes = {};     // vertexId → THREE.Mesh (sphere)
let liveEdgeLines = [];        // THREE.Line[]
let liveVertexPositions = {};  // vertexId → THREE.Vector3
let liveShapeMap = {};         // shapeId → THREE.Group (for dedup and remote ops)
let currentDragShapeId = null; // shapeId being dragged locally — suppress remote MOVE_SHAPE

let dragTarget = null;         // { id, sphere } while dragging
let dragPlane = null;
const _raycaster = new THREE.Raycaster();
// Default Line threshold is 1 (world-space slack for line raycast). Slightly higher on coarse pointers.
const _coarse = typeof matchMedia === 'function' && matchMedia('(pointer: coarse)').matches;
_raycaster.params.Line = { threshold: _coarse ? 3 : 1 };
const _pointer = new THREE.Vector2();
const _dragIntersect = new THREE.Vector3();
const labelsContainer = document.getElementById('labels-container');

function buildLiveTetra(vertices) {
    if (liveGroup) scene.remove(liveGroup);
    liveGroup = new THREE.Group();
    liveVertexMeshes = {};
    liveEdgeLines = [];
    liveVertexPositions = {};

    // Vertex spheres — larger hit targets on phones / touch
    const _liveTouch = (typeof matchMedia === 'function' && (matchMedia('(max-width: 768px)').matches || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024)));
    const SPHERE_GEOM = new THREE.SphereGeometry(_liveTouch ? 0.26 : 0.18, 24, 24);
    for (const [id, v] of Object.entries(vertices)) {
        const mat = new THREE.MeshPhongMaterial({ color: VERTEX_COLORS[id] ?? 0xffffff, emissive: VERTEX_COLORS[id] ?? 0xffffff, emissiveIntensity: 0.25 });
        const mesh = new THREE.Mesh(SPHERE_GEOM, mat);
        mesh.position.set(v.x, v.y, v.z);
        mesh.userData.vertexId = id;
        liveGroup.add(mesh);
        liveVertexMeshes[id] = mesh;
        liveVertexPositions[id] = mesh.position.clone();
    }

    // Edges as BufferGeometry lines
    for (const [a, b] of EDGE_PAIRS) {
        const geom = new THREE.BufferGeometry();
        const va = liveVertexMeshes[a].position;
        const vb = liveVertexMeshes[b].position;
        geom.setAttribute('position', new THREE.BufferAttribute(
            new Float32Array([va.x, va.y, va.z, vb.x, vb.y, vb.z]), 3
        ));
        const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x4db8a8, opacity: 0.55, transparent: true }));
        line.userData.edgeKey = `${a}-${b}`;
        liveGroup.add(line);
        liveEdgeLines.push({ line, a, b });
    }

    scene.add(liveGroup);
    updateLiveLabels();
}

function applyVertexOp(id, x, y, z) {
    const mesh = liveVertexMeshes[id];
    if (!mesh) return;
    mesh.position.set(x, y, z);
    liveVertexPositions[id] = mesh.position.clone();
    updateEdgeLines();
    updateLiveLabels();
}

function updateEdgeLines() {
    for (const { line, a, b } of liveEdgeLines) {
        const va = liveVertexMeshes[a]?.position;
        const vb = liveVertexMeshes[b]?.position;
        if (!va || !vb) continue;
        const arr = new Float32Array([va.x, va.y, va.z, vb.x, vb.y, vb.z]);
        line.geometry.setAttribute('position', new THREE.BufferAttribute(arr, 3));
        line.geometry.attributes.position.needsUpdate = true;
    }
}

function updateLiveLabels() {
    labelsContainer.innerHTML = '';
    if (!isLiveMode || !liveGroup) return;
    for (const [id, mesh] of Object.entries(liveVertexMeshes)) {
        const pos = mesh.position.clone().project(camera);
        const w = mount.offsetWidth, h = mount.offsetHeight;
        const px = (pos.x *  0.5 + 0.5) * w;
        const py = (pos.y * -0.5 + 0.5) * h;
        const el = document.createElement('div');
        el.className = 'vertex-label';
        el.style.left = `${px}px`;
        el.style.top  = `${py}px`;
        el.textContent = mesh.userData.label ?? id;
        labelsContainer.appendChild(el);
    }
}

// ── Live shape helpers ──────────────────────────────────────────────────────

function addLiveShape(shapeId, type, x, y, z) {
    if (liveShapeMap[shapeId]) return; // already present (optimistic-add dedup)
    const color = COLORS[type];
    if (!color) return;
    const geom = makeGeom(type);
    if (!geom) return;
    const group = new THREE.Group();
    if (solidMode || !wireMode) {
        const mat = new THREE.MeshPhongMaterial({color,transparent:true,opacity:0.4,side:THREE.DoubleSide});
        group.add(new THREE.Mesh(geom, mat));
    }
    if (wireMode) {
        group.add(new THREE.LineSegments(new THREE.WireframeGeometry(geom), new THREE.LineBasicMaterial({color})));
    }
    group.position.set(x, y, z);
    group.userData = { type, id: shapeId };
    scene.add(group);
    shapes.push(group);
    liveShapeMap[shapeId] = group;
    updateInfo();
}

function removeLiveShape(shapeId) {
    const g = liveShapeMap[shapeId];
    if (!g) return;
    scene.remove(g);
    shapes = shapes.filter(s => s !== g);
    delete liveShapeMap[shapeId];
    updateInfo();
}

function resetAllLiveShapes() {
    for (const g of shapes) scene.remove(g);
    shapes = [];
    liveShapeMap = {};
    updateInfo();
}

function rebuildLiveShapes(shapesFromServer) {
    resetAllLiveShapes();
    for (const [id, s] of Object.entries(shapesFromServer)) {
        addLiveShape(id, s.type, s.x, s.y, s.z);
    }
}

function updateRigidityDisplay(rig) {
    if (!rig) return;
    document.getElementById('inf-rig').textContent = rig.rigid ? 'Rigid ✓' : 'Flexible';
    const n = shapes.length;
    document.getElementById('rigidity-score').textContent = n ? `Maxwell: ${rig.E}≥${3*rig.V-6}?` : '';
}

function connectRoom(roomId) {
    if (liveWs) { try { liveWs.close(); } catch {} }
    const url = `${WS_BASE}/api/geodesic/${encodeURIComponent(roomId)}/ws?client=${encodeURIComponent('browser-' + Math.random().toString(36).slice(2,8))}`;
    liveWs = new WebSocket(url);

    liveWs.onopen = () => {
        document.getElementById('room-conn-status').textContent = 'connected';
        document.getElementById('room-conn-status').style.color = 'var(--teal)';
    };
    liveWs.onclose = () => {
        document.getElementById('room-conn-status').textContent = 'disconnected — reload to reconnect';
        document.getElementById('room-conn-status').style.color = 'var(--coral)';
    };
    liveWs.onerror = () => {
        document.getElementById('room-conn-status').textContent = 'error';
        document.getElementById('room-conn-status').style.color = 'var(--coral)';
    };
    liveWs.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type === 'hello') {
            buildLiveTetra(msg.state);
            for (const [id, v] of Object.entries(msg.state)) {
                if (liveVertexMeshes[id]) liveVertexMeshes[id].userData.label = v.label;
            }
            if (msg.shapes) rebuildLiveShapes(msg.shapes);
            if (msg.rigidity) updateRigidityDisplay(msg.rigidity);
        } else if (msg.type === 'reset') {
            buildLiveTetra(msg.state);
            for (const [id, v] of Object.entries(msg.state)) {
                if (liveVertexMeshes[id]) liveVertexMeshes[id].userData.label = v.label;
            }
        } else if (msg.type === 'op') {
            const op = msg.op;
            if (op.type === 'SET_VERTEX') {
                applyVertexOp(op.id, op.x, op.y, op.z);
            } else if (op.type === 'ADD_SHAPE') {
                addLiveShape(op.shapeId, op.shapeType, op.x, op.y, op.z);
                if (op.rigidity) updateRigidityDisplay(op.rigidity);
            } else if (op.type === 'MOVE_SHAPE') {
                const g = liveShapeMap[op.shapeId];
                if (g && op.shapeId !== currentDragShapeId) {
                    g.position.set(op.x, op.y, op.z);
                    updateInfo();
                }
            } else if (op.type === 'REMOVE_SHAPE') {
                removeLiveShape(op.shapeId);
                if (op.rigidity) updateRigidityDisplay(op.rigidity);
            } else if (op.type === 'RESET_SHAPES') {
                resetAllLiveShapes();
                if (op.rigidity) updateRigidityDisplay(op.rigidity);
            }
        } else if (msg.type === 'error' && msg.code === 'SHAPE_CAP') {
            const toast = document.getElementById('coach-toast');
            if (toast) { toast.textContent = `Room full — ${msg.max} shapes max`; toast.classList.add('show'); clearTimeout(toast._timer); toast._timer = setTimeout(()=>toast.classList.remove('show'),2500); }
        }
    };
}

function enterLiveMode(roomId) {
    // Clear local shapes before switching mode
    shapes.forEach(s => scene.remove(s));
    shapes = [];
    liveShapeMap = {};

    isLiveMode = true;
    liveRoomId = roomId;
    document.body.classList.add('geodesic-live');

    // Unlock all tools and suppress campaign
    coachDone = true;
    coachUnlockThrough(CAMPAIGN.tracks.length - 1);

    document.getElementById('room-bar').style.display = 'flex';

            '<b>Shared build</b> — toolbar adds shapes for all players. <b>K4 vertices:</b> drag colored balls. <b>View:</b> orbit empty area, pinch to zoom.';

}

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

function setPointerNdcFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    _pointer.set(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        ((e.clientY - rect.top) / rect.height) * -2 + 1
    );
}

/** Builder: left-drag a shape. Live K₄: left-drag a vertex. Empty canvas: orbit (OrbitControls). */
canvas.addEventListener(
    'pointerdown',
    (e) => {
        if (e.button !== 0) return;
        setPointerNdcFromEvent(e);
        _raycaster.setFromCamera(_pointer, camera);

        if (isLiveMode) {
            // Priority 1: K4 vertex drag
            if (liveGroup) {
                const hits = _raycaster.intersectObjects(Object.values(liveVertexMeshes), false);
                if (hits.length) {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    const sphere = hits[0].object;
                    dragTarget = { id: sphere.userData.vertexId, sphere, pointerId: e.pointerId };
                    dragPlane = new THREE.Plane();
                    const camDir = camera.getWorldDirection(new THREE.Vector3()).negate();
                    dragPlane.setFromNormalAndCoplanarPoint(camDir, sphere.position);
                    controls.enabled = false;
                    canvas.setPointerCapture(e.pointerId);
                    return;
                }
            }
            // Priority 2: builder shape drag (synced)
            if (shapes.length) {
                const sh = _raycaster.intersectObjects(shapes, true);
                if (sh.length) {
                    const g = hitShapeGroup(sh[0].object);
                    if (g) {
                        e.preventDefault();
                        e.stopPropagation();
                        e.stopImmediatePropagation();
                        const y0 = g.position.y;
                        buildDrag = {
                            group: g,
                            pointerId: e.pointerId,
                            yLock: y0,
                            plane: new THREE.Plane().setFromNormalAndCoplanarPoint(
                                new THREE.Vector3(0,1,0), new THREE.Vector3(0,y0,0)
                            )
                        };
                        currentDragShapeId = g.userData.id ?? null;
                        canvas.setPointerCapture(e.pointerId);
                        controls.enabled = false;
                        return;
                    }
                }
            }
            return; // else: let OrbitControls handle
        }

        const sh = _raycaster.intersectObjects(shapes, true);
        if (!sh.length) return;
        const g = hitShapeGroup(sh[0].object);
        if (!g) return;
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        const y0 = g.position.y;
        buildDrag = {
            group: g,
            pointerId: e.pointerId,
            yLock: y0,
            plane: new THREE.Plane().setFromNormalAndCoplanarPoint(
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, y0, 0)
            )
        };
        canvas.setPointerCapture(e.pointerId);
        controls.enabled = false;
    },
    { capture: true }
);

canvas.addEventListener('pointermove', (e) => {
    if (buildDrag && e.pointerId === buildDrag.pointerId) {
        setPointerNdcFromEvent(e);
        _raycaster.setFromCamera(_pointer, camera);
        if (_raycaster.ray.intersectPlane(buildDrag.plane, _dragIntersect)) {
            buildDrag.group.position.set(_dragIntersect.x, buildDrag.yLock, _dragIntersect.z);
            updateInfo();
        }
        return;
    }
    if (!dragTarget) return;
    if (dragTarget.pointerId != null && e.pointerId !== dragTarget.pointerId) return;
    setPointerNdcFromEvent(e);
    _raycaster.setFromCamera(_pointer, camera);
    if (dragPlane && _raycaster.ray.intersectPlane(dragPlane, _dragIntersect)) {
        dragTarget.sphere.position.copy(_dragIntersect);
        updateEdgeLines();
    }
});

function endPointerDrag(e) {
    if (buildDrag && e.pointerId === buildDrag.pointerId) {
        const g = buildDrag.group;
        try { canvas.releasePointerCapture(e.pointerId); } catch { /* */ }
        buildDrag = null;
        controls.enabled = true;
        currentDragShapeId = null;
        // Sync final position to server in live mode
        if (isLiveMode && liveWs?.readyState === WebSocket.OPEN && g.userData.id) {
            const { x, y, z } = g.position;
            liveWs.send(JSON.stringify({ type:'MOVE_SHAPE', shapeId:g.userData.id, x, y, z }));
        }
        tryCornerSnap(g);
        // After snap, re-send corrected position
        if (isLiveMode && liveWs?.readyState === WebSocket.OPEN && g.userData.id) {
            const { x, y, z } = g.position;
            liveWs.send(JSON.stringify({ type:'MOVE_SHAPE', shapeId:g.userData.id, x, y, z }));
        }
        checkRingReach();
        fireCoachEvent('any_tap');
        return;
    }
    if (dragTarget && (dragTarget.pointerId == null || dragTarget.pointerId === e.pointerId)) {
        const { id, sphere } = dragTarget;
        if (isLiveMode && liveWs && liveWs.readyState === WebSocket.OPEN) {
            const { x, y, z } = sphere.position;
            liveWs.send(JSON.stringify({ type: 'SET_VERTEX', id, x, y, z }));
        }
        try { canvas.releasePointerCapture(e.pointerId); } catch { /* */ }
        dragTarget = null;
        dragPlane = null;
        controls.enabled = true;
    }
}

canvas.addEventListener('pointerup', endPointerDrag);
canvas.addEventListener('pointercancel', endPointerDrag);

// Auto-enter live mode if ?room= present
if (_roomParamBoot && /^[a-zA-Z0-9_-]{1,64}$/.test(_roomParamBoot)) {
    enterLiveMode(_roomParamBoot);
} else {
    // Seed one tet (after fireCoachEvent exists — addShape must not run before campaign block)
    window.addShape('tet', null);
    updateInfo();
    // Restore unlocks: include current track (user already earned that row's tool unlocks on entry)
    if (coachDone) {
        coachUnlockThrough(CAMPAIGN.tracks.length - 1);
    } else {
        coachUnlockThrough(coachTrackIdx);
        if (CAMPAIGN.tracks[coachTrackIdx]?.id === 'scootch') showPlacementRing();
    }
    document.getElementById('btn-wire')?.setAttribute('aria-pressed', 'true');
    document.getElementById('btn-solid')?.setAttribute('aria-pressed', 'false');
    updateBuildHelp();
    document.getElementById('btn-snap')?.classList.remove('active');
    renderCoach();
}
</script>
