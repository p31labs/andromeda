<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Larmor | ³¹P NMR 863 Hz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #0f1115;
      --coral: #cc6247;
      --phosphorus: #3ba372;
      --text-primary: #e8ecf4;
      --text-dim: #7a8494;
      --surface: #181c22;
      --surface-hi: #20262e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      background: var(--void);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0 0 2rem 0;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Start overlay ── */
    #startOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 17, 21, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      gap: 1rem;
    }

    #startOverlay.hidden { display: none; }

    #startOverlay .tap-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--coral);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ring-pulse 2s ease-in-out infinite;
    }

    #startOverlay .tap-ring svg {
      width: 36px;
      height: 36px;
      fill: var(--coral);
    }

    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204,98,71,0.4); }
      50% { box-shadow: 0 0 0 18px rgba(204,98,71,0); }
    }

    #startOverlay h2 {
      font-size: 1.4rem;
      color: var(--coral);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #startOverlay p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 520px;
      padding: 1.5rem 1.5rem 0.5rem;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      font-weight: 700;
      color: var(--coral);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    header .subtitle {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
      letter-spacing: 0.08em;
    }

    /* ── Main layout ── */
    main {
      width: 100%;
      max-width: 520px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    /* ── Frequency display ── */
    .freq-display {
      text-align: center;
    }

    .freq-value {
      font-size: clamp(2.4rem, 10vw, 3.6rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1;
      transition: color 0.3s;
    }

    .freq-value.active {
      color: var(--phosphorus);
      text-shadow: 0 0 28px rgba(59,163,114,0.5);
    }

    .freq-unit {
      font-size: 1rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
      letter-spacing: 0.12em;
    }

    /* ── Mode buttons ── */
    .mode-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      flex: 1;
      padding: 0.6rem 0.4rem;
      background: var(--surface);
      border: 1px solid #2a3040;
      border-radius: 8px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
    }

    .mode-btn:hover {
      background: var(--surface-hi);
      color: var(--text-primary);
    }

    .mode-btn.active {
      background: var(--surface-hi);
      border-color: var(--coral);
      color: var(--coral);
      box-shadow: 0 0 12px rgba(204,98,71,0.25), inset 0 0 8px rgba(204,98,71,0.06);
    }

    .mode-btn.active.phos {
      border-color: var(--phosphorus);
      color: var(--phosphorus);
      box-shadow: 0 0 12px rgba(59,163,114,0.25), inset 0 0 8px rgba(59,163,114,0.06);
    }

    /* ── Play/Stop button ── */
    .play-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--coral);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .play-btn:hover {
      background: #d9704f;
      box-shadow: 0 0 20px rgba(204,98,71,0.4);
    }

    .play-btn:active { transform: scale(0.98); }

    .play-btn.playing {
      background: #2a3040;
      border: 1px solid var(--coral);
      color: var(--coral);
    }

    .play-btn.playing:hover {
      background: #333a4a;
    }

    /* ── Trimtab rotary encoder ── */
    .encoder-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .encoder-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .encoder-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      touch-action: none;
      cursor: grab;
    }

    .encoder-wrap:active { cursor: grabbing; }

    .encoder-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .encoder-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ── Bloch sphere ── */
    .bloch-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .bloch-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .bloch-svg {
      width: 200px;
      height: 200px;
      overflow: visible;
    }

    /* ── Breathing section ── */
    .breath-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .breath-circle-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .breath-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .breath-text {
      position: relative;
      z-index: 1;
      text-align: center;
      pointer-events: none;
    }

    .breath-phase {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--phosphorus);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .breath-timer {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .breath-info {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Two-column layout for encoder + bloch ── */
    .row-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }

    /* ── Card container ── */
    .card {
      background: var(--surface);
      border: 1px solid #1e2530;
      border-radius: 14px;
      padding: 1rem;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #1e2530;
    }

    /* ── Hidden when breathing mode inactive ── */
    .breath-card { display: none; }
    .breath-card.visible { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }
  </style>
</head>
<body>

<!-- Start overlay -->
<div id="startOverlay">
  <div class="tap-ring">
    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
  </div>
  <h2>Larmor</h2>
  <p>Tap anywhere to initialise audio</p>
</div>

<header>
  <h1>Larmor</h1>
  <p class="subtitle">³¹P NMR · 20.3 T · Virtual Trimtab</p>
</header>

<main>

  <!-- Frequency display -->
  <div class="freq-display">
    <div class="freq-value" id="freqValue">863.00</div>
    <div class="freq-unit">Hz</div>
  </div>

  <!-- Mode buttons -->
  <div class="mode-buttons">
    <button class="mode-btn active" id="btn863" data-mode="863">863 Hz</button>
    <button class="mode-btn" id="btn172" data-mode="172">172.35 Hz</button>
    <button class="mode-btn" id="btnBreath" data-mode="breath">Breathing</button>
  </div>

  <!-- Play / Stop -->
  <button class="play-btn" id="playBtn">&#9654;  Play</button>

  <div class="divider"></div>

  <!-- Encoder + Bloch sphere row -->
  <div class="row-pair">

    <!-- Rotary encoder -->
    <div class="card encoder-section">
      <div class="encoder-label">Trimtab</div>
      <div class="encoder-wrap" id="encoderWrap">
        <svg class="encoder-svg" viewBox="-70 -70 140 140" id="encoderSvg">
          <!-- Arc track 270° from -135° to +135° -->
          <path id="arcTrack" d="" fill="none" stroke="#2a3040" stroke-width="6" stroke-linecap="round"/>
          <path id="arcFill"  d="" fill="none" stroke="var(--coral)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
          <!-- Knob body -->
          <circle cx="0" cy="0" r="38" fill="#181c22" stroke="#2a3040" stroke-width="2"/>
          <circle cx="0" cy="0" r="36"
            fill="url(#knobGrad)"
            stroke="none"/>
          <!-- Indicator line (rotates with knob) -->
          <line id="knobLine" x1="0" y1="-14" x2="0" y2="-32"
            stroke="var(--coral)" stroke-width="3" stroke-linecap="round"/>
          <!-- Defs -->
          <defs>
            <radialGradient id="knobGrad" cx="35%" cy="30%" r="65%">
              <stop offset="0%" stop-color="#2a3040"/>
              <stop offset="100%" stop-color="#0f1115"/>
            </radialGradient>
          </defs>
        </svg>
      </div>
      <div class="encoder-hint">Drag to tune</div>
    </div>

    <!-- Bloch sphere -->
    <div class="card bloch-section">
      <div class="bloch-label">Bloch Sphere</div>
      <svg class="bloch-svg" viewBox="-100 -100 200 200" id="blochSvg">
        <defs>
          <radialGradient id="sphereGrad" cx="38%" cy="32%" r="62%">
            <stop offset="0%" stop-color="#232b38"/>
            <stop offset="100%" stop-color="#0f1115"/>
          </radialGradient>
        </defs>
        <!-- Sphere surface -->
        <circle cx="0" cy="0" r="70" fill="url(#sphereGrad)" stroke="#2a3040" stroke-width="1.2"/>
        <!-- Equatorial ellipse -->
        <ellipse cx="0" cy="0" rx="70" ry="22" fill="none" stroke="#2a3040" stroke-width="0.8" stroke-dasharray="4 3"/>
        <!-- Meridian -->
        <line x1="0" y1="-70" x2="0" y2="70" stroke="#2a3040" stroke-width="0.8" stroke-dasharray="4 3"/>
        <!-- Axes labels -->
        <text x="0" y="-76" text-anchor="middle" font-size="10" fill="var(--text-dim)" font-family="'Atkinson Hyperlegible',sans-serif">|0⟩</text>
        <text x="0" y="86" text-anchor="middle" font-size="10" fill="var(--text-dim)" font-family="'Atkinson Hyperlegible',sans-serif">|1⟩</text>
        <!-- SIC-POVM tetrahedral vertices (4 states on Bloch sphere) -->
        <!-- Vertex 0: north-ish  θ=acos(1/3)≈54.7°, φ=0   → (x,y,z)=(0.816,0,0.577) → proj (57,−40) -->
        <circle id="sic0" cx="57"  cy="-40" r="6" fill="#2a3040" stroke="var(--coral)" stroke-width="1.5"/>
        <!-- Vertex 1: θ=acos(1/3), φ=2π/3 → (−0.408,0.707,0.577) → proj (−28,−40) offset x by sin(120)*r*70 -->
        <circle id="sic1" cx="-29" cy="-20" r="6" fill="#2a3040" stroke="var(--coral)" stroke-width="1.5"/>
        <!-- Vertex 2: θ=acos(1/3), φ=4π/3 → (−0.408,−0.707,0.577) → proj (−29,−20) shifted -->
        <circle id="sic2" cx="-29" cy="14"  r="6" fill="#2a3040" stroke="var(--coral)" stroke-width="1.5"/>
        <!-- Vertex 3: south pole → (0,0,−1) → proj (0,70) -->
        <circle id="sic3" cx="0"   cy="70"  r="6" fill="#2a3040" stroke="var(--coral)" stroke-width="1.5"/>
        <!-- State vector arrow (will be updated by JS) -->
        <line id="blochArrow" x1="0" y1="0" x2="0" y2="-65"
          stroke="var(--phosphorus)" stroke-width="2" stroke-linecap="round"
          marker-end="url(#arrow)"/>
        <defs>
          <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="var(--phosphorus)"/>
          </marker>
        </defs>
      </svg>
    </div>

  </div><!-- end row-pair -->

  <!-- Breathing mode card (visible only in breath mode) -->
  <div class="card breath-card" id="breathCard">
    <div class="breath-section">
      <div class="breath-circle-wrap" id="breathCircleWrap">
        <svg class="breath-svg" viewBox="0 0 140 140" id="breathSvg">
          <!-- Background ring -->
          <circle cx="70" cy="70" r="55" fill="none" stroke="#1e2530" stroke-width="2"/>
          <!-- Animated ring -->
          <circle id="breathRing" cx="70" cy="70" r="55" fill="none"
            stroke="var(--phosphorus)" stroke-width="2" opacity="0.4"
            stroke-dasharray="346" stroke-dashoffset="346"/>
          <!-- Animated fill circle -->
          <circle id="breathCircle" cx="70" cy="70" r="24"
            fill="rgba(59,163,114,0.12)" stroke="var(--phosphorus)" stroke-width="1.5"/>
        </svg>
        <div class="breath-text">
          <div class="breath-phase" id="breathPhase">INHALE</div>
          <div class="breath-timer" id="breathTimer">4.0</div>
        </div>
      </div>
      <div class="breath-info">
        4s inhale · 172.35 Hz<br>
        4s hold · silence<br>
        6s exhale · 86.3 Hz
      </div>
    </div>
  </div>

</main>

<script>
'use strict';

/* ── Constants ── */
const FREQ_863  = 863;
const FREQ_172  = 172.35;
const FREQ_863_10 = 86.3;
const KNOB_MIN_HZ = 0.86;
const KNOB_MAX_HZ = 863;
const ARC_HALF_DEG = 135; // ±135° = 270° sweep

/* ── State ── */
let audioCtx   = null;
let osc        = null;
let gainNode   = null;
let isPlaying  = false;
let currentMode = '863'; // '863' | '172' | 'breath'
let currentFreq = FREQ_863;

let breathInterval = null;
let breathPhase = 'inhale'; // inhale | hold | exhale
let breathT = 0;
const BREATH_INHALE = 4;
const BREATH_HOLD   = 4;
const BREATH_EXHALE = 6;
const BREATH_TOTAL  = BREATH_INHALE + BREATH_HOLD + BREATH_EXHALE;

/* ── DOM refs ── */
const startOverlay = document.getElementById('startOverlay');
const freqValueEl  = document.getElementById('freqValue');
const btn863       = document.getElementById('btn863');
const btn172       = document.getElementById('btn172');
const btnBreath    = document.getElementById('btnBreath');
const playBtn      = document.getElementById('playBtn');
const breathCard   = document.getElementById('breathCard');
const breathPhaseEl = document.getElementById('breathPhase');
const breathTimerEl = document.getElementById('breathTimer');
const breathCircle = document.getElementById('breathCircle');
const breathRing   = document.getElementById('breathRing');

/* ════════════════════════════════
   AUDIO
   ════════════════════════════════ */
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.connect(audioCtx.destination);

  osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(currentFreq, audioCtx.currentTime);
  osc.connect(gainNode);
  osc.start();
}

function setGain(value, rampTime) {
  if (!gainNode) return;
  const now = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(now);
  gainNode.gain.setValueAtTime(gainNode.gain.value, now);
  gainNode.gain.exponentialRampToValueAtTime(Math.max(value, 0.0001), now + rampTime);
}

function setFreq(hz) {
  if (!osc) return;
  osc.frequency.setTargetAtTime(hz, audioCtx.currentTime, 0.02);
}

function startTone() {
  initAudio();
  if (currentMode !== 'breath') {
    setFreq(currentFreq);
    setGain(0.35, 0.06);
    if (navigator.vibrate) navigator.vibrate([200]);
  } else {
    startBreathCycle();
  }
}

function stopTone() {
  if (!gainNode) return;
  setGain(0.0001, 0.12);
  stopBreathCycle();
}

/* ════════════════════════════════
   BREATHING CYCLE
   ════════════════════════════════ */
let breathStartTime = 0;
let breathRaf = null;

function startBreathCycle() {
  stopBreathCycle();
  breathStartTime = performance.now();
  doBreathFrame();
  if (navigator.vibrate) navigator.vibrate([200]);
}

function stopBreathCycle() {
  if (breathRaf) { cancelAnimationFrame(breathRaf); breathRaf = null; }
  setGain(0.0001, 0.12);
  resetBreathVisual();
}

function resetBreathVisual() {
  breathCircle.setAttribute('r', '24');
  breathRing.setAttribute('stroke-dashoffset', '346');
  breathPhaseEl.textContent = 'INHALE';
  breathTimerEl.textContent = '4.0';
}

function doBreathFrame() {
  if (!isPlaying || currentMode !== 'breath') return;

  const elapsed = (performance.now() - breathStartTime) / 1000;
  const cycleT  = elapsed % BREATH_TOTAL;

  let phase, phaseT, phaseDur;
  if (cycleT < BREATH_INHALE) {
    phase = 'inhale'; phaseT = cycleT; phaseDur = BREATH_INHALE;
  } else if (cycleT < BREATH_INHALE + BREATH_HOLD) {
    phase = 'hold'; phaseT = cycleT - BREATH_INHALE; phaseDur = BREATH_HOLD;
  } else {
    phase = 'exhale'; phaseT = cycleT - BREATH_INHALE - BREATH_HOLD; phaseDur = BREATH_EXHALE;
  }

  // Detect phase transition for vibrate & audio change
  const prevPhase = breathPhase;
  breathPhase = phase;
  if (phase !== prevPhase) {
    applyBreathAudio(phase);
    if (navigator.vibrate) navigator.vibrate([80]);
  }

  // Update phase label
  const phaseLabels = { inhale: 'INHALE · 4s', hold: 'HOLD · 4s', exhale: 'EXHALE · 6s' };
  breathPhaseEl.textContent = phaseLabels[phase];

  // Countdown timer
  const remaining = phaseDur - phaseT;
  breathTimerEl.textContent = remaining.toFixed(1);

  // Animate circle radius: inhale 24→50, hold 50, exhale 50→24
  let r;
  if (phase === 'inhale') {
    r = 24 + 26 * (phaseT / phaseDur);
  } else if (phase === 'hold') {
    r = 50;
  } else {
    r = 50 - 26 * (phaseT / phaseDur);
  }
  breathCircle.setAttribute('r', r.toFixed(1));

  // Animate progress ring (circumference 346)
  const progress = phaseT / phaseDur;
  const offset = 346 * (1 - progress);
  breathRing.setAttribute('stroke-dashoffset', offset.toFixed(1));

  // Ring color: coral=inhale, dim=hold, phosphorus=exhale
  const ringColors = { inhale: 'var(--coral)', hold: 'var(--text-dim)', exhale: 'var(--phosphorus)' };
  breathRing.setAttribute('stroke', ringColors[phase]);
  breathCircle.setAttribute('stroke', ringColors[phase]);

  breathRaf = requestAnimationFrame(doBreathFrame);
}

function applyBreathAudio(phase) {
  if (!gainNode || !osc) return;
  const now = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(now);
  gainNode.gain.setValueAtTime(gainNode.gain.value, now);

  if (phase === 'inhale') {
    osc.frequency.setTargetAtTime(FREQ_172, now, 0.05);
    gainNode.gain.exponentialRampToValueAtTime(0.35, now + 0.3);
  } else if (phase === 'hold') {
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
  } else { // exhale
    osc.frequency.setTargetAtTime(FREQ_863_10, now, 0.05);
    gainNode.gain.exponentialRampToValueAtTime(0.25, now + 0.3);
  }
}

/* ════════════════════════════════
   PLAY / STOP BUTTON
   ════════════════════════════════ */
playBtn.addEventListener('click', () => {
  if (!audioCtx) initAudio();
  isPlaying = !isPlaying;
  if (isPlaying) {
    playBtn.textContent = '⏹  Stop';
    playBtn.classList.add('playing');
    startTone();
  } else {
    playBtn.textContent = '▶  Play';
    playBtn.classList.remove('playing');
    stopTone();
  }
});

/* ════════════════════════════════
   MODE BUTTONS
   ════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  [btn863, btn172, btnBreath].forEach(b => {
    b.classList.remove('active', 'phos');
  });

  breathCard.classList.remove('visible');

  if (mode === '863') {
    btn863.classList.add('active');
    currentFreq = FREQ_863;
    updateFreqDisplay(FREQ_863);
    if (isPlaying) {
      stopBreathCycle();
      setFreq(FREQ_863);
      setGain(0.35, 0.1);
    }
  } else if (mode === '172') {
    btn172.classList.add('active', 'phos');
    currentFreq = FREQ_172;
    updateFreqDisplay(FREQ_172);
    if (isPlaying) {
      stopBreathCycle();
      setFreq(FREQ_172);
      setGain(0.35, 0.1);
    }
  } else {
    btnBreath.classList.add('active', 'phos');
    breathCard.classList.add('visible');
    updateFreqDisplay(FREQ_172);
    if (isPlaying) {
      startBreathCycle();
    }
  }
}

btn863.addEventListener('click', () => setMode('863'));
btn172.addEventListener('click', () => setMode('172'));
btnBreath.addEventListener('click', () => setMode('breath'));

/* ════════════════════════════════
   START OVERLAY
   ════════════════════════════════ */
startOverlay.addEventListener('click', () => {
  initAudio();
  startOverlay.classList.add('hidden');
});

/* ════════════════════════════════
   FREQUENCY DISPLAY
   ════════════════════════════════ */
function updateFreqDisplay(hz) {
  freqValueEl.textContent = hz.toFixed(2);
  if (isPlaying) {
    freqValueEl.classList.add('active');
  } else {
    freqValueEl.classList.remove('active');
  }
}

/* ════════════════════════════════
   ROTARY ENCODER (Trimtab)
   ════════════════════════════════ */
const encoderWrap = document.getElementById('encoderWrap');
const knobLine    = document.getElementById('knobLine');
const arcTrack    = document.getElementById('arcTrack');
const arcFill     = document.getElementById('arcFill');

// Build SVG arc path helper
// angles in degrees, measured clockwise from 12 o'clock
// We use standard math angles (CCW from 3 o'clock) internally
function polarToXY(angleDeg, r) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
}

function describeArc(startDeg, endDeg, r) {
  const s = polarToXY(startDeg, r);
  const e = polarToXY(endDeg,   r);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
}

const ARC_START = -135 + 180; // clock-position: 225° (bottom-left) — we measure from top
// 270° arc: start at 225° clock-angle, end at 135° clock-angle (going CW)
// In our clock system (0=top, CW positive):
const ARC_START_DEG = 135;  // bottom-left
const ARC_END_DEG   = 45;   // bottom-right (going 270° CW = 135→45 crossing 360)

// Draw the static 270° track
// Start: 135° (clock), End: 135+270=405° → 45° (mod 360, but large-arc=1)
arcTrack.setAttribute('d', describeArc(135, 135 + 270, 56));

// Knob state
let knobAngle = 0; // degrees, range ±135 relative to centre (0=up)
let lastPointerAngle = null;
let dragging = false;

// Map knob angle (−135..+135) to frequency (log scale)
function knobAngleToFreq(angleDeg) {
  const t = (angleDeg + 135) / 270; // 0..1
  return KNOB_MIN_HZ * Math.pow(KNOB_MAX_HZ / KNOB_MIN_HZ, t);
}

function freqToKnobAngle(hz) {
  const t = Math.log(hz / KNOB_MIN_HZ) / Math.log(KNOB_MAX_HZ / KNOB_MIN_HZ);
  return t * 270 - 135;
}

function updateKnobVisual(angleDeg) {
  // Rotate indicator line
  knobLine.setAttribute('transform', `rotate(${angleDeg})`);

  // Fill arc from start to current angle
  // Knob 0° is up (top). Arc range is -135°..+135° in knob space.
  // In clock space: start = 135° clock, current = 135° + (angleDeg+135) CW
  const filled = angleDeg + 135; // 0..270
  if (filled > 0.5) {
    arcFill.setAttribute('d', describeArc(135, 135 + filled, 56));
    arcFill.style.display = '';
  } else {
    arcFill.style.display = 'none';
  }
}

function getPointerAngleDeg(e) {
  const rect = encoderWrap.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  return Math.atan2(dy, dx) * 180 / Math.PI; // −180..+180, 0=right
}

encoderWrap.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  dragging = true;
  encoderWrap.setPointerCapture(e.pointerId);
  lastPointerAngle = getPointerAngleDeg(e);
});

encoderWrap.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  e.preventDefault();

  const pAngle = getPointerAngleDeg(e);
  let delta = pAngle - lastPointerAngle;

  // Wrap delta at ±π discontinuity
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;

  lastPointerAngle = pAngle;

  knobAngle = Math.max(-135, Math.min(135, knobAngle + delta));
  updateKnobVisual(knobAngle);

  const hz = knobAngleToFreq(knobAngle);

  // In non-breath modes, tuning the knob overrides the preset freq
  if (currentMode !== 'breath') {
    currentFreq = hz;
    updateFreqDisplay(hz);
    if (isPlaying) setFreq(hz);
  } else {
    updateFreqDisplay(hz);
  }

  updateBlochArrow(hz);
});

encoderWrap.addEventListener('pointerup', (e) => {
  dragging = false;
  encoderWrap.releasePointerCapture(e.pointerId);
  lastPointerAngle = null;
});

encoderWrap.addEventListener('pointercancel', (e) => {
  dragging = false;
  lastPointerAngle = null;
});

// Initialise knob at 863 Hz
knobAngle = freqToKnobAngle(FREQ_863);
updateKnobVisual(knobAngle);

/* ════════════════════════════════
   BLOCH SPHERE
   ════════════════════════════════ */
const blochArrow = document.getElementById('blochArrow');
const sicDots    = [
  document.getElementById('sic0'),
  document.getElementById('sic1'),
  document.getElementById('sic2'),
  document.getElementById('sic3'),
];

// SIC-POVM tetrahedron: 4 vertices on Bloch sphere (unit sphere)
// Coordinates (x,y,z) on unit sphere — standard SIC-POVM tetrahedron
const SIC_3D = [
  {x:  0.8165,  y:  0,       z:  0.5774},
  {x: -0.4082,  y:  0.7071,  z:  0.5774},
  {x: -0.4082,  y: -0.7071,  z:  0.5774},
  {x:  0,       y:  0,       z: -1.0000},
];

// Project 3D sphere (r=70) to SVG 2D with simple oblique projection
// x → screen-x, z → screen-y (−z up), y → depth (x + y*scale)
function project3D(v, r) {
  const scale = 0.45; // oblique y-axis
  const sx = v.x * r + v.y * r * scale;
  const sy = -v.z * r + v.y * r * 0.2;
  return { sx, sy };
}

// Place SIC dots at projected positions
SIC_3D.forEach((v, i) => {
  const { sx, sy } = project3D(v, 70);
  sicDots[i].setAttribute('cx', sx.toFixed(1));
  sicDots[i].setAttribute('cy', sy.toFixed(1));
});

// Map frequency to a notional Bloch sphere angle
// 863 Hz → |0⟩ (north), 0.86 Hz → |1⟩ (south), log interpolation
function freqToBlochTheta(hz) {
  const t = Math.log(hz / KNOB_MIN_HZ) / Math.log(KNOB_MAX_HZ / KNOB_MIN_HZ);
  return t * Math.PI; // 0 = north, π = south
}

function updateBlochArrow(hz) {
  const theta = freqToBlochTheta(hz);
  const r = 65;
  const arrowX = r * Math.sin(theta) * 0.5;
  const arrowY = -r * Math.cos(theta);
  blochArrow.setAttribute('x2', arrowX.toFixed(1));
  blochArrow.setAttribute('y2', arrowY.toFixed(1));

  // Find nearest SIC vertex and glow it
  let minDist = Infinity;
  let nearest = -1;
  // Convert hz to Bloch vector (simplified: on xz-plane)
  const bx = Math.sin(theta);
  const bz = Math.cos(theta);
  SIC_3D.forEach((v, i) => {
    const dist = Math.hypot(v.x - bx * 0.5, v.z - bz);
    if (dist < minDist) { minDist = dist; nearest = i; }
  });

  sicDots.forEach((dot, i) => {
    if (i === nearest) {
      dot.setAttribute('fill', 'var(--coral)');
      dot.setAttribute('r', '8');
      dot.style.filter = 'drop-shadow(0 0 4px var(--coral))';
    } else {
      dot.setAttribute('fill', '#2a3040');
      dot.setAttribute('r', '6');
      dot.style.filter = '';
    }
  });
}

// Init Bloch display
updateBlochArrow(FREQ_863);
updateFreqDisplay(FREQ_863);

/* ════════════════════════════════
   Sync freq display active state
   on play/stop
   ════════════════════════════════ */
const origPlayClick = playBtn.onclick;
// (handled inside the listener above; repeat here to sync display)
function syncDisplayActive() {
  if (isPlaying) freqValueEl.classList.add('active');
  else           freqValueEl.classList.remove('active');
}

// Patch play button listener after original
const _btnClick = playBtn.addEventListener;
// Simple approach: re-run sync on each animation frame when playing
(function loop() {
  syncDisplayActive();
  requestAnimationFrame(loop);
})();

/* ════════════════════════════════
   Prevent double-tap zoom
   ════════════════════════════════ */
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

</script>
