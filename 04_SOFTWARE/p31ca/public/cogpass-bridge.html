  <title>P31 CogPass bridge</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="referrer" content="no-referrer" />
  <!--
    P31 CogPass cross-origin bridge — Phase 1 of CWP-BUS4-COGPASS-BRIDGE-2026-05.
    Wire contract: p31.cogPassBridge/1.0.0 (see ground-truth/cogpass-bridge.schema.json).

    Purpose:
      Allow allowlisted cross-origin P31 surfaces (e.g. https://bonding.p31ca.org)
      to read the operator's Cognitive Passport via postMessage, without ever copying
      the JSON across origins. The passport stays in p31ca.org localStorage; consumers
      receive a normalized snapshot in memory only.

    The single rule that prevents drift across schema bumps:
      The bridge HTML imports normalize() from /lib/p31-cogpass-reader.mjs.
      It does NOT reimplement normalization. Any drift between the reader's
      normalizer and a hand-rolled bridge normalizer would silently corrupt the
      bus bar promise on every consumer surface. Locked by verify:cogpass-bridge.

    Privacy invariants:
      - Strict CSP: default-src 'none'; script-src 'self'.
      - Origin allowlist is hardcoded; no wildcards; no runtime config.
      - No telemetry. No fetch. No cookie. No window.opener writes.
      - Replies always target event.origin explicitly (never '*').
      - Corrupted JSON, denied storage access, or any other failure → present:false,
        passport:null. Bridge never throws to the parent.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors *" />
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #aaa; font: 11px/1.4 monospace; }
    p { padding: 8px 12px; }

    a:visited { color: #50c4d4; }
  </style>

<body>
<a href="#main" style="position:absolute;left:-9999px;top:0;padding:0.5rem 1rem;background:var(--p31-void);color:var(--p31-teal);font-size:0.875rem;z-index:9999;border-radius:0 0 4px 4px;text-decoration:none" onfocus="this.style.left='0'" onblur="this.style.left='-9999px'">Skip to main content</a>
  <p>
    P31 CogPass bridge &middot; origin: <code>p31ca.org</code> &middot;
    contract: <code>p31.cogPassBridge/1.0.0</code> &middot;
    audit: <a href="/privacy">/privacy</a>
  </p>

  <script type="module">
    import { normalize } from '/lib/p31-cogpass-reader.mjs';

    const SCHEMA = 'p31.cogPassBridge/1.0.0';
    const STORAGE_KEY = 'p31-cogpass-v1';
    const BRIDGE_VERSION = '1.0.0';

    // Hardcoded allowlist. MUST match busBar.crossOriginBridge.allowedOrigins
    // in andromeda/04_SOFTWARE/p31ca/ground-truth/p31.ground-truth.json.
    // Lock enforced by scripts/verify-cogpass-bridge.mjs (home repo) — drift
    // between this list and ground-truth fails CI.
    const ALLOWED_ORIGINS = new Set([
      'https://bonding.p31ca.org',
      // Future cross-origin partners go here, NEVER wildcards. Each addition
      // requires operator approval logged in the commit message + a privacy
      // policy update naming the partner. See CWP-BUS4 §12 Phase 5.
    ]);

    function safeReadPassport() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { present: false, passport: null };
        const parsed = JSON.parse(raw);
        const normalized = normalize(parsed);
        if (!normalized) return { present: false, passport: null };
        return { present: true, passport: normalized };
      } catch (_err) {
        return { present: false, passport: null };
      }
    }

    function reply(targetOrigin, body) {
      try {
        window.parent.postMessage(body, targetOrigin);
      } catch (_err) {
        // postMessage to a closed/detached parent — silently drop.
      }
    }

    window.addEventListener('message', (event) => {
      if (!ALLOWED_ORIGINS.has(event.origin)) return;
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type !== 'cogpass:get') return;
      if (msg.schema !== SCHEMA) return;
      const nonce = typeof msg.nonce === 'string' ? msg.nonce : '';
      if (!nonce) return;
      const { present, passport } = safeReadPassport();
      reply(event.origin, {
        type: 'cogpass:reply',
        schema: SCHEMA,
        nonce,
        present,
        passport,
        bridgeVersion: BRIDGE_VERSION,
      });
    });

    // Announce readiness to the parent. Parent origin is unknown until the
    // first message arrives (browsers do not expose document.referrer in
    // strict-referrer mode), so the ready announcement targets '*'. The
    // ready payload contains no operator data, only the schema string and
    // version — safe to broadcast. Subsequent replies always target event.origin.
    try {
      window.parent.postMessage(
        { type: 'cogpass:ready', schema: SCHEMA, bridgeVersion: BRIDGE_VERSION },
        '*'
      );
    } catch (_err) {
      // Bridge loaded outside an iframe (direct visit) — no parent to notify.
    }
  </script>
</body>
