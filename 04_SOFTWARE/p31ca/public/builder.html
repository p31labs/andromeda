<style>

  }

  #tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

  /* Challenge panel */
  #challenges {
    position: absolute; bottom: 16px; right: 16px; width: 280px;
    background: rgba(22,25,32,0.92); border: 1px solid rgba(59,163,114,0.15);
    border-radius: 12px; padding: 12px; backdrop-filter: blur(8px);
  }
  #challenges .panel-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer;
  }
  #challenges .panel-header .label { font-size: 10px; color: var(--dim); font-family: var(--font-data); letter-spacing: 1px; }
  #challenges .panel-header .toggle { font-size: 10px; color: var(--dim); font-family: var(--font-data); }
  .challenge { margin-bottom: 10px; }

  .ch-bar { height: 4px; background: rgba(59,163,114,0.12); border-radius: 2px; overflow: hidden; }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── State ──
const COLORS = {
  tetrahedron: 0x4db8a8, octahedron: 0x8b7cc9, icosahedron: 0xcc6247,
  strut: 0xcda852, hub: 0x3ba372,
};
let pieces = [];       // { id, type, mesh, position: Vector3 }
let selectedTool = 'tetrahedron';
let idCounter = 0;
const SNAP = 1;
const CONNECT_DIST = 0.5;
const STORAGE_KEY = 'p31-builder-pieces';
const STORAGE_NAME_KEY = 'p31-builder-name';

// ── Three.js setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0f1115);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0f1115, 0.04);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 8, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x0a1a0a, 0.4));
const dirLight = new THREE.DirectionalLight(0x4db8a8, 0.6);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x3ba372, 0.5, 30);
pointLight.position.set(-4, 6, -4);
scene.add(pointLight);
scene.add(new THREE.HemisphereLight(0x001a00, 0x000000, 0.25));

// ── Grid floor ──
const gridMain = new THREE.GridHelper(20, 20, 0x0a2a1a, 0x050f05);
scene.add(gridMain);
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshBasicMaterial({ color: 0x0a2a1a, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// Invisible raycast plane
const rayPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
);
rayPlane.rotation.x = -Math.PI / 2;
scene.add(rayPlane);

// ── Placement ghost ──
let ghostMesh = null;
function updateGhost() {
  if (ghostMesh) { scene.remove(ghostMesh); ghostMesh.geometry.dispose(); ghostMesh.material.dispose(); }
  if (selectedTool === 'undo' || selectedTool === 'clear') { ghostMesh = null; return; }
  const geo = makeGeometry(selectedTool);
  const mat = new THREE.MeshStandardMaterial({
    color: COLORS[selectedTool], transparent: true, opacity: 0.3, wireframe: selectedTool !== 'hub',
  });
  ghostMesh = new THREE.Mesh(geo, mat);
  ghostMesh.visible = false;
  scene.add(ghostMesh);
}

// ── Geometry factory ──
function makeGeometry(type) {
  switch (type) {
    case 'tetrahedron':  return new THREE.TetrahedronGeometry(0.8);
    case 'octahedron':   return new THREE.OctahedronGeometry(0.8);
    case 'icosahedron':  return new THREE.IcosahedronGeometry(0.8);
    case 'strut':        return new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
    case 'hub':          return new THREE.SphereGeometry(0.15, 12, 12);
  }
}

function makeMaterial(type) {
  return new THREE.MeshStandardMaterial({
    color: COLORS[type],
    wireframe: type !== 'hub',
    transparent: true,
    opacity: 0.85,
    emissive: COLORS[type],
    emissiveIntensity: 0.2,
  });
}

// ── Snap helper ──
function snapToGrid(v) {
  return new THREE.Vector3(
    Math.round(v.x / SNAP) * SNAP,
    Math.max(0, Math.round(v.y / SNAP) * SNAP) || 0,
    Math.round(v.z / SNAP) * SNAP,
  );
}

// ── Piece placement ──
function placePiece(type, position) {
  const geo = makeGeometry(type);
  const mat = makeMaterial(type);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);
  if (type !== 'strut' && type !== 'hub') mesh.position.y = Math.max(position.y, 0.5);
  if (type === 'hub') mesh.position.y = Math.max(position.y, 0.15);
  if (type === 'strut') mesh.position.y = Math.max(position.y, 0.5);
  scene.add(mesh);
  const piece = { id: idCounter++, type, mesh, position: mesh.position.clone() };
  pieces.push(piece);
  spawnParticles(mesh.position, COLORS[type]);
  updateUI();
  saveState();
}

function undoLast() {
  if (pieces.length === 0) return;
  const last = pieces.pop();
  scene.remove(last.mesh);
  last.mesh.geometry.dispose();
  last.mesh.material.dispose();
  updateUI();
  saveState();
}

function clearAll() {
  if (pieces.length === 0) return;
  if (!confirm('Clear all pieces?')) return;
  for (const p of pieces) {
    scene.remove(p.mesh);
    p.mesh.geometry.dispose();
    p.mesh.material.dispose();
  }
  pieces = [];
  updateUI();
  saveState();
}

// ── Particle system ──
const MAX_PARTICLES = 200;
const particlePositions = new Float32Array(MAX_PARTICLES * 3);
const particleColors = new Float32Array(MAX_PARTICLES * 3);
const particleVelocities = [];
const particleLives = new Float32Array(MAX_PARTICLES);
for (let i = 0; i < MAX_PARTICLES; i++) { particleLives[i] = 0; particlePositions[i * 3 + 1] = -100; }

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
const pMat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
const particleSystem = new THREE.Points(pGeo, pMat);
scene.add(particleSystem);

function spawnParticles(pos, colorHex) {
  const color = new THREE.Color(colorHex);
  let spawned = 0;
  for (let i = 0; i < MAX_PARTICLES && spawned < 12; i++) {
    if (particleLives[i] <= 0) {
      particlePositions[i * 3] = pos.x;
      particlePositions[i * 3 + 1] = pos.y;
      particlePositions[i * 3 + 2] = pos.z;
      particleColors[i * 3] = color.r;
      particleColors[i * 3 + 1] = color.g;
      particleColors[i * 3 + 2] = color.b;
      particleVelocities[i] = new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 3 + 1, (Math.random() - 0.5) * 3);
      particleLives[i] = 0.6 + Math.random() * 0.4;
      spawned++;
    }
  }
}

function updateParticles(delta) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (particleLives[i] <= 0) continue;
    particleLives[i] -= delta * 2;
    if (particleLives[i] <= 0) { particlePositions[i * 3 + 1] = -100; continue; }
    const v = particleVelocities[i];
    if (!v) continue;
    particlePositions[i * 3] += v.x * delta;
    particlePositions[i * 3 + 1] += v.y * delta;
    particlePositions[i * 3 + 2] += v.z * delta;
    v.y -= delta * 2;
    const fade = particleLives[i];
    particleColors[i * 3] *= fade > 0.5 ? 1 : fade * 2;
    particleColors[i * 3 + 1] *= fade > 0.5 ? 1 : fade * 2;
    particleColors[i * 3 + 2] *= fade > 0.5 ? 1 : fade * 2;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
}

// ── Connection lines ──
const lineGroup = new THREE.Group();
scene.add(lineGroup);

function rebuildConnections() {
  while (lineGroup.children.length) {
    const c = lineGroup.children[0];
    lineGroup.remove(c);
    c.geometry.dispose();
    c.material.dispose();
  }
  const seen = new Set();
  for (let i = 0; i < pieces.length; i++) {
    for (let j = i + 1; j < pieces.length; j++) {
      const d = pieces[i].position.distanceTo(pieces[j].position);
      if (d <= CONNECT_DIST * 3 && d > 0.01) {
        const key = `${i}:${j}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const pts = new Float32Array([
          pieces[i].position.x, pieces[i].position.y, pieces[i].position.z,
          pieces[j].position.x, pieces[j].position.y, pieces[j].position.z,
        ]);
        const lg = new THREE.BufferGeometry();
        lg.setAttribute('position', new THREE.BufferAttribute(pts, 3));
        const lm = new THREE.LineBasicMaterial({ color: 0x3ba372, transparent: true, opacity: 0.25 });
        lineGroup.add(new THREE.Line(lg, lm));
      }
    }
  }
}

// ── Rigidity scoring ──
function computeRigidity() {
  if (pieces.length < 2) return 0;
  let connections = 0;
  for (let i = 0; i < pieces.length; i++) {
    for (let j = i + 1; j < pieces.length; j++) {
      if (pieces[i].position.distanceTo(pieces[j].position) <= CONNECT_DIST * 3) connections++;
    }
  }
  const maxConnections = (pieces.length * (pieces.length - 1)) / 2;
  return Math.min(100, (connections / maxConnections) * 100);
}

// ── Challenge evaluation ──
const challengeState = [false, false, false];

function evaluateChallenges() {
  const n = pieces.length;
  const rigidity = computeRigidity();
  const struts = pieces.filter(p => p.type === 'strut');

  // Challenge 0: First Triangle (3 struts close enough to form a loop)
  let ch0Progress = Math.min(1, struts.length / 3);
  if (struts.length >= 3) {
    // Check if any 3 struts are mutually close
    for (let i = 0; i < struts.length && !challengeState[0]; i++) {
      for (let j = i + 1; j < struts.length; j++) {
        for (let k = j + 1; k < struts.length; k++) {
          const d1 = struts[i].position.distanceTo(struts[j].position);
          const d2 = struts[j].position.distanceTo(struts[k].position);
          const d3 = struts[i].position.distanceTo(struts[k].position);
          if (d1 <= 2 && d2 <= 2 && d3 <= 2) { challengeState[0] = true; break; }
        }
        if (challengeState[0]) break;
      }
    }
  }

  // Challenge 1: Tetra Tower (4 tetrahedra placed)
  const tetras = pieces.filter(p => p.type === 'tetrahedron');
  let ch1Progress = Math.min(1, tetras.length / 4);
  if (tetras.length >= 4) challengeState[1] = true;

  // Challenge 2: Geodesic Dome (20+ pieces, >60% rigidity)
  let ch2Progress = Math.min(1, ((n / 20) * 0.5 + (rigidity / 60) * 0.5));
  if (n >= 20 && rigidity > 60) challengeState[2] = true;

  // Update bars
  document.getElementById('ch0-bar').style.width = (challengeState[0] ? 100 : ch0Progress * 100) + '%';
  document.getElementById('ch1-bar').style.width = (challengeState[1] ? 100 : ch1Progress * 100) + '%';
  document.getElementById('ch2-bar').style.width = (challengeState[2] ? 100 : ch2Progress * 100) + '%';

  // Show completion
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('ch-' + i);
    const existing = el.querySelector('.ch-complete');
    if (challengeState[i] && !existing) {
      const span = document.createElement('div');
      span.className = 'ch-complete';
      span.textContent = 'COMPLETE';
      el.appendChild(span);
    }
  }
}

// ── UI updates ──
function updateUI() {
  const rigidity = computeRigidity();
  const rigEl = document.getElementById('rigidity-val');
  rigEl.textContent = rigidity.toFixed(1) + '%';
  rigEl.style.color = rigidity > 80 ? '#3ba372' : rigidity > 40 ? '#d4a030' : '#cc6247';
  document.getElementById('piece-count').textContent = pieces.length;
  rebuildConnections();
  evaluateChallenges();
}

// ── Persistence ──
function saveState() {
  const data = pieces.map(p => ({ id: p.id, type: p.type, x: p.position.x, y: p.position.y, z: p.position.z }));
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  try { localStorage.setItem(STORAGE_NAME_KEY, document.getElementById('struct-name').value); } catch {}
}

function loadState() {
  try {
    const name = localStorage.getItem(STORAGE_NAME_KEY);
    if (name) document.getElementById('struct-name').value = name;
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    for (const d of data) {
      const geo = makeGeometry(d.type);
      const mat = makeMaterial(d.type);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(d.x, d.y, d.z);
      scene.add(mesh);
      pieces.push({ id: d.id, type: d.type, mesh, position: mesh.position.clone() });
      if (d.id >= idCounter) idCounter = d.id + 1;
    }
    updateUI();
  } catch {}
}

// ── Input handling ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isPointerOverUI = false;

document.getElementById('ui').addEventListener('pointerenter', () => { isPointerOverUI = true; });
document.getElementById('ui').addEventListener('pointerleave', () => { isPointerOverUI = false; });
// More precise: track on all interactive children
document.querySelectorAll('#tools, #challenges, #header').forEach(el => {
  el.addEventListener('pointerenter', () => { isPointerOverUI = true; });
  el.addEventListener('pointerleave', () => { isPointerOverUI = false; });
});

renderer.domElement.addEventListener('pointermove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  if (ghostMesh && !isPointerOverUI) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(rayPlane);
    if (hits.length > 0) {
      const snapped = snapToGrid(hits[0].point);
      ghostMesh.position.copy(snapped);
      if (selectedTool !== 'strut' && selectedTool !== 'hub') ghostMesh.position.y = Math.max(snapped.y, 0.5);
      if (selectedTool === 'hub') ghostMesh.position.y = Math.max(snapped.y, 0.15);
      if (selectedTool === 'strut') ghostMesh.position.y = Math.max(snapped.y, 0.5);
      ghostMesh.visible = true;
    }
  }
});

renderer.domElement.addEventListener('click', (e) => {
  if (isPointerOverUI) return;
  if (selectedTool === 'undo') { undoLast(); return; }
  if (selectedTool === 'clear') { clearAll(); return; }
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(rayPlane);
  if (hits.length > 0) {
    const snapped = snapToGrid(hits[0].point);
    placePiece(selectedTool, snapped);
  }
});

// Tool buttons
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tool = btn.dataset.tool;
    if (tool === 'undo') { undoLast(); return; }
    if (tool === 'clear') { clearAll(); return; }
    selectedTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateGhost();
  });
});

// Challenge panel collapse
let challengesOpen = true;
document.getElementById('ch-toggle').addEventListener('click', () => {
  challengesOpen = !challengesOpen;
  document.getElementById('ch-body').style.display = challengesOpen ? 'block' : 'none';
  document.getElementById('ch-arrow').textContent = challengesOpen ? '\u25BC' : '\u25B6';
});

// Name persistence
document.getElementById('struct-name').addEventListener('input', saveState);

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation loop ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  controls.update();
  updateParticles(delta);
  // Gentle rotation on placed pieces
  const t = clock.getElapsedTime();
  for (const p of pieces) {
    if (p.type !== 'hub' && p.type !== 'strut') {
      p.mesh.rotation.y = t * 0.1;
    }
  }
  renderer.render(scene, camera);
}

// ── Init ──
updateGhost();
loadState();
animate();
</script>
</body>
</html>
