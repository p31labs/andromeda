<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const mount = document.getElementById('mount');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x060810,1);
mount.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,1,0.1,500);
camera.position.set(0,2,6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;controls.minDistance=2;controls.maxDistance=15;

scene.add(new THREE.AmbientLight(0x102030,3));
const star=new THREE.DirectionalLight(0x4db8a8,1.5);star.position.set(3,10,5);scene.add(star);

// Stars
const starGeo=new THREE.BufferGeometry();
const starPos=[];
for(let i=0;i<2000;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    const r=40+Math.random()*20;
    starPos.push(Math.sin(phi)*Math.cos(theta)*r,Math.cos(phi)*r,Math.sin(phi)*Math.sin(theta)*r);
}
starGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starPos),3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xd8d6d0,size:0.08,transparent:true,opacity:0.6})));

// Node data
const STATES=['online','online','online','degraded','online','offline','research'];
const AXES=['SIC-1','SIC-2','SIC-3','SIC-4','SIC-5','SIC-6','SIC-7'];
const BUSES=['K4A','K4B','K4C','K4D','K4A','K4B','K4C'];
const STATE_COLORS={online:0x3ba372,degraded:0xcda852,offline:0xcc6247,research:0x8b7cc9};
const STATE_LABELS={online:'Online',degraded:'Degraded',offline:'Offline',research:'Research'};

// Build geodesic dome panels from icosahedron
const icoGeo = new THREE.IcosahedronGeometry(3, 2);
const posAttr = icoGeo.attributes.position;
const faceCount = posAttr.count / 3;

const panels = [];
const panelGroup = new THREE.Group();
scene.add(panelGroup);

for (let i=0; i<faceCount; i++) {
    const a=new THREE.Vector3().fromBufferAttribute(posAttr,i*3);
    const b=new THREE.Vector3().fromBufferAttribute(posAttr,i*3+1);
    const c=new THREE.Vector3().fromBufferAttribute(posAttr,i*3+2);

    // Only use upper hemisphere for dome
    const center=new THREE.Vector3().addVectors(a,b).add(c).divideScalar(3);
    if(center.y<-0.5) continue;

    const nodeIdx=i%7;
    const state=STATES[nodeIdx];
    const color=STATE_COLORS[state];

    const geo=new THREE.BufferGeometry();
    const verts=new Float32Array([a.x,a.y,a.z,b.x,b.y,b.z,c.x,c.y,c.z]);
    geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
    geo.computeVertexNormals();

    const mat=new THREE.MeshPhongMaterial({
        color,transparent:true,opacity:0.35,side:THREE.DoubleSide,
        emissive:color,emissiveIntensity:0.1
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.userData={panelIdx:i,node:`NODE-${nodeIdx}`,axis:AXES[nodeIdx],state,bus:BUSES[nodeIdx],load:Math.floor(Math.random()*80+10)+'%'};
    panelGroup.add(mesh);
    panels.push(mesh);

    // Edge wireframe
    const edges=new THREE.EdgesGeometry(geo);
    const lineMat=new THREE.LineBasicMaterial({color:0x2a4040,transparent:true,opacity:0.4});
    panelGroup.add(new THREE.LineSegments(edges,lineMat));
}

// Aurora band at equator
const auroraGeo=new THREE.TorusGeometry(3,0.08,4,64);
const auroraMat=new THREE.MeshBasicMaterial({color:0x25897d,transparent:true,opacity:0.3});
scene.add(new THREE.Mesh(auroraGeo,auroraMat));

// Dust motes
const moteGeo=new THREE.BufferGeometry();
const motePos=[];
for(let i=0;i<300;i++){
    motePos.push((Math.random()-0.5)*6,(Math.random()-0.5)*4,(Math.random()-0.5)*6);
}
moteGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(motePos),3));
const motes=new THREE.Points(moteGeo,new THREE.PointsMaterial({color:0x4db8a8,size:0.03,transparent:true,opacity:0.4}));
scene.add(motes);

// Raycaster for click
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click',e=>{
    const r=renderer.domElement.getBoundingClientRect();
    mouse.x=((e.clientX-r.left)/r.width)*2-1;
    mouse.y=-((e.clientY-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(panels);
    if(hits.length){
        const ud=hits[0].object.userData;
        document.getElementById('nc-title').textContent=ud.node;
        document.getElementById('nc-node').textContent=ud.node;
        document.getElementById('nc-axis').textContent=ud.axis;
        document.getElementById('nc-state').textContent=STATE_LABELS[ud.state]||ud.state;
        document.getElementById('nc-bus').textContent=ud.bus;
        document.getElementById('nc-load').textContent=ud.load;
        document.getElementById('node-card').classList.add('show');

        // Highlight
        panels.forEach(p=>{p.material.emissiveIntensity=0.1;p.material.opacity=0.35;});
        hits[0].object.material.emissiveIntensity=0.6;
        hits[0].object.material.opacity=0.7;
    }
});

// Search
document.getElementById('search').addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    panels.forEach(p=>{
        const match=!q||p.userData.node.toLowerCase().includes(q)||p.userData.axis.toLowerCase().includes(q)||p.userData.state.includes(q)||p.userData.bus.toLowerCase().includes(q);
        p.material.opacity=match?0.5:0.1;
        p.material.emissiveIntensity=match?0.2:0;
    });
});

function resize(){
    const w=mount.offsetWidth,h=mount.offsetHeight;
    renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
}
resize();window.addEventListener('resize',resize);

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.003;
    panelGroup.rotation.y=t*0.1;
    motes.rotation.y=t*0.05;
    auroraMat.opacity=0.2+Math.sin(t*2)*0.1;
    controls.update();
    renderer.render(scene,camera);
}
animate();
</script>
</body>
