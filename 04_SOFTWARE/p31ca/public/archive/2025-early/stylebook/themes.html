<!DOCTYPE html>
<html lang="en" data-p31-appearance="hub">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1115">
  <title>Themes · P31 Stylebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/p31-style.css">
  <link rel="stylesheet" href="/lib/p31-fluid.css">
  <link rel="stylesheet" href="/stylebook/_chrome.css">
  <style>
    .theme-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .theme-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--p31-border-subtle);
      cursor: pointer;
      transition: all 0.3s var(--p31-ease-fluid);
      position: relative;
    }
    .theme-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .theme-card.active {
      border-color: var(--p31-primary);
      box-shadow: 0 0 0 2px var(--p31-primary), 0 8px 24px rgba(0,0,0,0.2);
    }
    .theme-card-preview {
      padding: 24px;
      min-height: 140px;
      position: relative;
    }
    .theme-card-content {
      position: relative;
      z-index: 1;
    }
    .theme-card-eyebrow {
      font-family: var(--p31-font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.6;
      margin-bottom: 8px;
    }
    .theme-card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .theme-card-tagline {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 16px;
    }
    .theme-card-swatches {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .theme-card-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .theme-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(0,0,0,0.2);
      font-family: var(--p31-font-mono);
      font-size: 11px;
      backdrop-filter: blur(4px);
    }
    .theme-card-mini-cta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }
    .theme-card-active-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 3px 8px;
      background: var(--p31-primary);
      color: var(--p31-void);
      border-radius: 999px;
      font-family: var(--p31-font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      z-index: 2;
      display: none;
    }
    .theme-card.active .theme-card-active-badge { display: block; }
    
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .mode-card {
      padding: 16px;
      background: var(--p31-surface);
      border: 1px solid var(--p31-border-subtle);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-card:hover { border-color: var(--p31-primary); transform: translateY(-2px); }
    .mode-card.active { border-color: var(--p31-primary); background: var(--p31-surface2); }
    .mode-card-name {
      font-weight: 600;
      color: var(--p31-paper);
      margin-bottom: 4px;
    }
    .mode-card-desc {
      font-size: 12px;
      color: var(--p31-cloud);
      margin-bottom: 8px;
    }
    .mode-card-when {
      font-size: 11px;
      color: var(--p31-muted);
      font-family: var(--p31-font-mono);
    }
  </style>
</head>
<body>
  <script type="module">
    import { renderShell, code, callout } from '/stylebook/_chrome.js';
    import { P31ThemeController, P31_THEMES, P31_MODES } from '/lib/p31-theme-engine.mjs';
    window.p31Theme = new P31ThemeController({ defaultTheme: 'hub' });
    
    const themeCards = Object.values(P31_THEMES).map(t => {
      const accent = t.colors[t.emphasis.primary] || t.colors.teal;
      const secondary = t.colors[t.emphasis.secondary] || t.colors.coral;
      return `
        <div class="theme-card ${t.id === window.p31Theme.state.theme ? 'active' : ''}" data-theme-id="${t.id}" 
             onclick="window.p31Theme.setTheme('${t.id}'); document.querySelectorAll('.theme-card').forEach(c=>c.classList.remove('active')); this.classList.add('active');">
          <div class="theme-card-active-badge">Active</div>
          <div class="theme-card-preview" style="background: ${t.colors.void}; color: ${t.colors.paper};">
            <div class="theme-card-content">
              <div class="theme-card-eyebrow">${t.scheme} · ${t.id}</div>
              <div class="theme-card-title">${t.label}</div>
              <div class="theme-card-tagline">${t.description}</div>
              <div class="theme-card-swatches">
                <div class="theme-card-swatch" style="background: ${t.colors.surface};"></div>
                <div class="theme-card-swatch" style="background: ${t.colors.surface2};"></div>
                <div class="theme-card-swatch" style="background: ${accent};"></div>
                <div class="theme-card-swatch" style="background: ${secondary};"></div>
              </div>
            </div>
          </div>
          <div class="theme-card-meta" style="background: ${t.colors.surface}; color: ${t.colors.cloud};">
            <span style="opacity: 0.6;">setTheme(</span>
            <span style="color: ${accent};">'${t.id}'</span>
            <span style="opacity: 0.6;">)</span>
            <span style="margin-left: auto;" class="theme-card-mini-cta">→</span>
          </div>
        </div>
      `;
    }).join('');
    
    const modeCards = Object.values(P31_MODES).map(m => `
      <div class="mode-card ${m.id === window.p31Theme.state.mode ? 'active' : ''}" data-mode-id="${m.id}"
           onclick="window.p31Theme.setMode('${m.id}'); document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active')); this.classList.add('active');">
        <div class="mode-card-name">${m.label}</div>
        <div class="mode-card-desc">${m.description}</div>
        <div class="mode-card-when">${m.when || 'always available'}</div>
      </div>
    `).join('');
    
    const content = `
      <section class="sb-section">
        <div class="sb-section-header">
          <div class="sb-section-eyebrow">The themes</div>
          <h2 class="sb-h2">Six curated themes</h2>
          <p class="sb-text">Each theme is a complete world — color palette, contrast curve, emphasis hierarchy.
          Click any card to switch instantly. Your choice persists across sessions.</p>
        </div>
        <div class="theme-card-grid">${themeCards}</div>
      </section>
      
      <section class="sb-section">
        <div class="sb-section-header">
          <div class="sb-section-eyebrow">Adaptive modes</div>
          <h2 class="sb-h2">Five modes layer on top</h2>
          <p class="sb-text">Modes adjust the active theme — boost contrast for focus, warm desaturate for evening,
          quiet everything for spoon-low days. They compose with any theme.</p>
        </div>
        <div class="mode-grid">${modeCards}</div>
      </section>
      
      <section class="sb-section">
        <div class="sb-section-header">
          <div class="sb-section-eyebrow">Use it</div>
          <h2 class="sb-h2">JS API</h2>
        </div>
        
        ${code(`import { P31ThemeController } from '/lib/p31-theme-engine.mjs';

const theme = new P31ThemeController({
  defaultTheme: 'hub',
  defaultMode: 'default',
  autoSync: true   // listen to system prefers-color-scheme
});

// Switch
theme.setTheme('genesis');     // any of: hub, org, midnight, genesis, paper, matrix
theme.setMode('focus');        // any of: default, focus, calm, vibrant, muted

// Cycle
theme.cycleTheme();
theme.cycleMode();

// React to changes
theme.onChange((state) => {
  console.log('Theme is now', state.theme, 'mode', state.mode);
});

// Programmatic override (custom theme)
theme.applyOverrides({
  '--p31-primary': '#ff6b9d',
  '--p31-radius-lg': '20px'
});`, 'js', 'Theme controller')}
        
        ${callout('info', 'Persistence', 'Theme and mode choices save to <code>localStorage</code> under <code>p31:theme</code> and <code>p31:mode</code>. Setting <code>autoSync: false</code> disables system preference following — useful when the operator has manually overridden.')}
      </section>
      
      <section class="sb-section">
        <div class="sb-section-header">
          <div class="sb-section-eyebrow">Make your own</div>
          <h2 class="sb-h2">Authoring a theme</h2>
          <p class="sb-text">Themes are JSON-shaped. Author one in the playground, export the CSS, register it
          in your app's bootstrap.</p>
        </div>
        
        ${code(`// my-themes.mjs
export const SUNRISE_THEME = {
  id: 'sunrise',
  label: 'Sunrise',
  description: 'Warm coral on cream — for early-morning calm',
  scheme: 'light',
  colors: {
    void: '#fff8f0',
    surface: '#ffffff',
    surface2: '#fdf4e8',
    surface3: '#fae8d2',
    paper: '#3d2817',
    cloud: '#5a4530',
    muted: '#8b7560',
    coral: '#e07856',
    teal: '#3a8e83',
    cyan: '#5fa89c',
    butter: '#d4a847',
    lavender: '#9583c8',
    phosphorus: '#4ba37a',
    phosphor: '#22cc66'
  },
  emphasis: { primary: 'coral', secondary: 'teal', accent: 'butter' }
};

// Register at bootstrap
import { P31ThemeController, P31_THEMES } from '/lib/p31-theme-engine.mjs';
P31_THEMES.sunrise = SUNRISE_THEME;
const theme = new P31ThemeController({ defaultTheme: 'sunrise' });`, 'js', 'Custom theme')}
      </section>
    `;
    
    renderShell({
      activeId: 'themes',
      breadcrumb: [
        { href: '/stylebook/', label: 'Stylebook' },
        { href: '/stylebook/', label: 'Theme' },
        { label: 'Catalog' }
      ],
      title: 'Theme catalog',
      subtitle: 'Six curated themes plus five adaptive modes — every operator finds their signal.',
      meta: [
        { label: 'Themes', value: '6' },
        { label: 'Modes', value: '5' },
        { label: 'Combos', value: '30' }
      ],
      content
    });
  </script>
</body>
</html>
