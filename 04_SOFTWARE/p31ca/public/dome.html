<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ================================================================
// DATA
// ================================================================

const AXIS_COLORS = { a: 0xff9944, b: 0x44aaff, c: 0x44ffaa, d: 0xff4466 };
const AXIS_CSS = { a: '#ff9944', b: '#44aaff', c: '#44ffaa', d: '#ff4466' };
const AXIS_LABELS = { a: 'Body', b: 'Mesh', c: 'Forge', d: 'Shield' };
const BUS_CSS = { vital: '#ff6633', ac: '#33aacc', dc: '#cccc44' };
const STATE_CSS = { active: '#3ba372', deployed: '#25897d', countdown: '#cda852', complete: '#4db8a8', missing: '#cc6247', ongoing: '#25897d', monitoring: '#4db8a8', waiting: '#cda852', building: '#3ba372', planned: '#4db8a8', prototype: '#25897d', stretch: '#4db8a8', pending: '#cda852', todo: '#cda852', actionable: '#cda852', critical: '#cc6247' };
const STATE_GLOW = { countdown: 2.0, critical: 2.5, todo: 0.8, actionable: 1.5, complete: 0.4, active: 1.0, ongoing: 0.6, monitoring: 0.6, waiting: 0.5, deployed: 0.7, building: 0.9, planned: 0.3, prototype: 0.5, stretch: 0.4, missing: 1.2, pending: 1.0 };

// [label, a, b, c, d, state, bus, notes?]
const VERTICES = {
  'med-calcitriol': ['Calcitriol', 4, 0, 0, 0, 'ongoing', 'vital', '12hr dose cycle'],
  'med-effexor': ['Effexor XR', 4, 0, 0, 0, 'ongoing', 'vital'],
  'med-vyvanse': ['Vyvanse', 3, 0, 1, 0, 'ongoing', 'vital'],
  'spoon-budget': ['Spoon Budget', 4, 0, 0, 0, 'active', 'vital', '12/20'],
  'audhd': ['AuDHD Dx', 4, 0, 0, 0, 'active', 'vital', '2025'],
  'hypopara': ['Hypoparathyroid', 4, 0, 0, 0, 'ongoing', 'vital', 'Since 2003'],
  'exec-dys': ['Exec Dysfunction', 3, 0, 1, 0, 'active', 'vital'],
  'snap': ['SNAP', 3, 1, 0, 0, 'active', 'vital'],
  'medicaid': ['Medicaid', 3, 1, 0, 0, 'active', 'vital', 'All 3 covered'],
  'kids-bash': ['S.J.', 0, 4, 0, 0, 'monitoring', 'vital'],
  'kids-willow': ['W.J.', 0, 4, 0, 0, 'monitoring', 'vital'],
  'brenda': ['B.O.', 0, 4, 0, 0, 'active', 'vital', 'Support person'],
  'tyler': ['T.', 0, 3, 1, 0, 'active', 'ac', 'Beta tester'],
  'bonding-game': ['BONDING', 0, 3, 1, 0, 'deployed', 'ac', '413 tests, live'],
  'bonding-mp': ['Multiplayer', 0, 3, 1, 0, 'deployed', 'ac'],
  'p31-labs': ['P31 Labs', 1, 1, 2, 0, 'active', 'ac', '501(c)(3)'],
  'spaceship': ['Spaceship Earth', 0, 1, 3, 0, 'deployed', 'ac', 'p31ca.org'],
  'buffer': ['The Buffer', 2, 1, 1, 0, 'building', 'dc', '~85%'],
  'node-one': ['Node One', 1, 0, 3, 0, 'prototype', 'dc', 'ESP32-S3'],
  'centaur': ['The Centaur', 1, 1, 2, 0, 'active', 'ac'],
  'andromeda': ['Andromeda Mono', 0, 0, 4, 0, 'active', 'ac', '927 tests'],
  'genesis': ['Genesis Block', 0, 1, 3, 0, 'deployed', 'ac', 'SHA-256 chain'],
  'love-econ': ['L.O.V.E.', 1, 1, 2, 0, 'deployed', 'ac', 'Soulbound'],
  'phosphorus31': ['phosphorus31.org', 0, 0, 3, 1, 'deployed', 'ac'],
  'p31ca-site': ['p31ca.org', 0, 1, 3, 0, 'deployed', 'ac'],
  'cloudflare': ['Cloudflare Pages', 0, 0, 4, 0, 'active', 'ac'],
  'relay': ['CF Worker Relay', 0, 0, 4, 0, 'deployed', 'ac'],
  'posner': ['Posner Molecule', 2, 0, 2, 0, 'active', 'dc', 'Ca9(PO4)6'],
  'larmor': ['863 Hz', 1, 0, 1, 2, 'active', 'dc', 'Larmor canonical'],
  'ivm': ['IVM Geometry', 0, 0, 4, 0, 'active', 'dc'],
  'soulsafe': ['SOULSAFE', 0, 0, 2, 2, 'active', 'ac'],
  'opm-3112a': ['SF 3112A', 1, 0, 0, 3, 'complete', 'ac'],
  'opm-3112b': ['SF 3112B', 0, 0, 0, 4, 'complete', 'ac'],
  'opm-3112d': ['SF 3112D', 0, 0, 0, 4, 'missing', 'ac', 'Agency owes'],
  'opm-3112e': ['SF 3112E', 0, 0, 0, 4, 'missing', 'ac', 'Agency owes'],
  'opm-deadline': ['OPM Sep 26', 0, 0, 0, 4, 'countdown', 'vital'],
  'court-void': ['Void Ab Initio', 0, 0, 0, 4, 'active', 'ac', 'Core strategy'],
  'court-tsp': ['TSP Fraud Evidence', 0, 0, 1, 3, 'complete', 'ac', 'IRS-verified'],
  'ssa-decision': ['SSA Determination', 3, 0, 0, 1, 'waiting', 'ac'],
};

const EDGES = [
  ['med-calcitriol', 'hypopara', 'treats'], ['med-effexor', 'audhd', 'treats'],
  ['med-vyvanse', 'audhd', 'treats'], ['audhd', 'exec-dys', 'causes'],
  ['exec-dys', 'spoon-budget', 'drains'], ['kids-bash', 'bonding-game', 'plays'],
  ['kids-willow', 'bonding-game', 'plays'], ['bonding-game', 'bonding-mp', 'includes'],
  ['bonding-game', 'love-econ', 'earns'], ['bonding-mp', 'relay', 'uses'],
  ['p31-labs', 'spaceship', 'builds'], ['p31-labs', 'buffer', 'builds'],
  ['p31-labs', 'node-one', 'builds'], ['p31-labs', 'bonding-game', 'builds'],
  ['p31-labs', 'centaur', 'uses'], ['spaceship', 'genesis', 'uses'],
  ['spaceship', 'love-econ', 'displays'], ['andromeda', 'spaceship', 'contains'],
  ['andromeda', 'bonding-game', 'contains'], ['phosphorus31', 'cloudflare', 'hosted'],
  ['p31ca-site', 'cloudflare', 'hosted'], ['relay', 'cloudflare', 'hosted'],
  ['genesis', 'relay', 'sends'], ['posner', 'larmor', 'resonates'],
  ['posner', 'ivm', 'geometry'], ['soulsafe', 'andromeda', 'governs'],
  ['brenda', 'court-void', 'support'], ['tyler', 'bonding-mp', 'tests'],
  ['opm-3112a', 'opm-3112b', 'requires'], ['opm-3112d', 'opm-3112e', 'requires'],
  ['opm-deadline', 'opm-3112d', 'deadline'], ['court-void', 'court-tsp', 'evidence'],
  ['snap', 'spoon-budget', 'sustains'], ['medicaid', 'med-calcitriol', 'covers'],
  ['medicaid', 'kids-bash', 'covers'], ['medicaid', 'kids-willow', 'covers'],
  ['ssa-decision', 'audhd', 'depends'], ['ssa-decision', 'hypopara', 'depends'],
];

// ================================================================
// HELPERS
// ================================================================

function getDominantAxis(a, b, c, d) {
  const v = { a, b, c, d };
  let max = -1, axis = 'a';
  for (const k of ['a', 'b', 'c', 'd']) { if (v[k] > max) { max = v[k]; axis = k; } }
  return axis;
}

function getNodeColor(a, b, c, d) {
  const sum = a + b + c + d || 1;
  const col = new THREE.Color(0, 0, 0);
  const ac = { a: new THREE.Color(AXIS_COLORS.a), b: new THREE.Color(AXIS_COLORS.b), c: new THREE.Color(AXIS_COLORS.c), d: new THREE.Color(AXIS_COLORS.d) };
  for (const k of ['a', 'b', 'c', 'd']) {
    const w = ({ a, b, c, d })[k] / sum;
    col.r += ac[k].r * w; col.g += ac[k].g * w; col.b += ac[k].b * w;
  }
  return col;
}

function getConnections(nodeId) {
  return EDGES.filter(([s, t]) => s === nodeId || t === nodeId).map(([s, t, type]) => {
    const otherId = s === nodeId ? t : s;
    const other = VERTICES[otherId];
    if (!other) return null;
    return { id: otherId, label: other[0], type, axis: getDominantAxis(other[1], other[2], other[3], other[4]) };
  }).filter(Boolean);
}

// Tetrahedral direction for node placement
const TETRA = [
  new THREE.Vector3(0, 1, 0),
  new THREE.Vector3(0, -1/3, Math.sqrt(8/9)),
  new THREE.Vector3(-Math.sqrt(2/3), -1/3, -Math.sqrt(2/9)),
  new THREE.Vector3(Math.sqrt(2/3), -1/3, -Math.sqrt(2/9)),
];

function nodeDirection(a, b, c, d) {
  const sum = a + b + c + d || 1;
  const dir = new THREE.Vector3(0, 0, 0);
  dir.addScaledVector(TETRA[0], a / sum);
  dir.addScaledVector(TETRA[1], b / sum);
  dir.addScaledVector(TETRA[2], c / sum);
  dir.addScaledVector(TETRA[3], d / sum);
  return dir.normalize();
}

// ================================================================
// GEODESIC DOME BUILDER (2V icosahedron = 80 faces)
// ================================================================

function buildGeodesic(radius, subdivisions) {
  const PHI = (1 + Math.sqrt(5)) / 2;
  const raw = [
    [-1, PHI, 0], [1, PHI, 0], [-1, -PHI, 0], [1, -PHI, 0],
    [0, -1, PHI], [0, 1, PHI], [0, -1, -PHI], [0, 1, -PHI],
    [PHI, 0, -1], [PHI, 0, 1], [-PHI, 0, -1], [-PHI, 0, 1],
  ];
  let verts = raw.map(([x, y, z]) => {
    const l = Math.sqrt(x * x + y * y + z * z);
    return new THREE.Vector3(x / l * radius, y / l * radius, z / l * radius);
  });
  let faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1],
  ];

  for (let sub = 0; sub < subdivisions; sub++) {
    const midCache = {};
    const getMid = (i, j) => {
      const key = Math.min(i, j) + '_' + Math.max(i, j);
      if (midCache[key] !== undefined) return midCache[key];
      const mid = verts[i].clone().add(verts[j]).multiplyScalar(0.5).normalize().multiplyScalar(radius);
      const idx = verts.length;
      verts.push(mid);
      midCache[key] = idx;
      return idx;
    };
    const nf = [];
    for (const [a, b, c] of faces) {
      const ab = getMid(a, b), bc = getMid(b, c), ca = getMid(c, a);
      nf.push([a, ab, ca], [b, bc, ab], [c, ca, bc], [ab, bc, ca]);
    }
    faces = nf;
  }

  const edgeSet = new Set();
  for (const [a, b, c] of faces) {
    edgeSet.add(Math.min(a, b) + '_' + Math.max(a, b));
    edgeSet.add(Math.min(b, c) + '_' + Math.max(b, c));
    edgeSet.add(Math.min(a, c) + '_' + Math.max(a, c));
  }
  const edges = [];
  edgeSet.forEach(e => { const [a, b] = e.split('_').map(Number); edges.push([a, b]); });

  const geoFaces = faces.map(f => {
    const centroid = new THREE.Vector3().add(verts[f[0]]).add(verts[f[1]]).add(verts[f[2]]).divideScalar(3);
    return { indices: f, centroid };
  });

  return { verts, edges, faces: geoFaces };
}

// ================================================================
// NODE-TO-FACE ASSIGNMENT
// ================================================================

function assignNodesToFaces(geoFaces) {
  const entries = Object.entries(VERTICES);
  const assignments = [];
  const usedFaces = new Set();
  const faceToNode = new Map();
  const nodeToFace = new Map();

  const prioritized = entries.map(([id, data]) => {
    const [label, a, b, c, d, state, bus, notes] = data;
    const dir = nodeDirection(a, b, c, d);
    const priority = state === 'countdown' ? 0 : state === 'missing' ? 1 : state === 'active' ? 2 : 3;
    return { id, label, a, b, c, d, state, bus, notes, dir, priority };
  }).sort((x, y) => x.priority - y.priority);

  for (const n of prioritized) {
    let bestIdx = -1, bestDot = -2;
    for (let fi = 0; fi < geoFaces.length; fi++) {
      if (usedFaces.has(fi)) continue;
      const dot = geoFaces[fi].centroid.clone().normalize().dot(n.dir);
      if (dot > bestDot) { bestDot = dot; bestIdx = fi; }
    }
    if (bestIdx >= 0) {
      usedFaces.add(bestIdx);
      const color = getNodeColor(n.a, n.b, n.c, n.d);
      const glow = STATE_GLOW[n.state] || 0.5;
      const assignment = {
        faceIdx: bestIdx,
        node: { id: n.id, label: n.label, a: n.a, b: n.b, c: n.c, d: n.d, state: n.state, bus: n.bus, notes: n.notes },
        color, glow,
      };
      assignments.push(assignment);
      faceToNode.set(bestIdx, assignment);
      nodeToFace.set(n.id, assignment);
    }
  }
  return { assignments, faceToNode, nodeToFace };
}

// ================================================================
// SCENE SETUP
// ================================================================

const SHELL_RADIUS = 3.0;
const INSET = 0.92;
const SHRINK = 0.88;
const DUST_COUNT = 150;

const container = document.getElementById('app');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 7.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x050508, 1);
container.insertBefore(renderer.domElement, container.firstChild);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);
controls.update();

// Bloom pipeline
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.25, 0.6);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// Lighting
scene.add(new THREE.AmbientLight(0x334455, 0.6));
const pt1 = new THREE.PointLight(0x44aaff, 1.0, 25);
pt1.position.set(3, 4, 5); scene.add(pt1);
const pt2 = new THREE.PointLight(0xff6655, 0.3, 18);
pt2.position.set(-4, -2, 3); scene.add(pt2);

// ================================================================
// BUILD DOME
// ================================================================

const geo = buildGeodesic(SHELL_RADIUS, 2);
const { assignments, faceToNode, nodeToFace } = assignNodesToFaces(geo.faces);

// Edge wireframe
const wirePos = [];
const edgeProgress = [];
for (let i = 0; i < geo.edges.length; i++) {
  const [a, b] = geo.edges[i];
  wirePos.push(geo.verts[a].x, geo.verts[a].y, geo.verts[a].z);
  wirePos.push(geo.verts[b].x, geo.verts[b].y, geo.verts[b].z);
  const p = i / geo.edges.length;
  edgeProgress.push(p, p);
}
const wireGeo = new THREE.BufferGeometry();
wireGeo.setAttribute('position', new THREE.Float32BufferAttribute(wirePos, 3));
wireGeo.setAttribute('edgeProgress', new THREE.Float32BufferAttribute(edgeProgress, 1));

const edgeMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float edgeProgress;
    varying float vProgress;
    void main() {
      vProgress = edgeProgress;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying float vProgress;
    void main() {
      float pulse = smoothstep(0.0, 0.05, fract(vProgress - uTime * 0.08))
                  * (1.0 - smoothstep(0.05, 0.1, fract(vProgress - uTime * 0.08)));
      float base = 0.18;
      gl_FragColor = vec4(0.1, 0.18, 0.28, base + pulse * 0.55);
    }
  `,
  transparent: true, depthWrite: false,
});
scene.add(new THREE.LineSegments(wireGeo, edgeMat));

// Face panels (separate mesh per face for raycasting)
const faceMeshes = [];

for (let fi = 0; fi < geo.faces.length; fi++) {
  const face = geo.faces[fi];
  const [ai, bi, ci] = face.indices;
  const va = geo.verts[ai].clone().multiplyScalar(INSET);
  const vb = geo.verts[bi].clone().multiplyScalar(INSET);
  const vc = geo.verts[ci].clone().multiplyScalar(INSET);

  const cent = new THREE.Vector3().add(va).add(vb).add(vc).divideScalar(3);
  va.lerp(cent, 1 - SHRINK);
  vb.lerp(cent, 1 - SHRINK);
  vc.lerp(cent, 1 - SHRINK);

  const triGeo = new THREE.BufferGeometry();
  triGeo.setAttribute('position', new THREE.BufferAttribute(
    new Float32Array([va.x, va.y, va.z, vb.x, vb.y, vb.z, vc.x, vc.y, vc.z]), 3
  ));
  triGeo.computeVertexNormals();

  const assignment = faceToNode.get(fi);
  let mat;

  if (assignment) {
    const glow = assignment.glow;
    const isHot = glow >= 1.2;
    mat = new THREE.MeshPhysicalMaterial({
      color: assignment.color,
      emissive: assignment.color.clone().multiplyScalar(isHot ? 0.6 : 0.25 * glow),
      emissiveIntensity: isHot ? 2.5 * glow : 1.4,
      roughness: 0.02, metalness: 0.3,
      transmission: 0.1, thickness: 0.5,
      side: THREE.DoubleSide, transparent: true, opacity: 0.92,
      toneMapped: !isHot,
    });
  } else {
    mat = new THREE.MeshPhysicalMaterial({
      color: 0x050508, emissive: new THREE.Color(0x000000),
      roughness: 0.01, metalness: 0.1,
      transmission: 0.3, thickness: 0.2,
      side: THREE.DoubleSide, transparent: true, opacity: 0.08,
    });
  }

  const mesh = new THREE.Mesh(triGeo, mat);
  mesh.userData = { faceIdx: fi, assignment };
  scene.add(mesh);
  faceMeshes.push(mesh);
}

// Glow sprites on hot nodes
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 64; glowCanvas.height = 64;
const glowCtx = glowCanvas.getContext('2d');
const glowGrad = glowCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
glowGrad.addColorStop(0, 'rgba(0,255,255,1)');
glowGrad.addColorStop(0.2, 'rgba(0,255,255,0.3)');
glowGrad.addColorStop(0.5, 'rgba(0,255,255,0.08)');
glowGrad.addColorStop(1, 'rgba(0,255,255,0)');
glowCtx.fillStyle = glowGrad;
glowCtx.fillRect(0, 0, 64, 64);
const glowTex = new THREE.CanvasTexture(glowCanvas);

for (const a of assignments) {
  if (a.glow < 1.2) continue;
  const pos = geo.faces[a.faceIdx].centroid.clone().normalize().multiplyScalar(SHELL_RADIUS * 1.04);
  const spriteMat = new THREE.SpriteMaterial({
    map: glowTex, color: a.color,
    transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.copy(pos);
  sprite.scale.setScalar(0.35);
  scene.add(sprite);
}

// ================================================================
// DUST MOTES
// ================================================================

const dustPositions = new Float32Array(DUST_COUNT * 3);
const dustPhases = new Float32Array(DUST_COUNT);
const dustSpeeds = new Float32Array(DUST_COUNT);
for (let i = 0; i < DUST_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = Math.pow(Math.random(), 1/3) * SHELL_RADIUS * 0.92;
  dustPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
  dustPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  dustPositions[i*3+2] = r * Math.cos(phi);
  dustPhases[i] = Math.random() * Math.PI * 2;
  dustSpeeds[i] = 0.3 + Math.random() * 0.7;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
dustGeo.setAttribute('aPhase', new THREE.BufferAttribute(dustPhases, 1));
dustGeo.setAttribute('aSpeed', new THREE.BufferAttribute(dustSpeeds, 1));

const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aPhase;
    attribute float aSpeed;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      float t = uTime * aSpeed;
      pos.x += sin(t + aPhase) * 0.08;
      pos.y += cos(t * 0.7 + aPhase * 2.0) * 0.06;
      pos.z += sin(t * 0.5 + aPhase * 3.0) * 0.08;
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = 3.0 * (300.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
      vAlpha = 0.12 + 0.08 * sin(t * 0.3 + aPhase);
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() {
      float dist = length(gl_PointCoord - vec2(0.5));
      if (dist > 0.5) discard;
      float soft = 1.0 - smoothstep(0.2, 0.5, dist);
      gl_FragColor = vec4(0.3, 0.55, 0.65, vAlpha * soft);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ================================================================
// AURORA BAND
// ================================================================

const auroraGeo = new THREE.CylinderGeometry(SHELL_RADIUS * 1.08, SHELL_RADIUS * 1.08, 0.15, 64, 1, true);
const auroraMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      float wave = sin(vUv.x * 12.56 + uTime * 0.5) * 0.5 + 0.5;
      vec3 col = mix(vec3(0.1, 0.5, 0.4), vec3(0.2, 0.3, 0.8), wave);
      float alpha = 0.06 + 0.04 * sin(vUv.x * 6.28 + uTime * 0.3);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
});
const auroraMesh = new THREE.Mesh(auroraGeo, auroraMat);
scene.add(auroraMesh);

// ================================================================
// STARFIELD
// ================================================================

const STAR_COUNT = 500;
const starPos = new Float32Array(STAR_COUNT * 3);
const starCol = new Float32Array(STAR_COUNT * 3);
for (let i = 0; i < STAR_COUNT; i++) {
  const r = 6 + Math.random() * 50;
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  starPos[i*3] = r * Math.sin(ph) * Math.cos(th);
  starPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
  starPos[i*3+2] = r * Math.cos(ph);
  const hue = Math.random() < 0.7 ? 0.58 + Math.random() * 0.1 : 0.08 + Math.random() * 0.06;
  const c = new THREE.Color().setHSL(hue, 0.35, 0.12 + Math.random() * 0.08);
  starCol[i*3] = c.r; starCol[i*3+1] = c.g; starCol[i*3+2] = c.b;
}

// ================================================================
// UI STATE + INTERACTION
// ================================================================

let selectedNode = null;
let activeAxisFilter = null;
let activeStateFilters = new Set();

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerMoved = false;
let pointerDownPos = { x: 0, y: 0 };

renderer.domElement.addEventListener('pointerdown', e => {
  pointerMoved = false;
  pointerDownPos.x = e.clientX;
  pointerDownPos.y = e.clientY;
});

renderer.domElement.addEventListener('pointermove', e => {
  if (Math.abs(e.clientX - pointerDownPos.x) > 4 || Math.abs(e.clientY - pointerDownPos.y) > 4) {
    pointerMoved = true;
  }
});

renderer.domElement.addEventListener('pointerup', e => {
  if (pointerMoved) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(faceMeshes);
  if (hits.length > 0 && hits[0].object.userData.assignment) {
    selectNode(hits[0].object.userData.assignment.node);
  } else {
    selectNode(null);
  }
});

function selectNode(node) {
  selectedNode = node;
  const detail = document.getElementById('detail');
  if (!node) {
    detail.classList.remove('visible');
    updatePanelVisuals();
    return;
  }
  detail.classList.add('visible');
  document.getElementById('detail-name').textContent = node.label;
  const axis = getDominantAxis(node.a, node.b, node.c, node.d);
  const axisEl = document.getElementById('detail-axis');
  axisEl.textContent = AXIS_LABELS[axis];
  axisEl.style.color = AXIS_CSS[axis];
  const stateEl = document.getElementById('detail-state');
  stateEl.textContent = node.state;
  stateEl.style.color = STATE_CSS[node.state] || '#d8d6d0';
  const busEl = document.getElementById('detail-bus');
  busEl.textContent = node.bus;
  busEl.style.color = BUS_CSS[node.bus] || '#d8d6d0';
  document.getElementById('detail-notes').textContent = node.notes || '';

  const connsEl = document.getElementById('detail-conns');
  connsEl.innerHTML = '';
  const conns = getConnections(node.id);
  for (const c of conns) {
    const btn = document.createElement('button');
    btn.className = 'conn-btn';
    btn.style.color = AXIS_CSS[c.axis];
    btn.innerHTML = `${c.label} <span style="color:rgba(216,214,208,0.4);margin-left:2px">(${c.type})</span>`;
    btn.addEventListener('click', () => {
      const data = VERTICES[c.id];
      if (data) selectNode({ id: c.id, label: data[0], a: data[1], b: data[2], c: data[3], d: data[4], state: data[5], bus: data[6], notes: data[7] });
    });
    connsEl.appendChild(btn);
  }

  // Fly camera toward selected node
  const assignment = nodeToFace.get(node.id);
  if (assignment) {
    const target = geo.faces[assignment.faceIdx].centroid.clone().normalize().multiplyScalar(5.5);
    camera.position.lerp(target, 0); // We animate via controls target
  }

  updatePanelVisuals();
}

document.getElementById('detail-close').addEventListener('click', () => selectNode(null));

// Axis filter pills
document.querySelectorAll('#axis-filters .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const axis = btn.dataset.axis;
    document.querySelectorAll('#axis-filters .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeAxisFilter = axis === 'all' ? null : axis;
    updatePanelVisuals();
  });
});

// State filter pills
document.querySelectorAll('#state-filters .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const state = btn.dataset.state;
    if (activeStateFilters.has(state)) activeStateFilters.delete(state);
    else activeStateFilters.add(state);
    updatePanelVisuals();
  });
});

// Search
document.getElementById('search').addEventListener('input', () => updatePanelVisuals());

function updatePanelVisuals() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const hasFilter = activeAxisFilter || q || activeStateFilters.size > 0;

  for (const m of faceMeshes) {
    const a = m.userData.assignment;
    if (!a) {
      m.visible = !hasFilter;
      continue;
    }
    const node = a.node;
    let visible = true;

    if (activeAxisFilter && getDominantAxis(node.a, node.b, node.c, node.d) !== activeAxisFilter) visible = false;
    if (q && ![node.label, node.id, node.notes || '', node.state, node.bus].some(s => s.toLowerCase().includes(q))) visible = false;
    if (activeStateFilters.size > 0 && !activeStateFilters.has(node.state)) visible = false;

    m.visible = true;
    const mat = m.material;
    if (visible) {
      mat.opacity = 0.8;
      mat.emissive.copy(a.color).multiplyScalar(a.glow >= 1.2 ? 0.4 : 0.15 * a.glow);

      // Boost selected node
      if (selectedNode && node.id === selectedNode.id) {
        mat.emissive.copy(a.color).multiplyScalar(0.6);
        mat.emissiveIntensity = 2.5;
        mat.toneMapped = false;
      } else {
        mat.emissiveIntensity = a.glow >= 1.2 ? 1.5 * a.glow : 1.0;
        mat.toneMapped = a.glow < 1.2;
      }
    } else {
      mat.opacity = 0.04;
      mat.emissive.setScalar(0);
      mat.emissiveIntensity = 0;
    }
  }
}

// Node count
document.getElementById('node-count').textContent = `${Object.keys(VERTICES).length} NODES / ${geo.faces.length} FACES`;

// ================================================================
// ANIMATION LOOP
// ================================================================

let time = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = 0.016;
  time += 0.002;

  // Breathing
  const breath = 1.0 + 0.008 * Math.sin(time * 1.5);
  for (const m of faceMeshes) m.scale.setScalar(breath);

  // Edge pulse
  edgeMat.uniforms.uTime.value += dt;

  // Dust
  dustMat.uniforms.uTime.value += dt;

  // Aurora
  auroraMat.uniforms.uTime.value += dt;
  auroraMesh.rotation.y += 0.001;

  controls.update();
  composer.render();
}
animate();

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
});
</script>
