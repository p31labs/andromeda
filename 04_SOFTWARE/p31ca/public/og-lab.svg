<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bglab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1115"/>
      <stop offset="100%" style="stop-color:#1a1d23"/>
    </linearGradient>
    <filter id="glowlab" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bglab)"/>
  <!-- Grid lines -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- K4 tetrahedron hint -->
  <g transform="translate(1000, 130)" opacity="0.15">
    <polygon points="0,-60 52,30 -52,30" fill="none" stroke="#25897d" stroke-width="2"/>
    <polygon points="0,60 52,-30 -52,-30" fill="none" stroke="#25897d" stroke-width="2"/>
  </g>
  <!-- Logo mark -->
  <g transform="translate(100, 265)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#25897d"/>
    <circle cx="76" cy="23" r="12" fill="#cc6247"/>
    <text x="50" y="68" font-family="system-ui, sans-serif" font-weight="900" font-size="43" fill="#d8d6d0" text-anchor="middle">P31</text>
  </g>
  <!-- Title -->
  <text x="230" y="320" font-family="Atkinson Hyperlegible, system-ui, sans-serif" font-weight="700" font-size="72" fill="#d8d6d0">The Lab</text>
  <!-- Subtitle -->
  <text x="230" y="380" font-family="Atkinson Hyperlegible, system-ui, sans-serif" font-size="32" fill="#808080">Tools for neurodivergent families. Free. Open source.</text>
  <!-- URL -->
  <text x="100" y="560" font-family="JetBrains Mono, monospace" font-size="20" fill="#4db8a8">p31ca.org/lab</text>
  <!-- Corner dot -->
  <circle cx="1100" cy="530" r="6" fill="#cc6247" filter="url(#glowlab)"/>
</svg>