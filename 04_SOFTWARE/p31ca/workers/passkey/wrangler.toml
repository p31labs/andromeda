name       = "p31-passkey"
main       = "src/index.ts"
compatibility_date = "2025-01-01"

# KV namespace — store challenges with 5-min TTL
[[kv_namespaces]]
binding  = "CHALLENGES"
id       = "REPLACE_WITH_KV_NAMESPACE_ID"

# D1 database — store credentials
[[d1_databases]]
binding      = "DB"
database_name = "p31-passkey-db"
database_id  = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
RP_NAME = "P31 Labs"
# RP_ID is set per-environment below

[env.production.vars]
RP_ID = "p31ca.org"

[env.preview.vars]
RP_ID = "p31ca.pages.dev"

# Zone route — /api/passkey/* on p31ca.org → this worker
# wrangler deploy --env production will register this automatically.
[[env.production.routes]]
pattern = "p31ca.org/api/passkey/*"
zone_name = "p31ca.org"

[[rules]]
type = "ESModule"
globs = ["**/*.ts"]
