# P31 Discord Bot Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  p31-discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p31-discord-bot
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - p31-network

networks:
  p31-network:
    driver: bridge
