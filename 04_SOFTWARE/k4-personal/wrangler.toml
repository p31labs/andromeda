# K4-Personal — Per-user agent with SQLite-backed state, energy, reminders.
# Deploy: cd 04_SOFTWARE/k4-personal && npx wrangler deploy

name = "k4-personal"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "2.0.0"
K4_HUBS = "https://k4-hubs.p31.workers.dev"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "OPERATOR_STATE", class_name = "OperatorStateDO" },
  { name = "SIGNAL_PROCESSOR", class_name = "SignalProcessorDO" },
  { name = "CONTEXT_ENGINE", class_name = "ContextEngineDO" },
  { name = "SHIELD_ENGINE", class_name = "ShieldEngineDO" }
]

# Migration v2: Four-vertex tetrahedron refactor
[[migrations]]
tag = "v2"
new_sqlite_classes = [
  "OperatorStateDO",
  "SignalProcessorDO",
  "ContextEngineDO",
  "ShieldEngineDO"
]
deleted_classes = ["PersonalAgent"]

# D1 for telemetry flush (optional)
# [[d1_databases]]
# binding = "DB"
# database_name = "p31-telemetry"
# database_id = "fc3b2ffb-4de4-4843-88b1-50e5c788dc50"

[observability]
enabled = true