# K4-Personal — Per-user agent with SQLite-backed state, energy, reminders.
# Deploy: cd 04_SOFTWARE/k4-personal && npx wrangler deploy

name = "k4-personal"
main = "src/index.js"
compatibility_date = "2025-10-01"

[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"

[ai]
binding = "AI"

[durable_objects]
bindings = [{ name = "PERSONAL_AGENT", class_name = "PersonalAgent" }]

# Migration v1 already applied
# [[migrations]]
# tag = "v1"
# new_sqlite_classes = ["PersonalAgent"]

# D1 for telemetry flush (optional)
# [[d1_databases]]
# binding = "DB"
# database_name = "p31-telemetry"
# database_id = "fc3b2ffb-4de4-4843-88b1-50e5c788dc50"

[observability]
enabled = true