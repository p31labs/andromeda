name = "genesis-gate"
main = "src/index.ts"
compatibility_date = "2026-04-04"
workers_dev = true

[[custom_domains]]
hostname = "genesis.p31ca.org"

[observability]
enabled = true

[[kv_namespaces]]
binding = "EVENTS_KV"
id = "bec5c1910e9c41de88c49674687d37b0"

[vars]
ALLOWED_ORIGINS = "https://p31ca.org,https://phosphorus31.org,https://bonding.p31ca.org,https://spaceship-earth.pages.dev"
EVENT_TTL_DAYS = "30"
MAX_PAYLOAD_BYTES = "4096"
GOVERNANCE_ERROR_THRESHOLD = "5"
GOVERNANCE_WINDOW_SECONDS = "60"

# Secrets (set via wrangler CLI):
#   npx wrangler secret put ADMIN_TOKEN   → for /events read access
