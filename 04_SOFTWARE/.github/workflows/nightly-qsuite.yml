# ═══════════════════════════════════════════════════════════════════════════════
# Nightly QA Suite
#
# Runs comprehensive nightly tests across all deployable units.
# Includes PQC security audit, integration tests, and smoke tests.
# ═══════════════════════════════════════════════════════════════════════════════

name: Nightly QA Suite

on:
  schedule:
    - cron: '0 2 * * *'  # Daily 2 AM UTC
  workflow_dispatch:
    inputs:
      tests:
        description: 'Specific tests to run'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  security-audit:
    name: PQC Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run PQC Security Audit
        run: |
          node scripts/pqc-audit.js 04_SOFTWARE pqc-nightly-results.json
          node -e "
            const r = require('./pqc-nightly-results.json');
            const findings = r.findings || [];
            const crits = findings.filter(f => f.severity === 'CRITICAL');
            const highs = findings.filter(f => f.severity === 'HIGH');
            
            console.log('PQC Audit Results:');
            console.log('  CRITICAL:', crits.length);
            console.log('  HIGH:', highs.length);
            
            if (crits.length) {
              console.error('CRITICAL FINDINGS:', JSON.stringify(crits, null, 2));
              process.exit(1);
            }
          "

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: pqc-audit-results
          path: pqc-nightly-results.json

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [security-audit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bonding tests
        run: cd bonding && npm run test -- --run

      - name: Run spaceship-earth tests
        run: cd spaceship-earth && npm run test -- --run

      - name: Run quantum-edge tests
        run: |
          cd 04_SOFTWARE/packages/quantum-edge
          npm ci
          npm test || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/coverage/
            **/*.test.xml

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Test Pages endpoints
        run: |
          echo "Testing Spaceship Earth..."
          curl -f https://spaceship-earth.pages.dev/ > /dev/null || echo "Spaceship Earth: FAILED"
          
          echo "Testing Bonding..."
          curl -f https://bonding.pages.dev/ > /dev/null || echo "Bonding: FAILED"

      - name: Test worker health
        run: |
          echo "Testing quantum-edge staging..."
          curl -f https://p31-quantum-edge-staging.pages.dev/health > /dev/null 2>&1 || echo "Staging: unavailable"
          
          echo "Testing donate-api..."
          curl -f https://donate-api.phosphorus31.org/health > /dev/null 2>&1 || echo "Donate API: unavailable"

      - name: Generate nightly report
        run: |
          echo "## Nightly QA Report - $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All automated tests completed. Check artifacts for detailed results." >> $GITHUB_STEP_SUMMARY