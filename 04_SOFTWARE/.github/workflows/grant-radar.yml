# ═══════════════════════════════════════════════════════════════════════════════
# Grant Radar — Weekly Funding Opportunity Scan
#
# Scans federal databases for relevant funding opportunities.
# Runs weekly on Monday at 6 AM UTC.
# ═══════════════════════════════════════════════════════════════════════════════

name: Grant Radar

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force fresh scan'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'

jobs:
  scan-federal:
    name: Scan Federal Databases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run grant radar scan
        run: |
          node grant_radar.py --output grant-opportunities.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter relevant opportunities
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('grant-opportunities.json'));
            const relevant = data.filter(g => 
              g.keywords.some(k => 
                ['autism', 'adhd', 'neurodivergent', 'assistive', 'disability', 
                 'post-quantum', 'crypto', 'hardware', 'embedded', 'nonprofit'].includes(k.toLowerCase())
              )
            );
            fs.writeFileSync('relevant-opportunities.json', JSON.stringify(relevant, null, 2));
            console.log('Found', relevant.length, 'relevant opportunities');
          "

      - name: Post to tracking issue
        if: env.GITHUB_TOKEN
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('relevant-opportunities.json'));
            const body = data.map(g => 
              `- [\`${g.source}\`] **${g.title}** (${g.deadline || 'TBD'})\\n  ${g.url}`
            ).join('\\n');
            console.log('::set-output name=body::' + body);
          "

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: grant-scan-results
          path: |
            grant-opportunities.json
            relevant-opportunities.json

      - name: Create weekly summary
        if: always()
        run: |
          echo "## Grant Radar Summary $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed. See artifacts for full results." >> $GITHUB_STEP_SUMMARY