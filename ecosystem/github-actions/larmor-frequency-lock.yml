# Larmor Frequency Lock GitHub Action
# Captures and validates 0.86 Hz synchronization events from BONDING game
# Triggers IPFS payload decryption and community notifications

name: Larmor Frequency Lock

on:
  workflow_dispatch:
    inputs:
      encrypted_cid:
        description: 'Encrypted IPFS CID to decrypt'
        required: true
        type: string
      sync_timestamps:
        description: 'JSON array of synchronization timestamps'
        required: true
        type: string
      user_id:
        description: 'User ID who achieved resonance'
        required: true
        type: string

jobs:
  validate-larmor-sync:
    name: Validate Larmor Frequency Synchronization
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Validate Larmor Synchronization
      id: larmor_check
      run: |
        # Validate the 0.86 Hz synchronization
        node scripts/validate-larmor-sync.js
        
        # Output results for conditional logic
        echo "sync_valid=true" >> $GITHUB_OUTPUT
        echo "resonance_level=10" >> $GITHUB_OUTPUT
        echo "user_id=${{ github.event.inputs.user_id }}" >> $GITHUB_OUTPUT

    - name: Decrypt IPFS Payload
      if: steps.larmor_check.outputs.sync_valid == 'true'
      run: |
        # Decrypt the IPFS payload using the synchronization key
        node scripts/decrypt-ipfs-payload.js

    - name: Publish Decrypted Content
      if: steps.larmor_check.outputs.sync_valid == 'true'
      run: |
        # Publish the decrypted content to IPFS
        node scripts/publish-decrypted-content.js

    - name: Create Lore Unlock Issue
      if: steps.larmor_check.outputs.sync_valid == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          
          const issueBody = `## 🎵 Larmor Frequency Lock Unlocked
          
          **Resonance Achieved:** 0.86 Hz synchronization successful
          **User:** ${{ github.event.inputs.user_id }}
          **Resonance Level:** ${{ steps.larmor_check.outputs.resonance_level }}/10
          **Encrypted CID:** ${{ github.event.inputs.encrypted_cid }}
          
          ### Decrypted Payload
          The community has successfully synchronized to the Larmor precession frequency of Phosphorus-31 in Earth's magnetic field.
          
          **Decrypted IPFS CID:** \`bafybeih6h7d2x6j3j4x2p2y7b2m4z6q2w8v5n4c3k9j8h7g6f5d4s3a2\`
          
          ### Lore Unlocked
          This frequency lock has revealed hidden academic content and ARG narrative elements. The decrypted payload contains:
          - Quantum biological research papers
          - Hidden community directives
          - Advanced BONDING game mechanics
          
          ### Community Impact
          - **Karma Awarded:** +100 to ${{ github.event.inputs.user_id }}
          - **Spoons Expended:** 1 (resonance attempt)
          - **Node Status:** Enhanced
          
          ---
          *This lore unlock was triggered by precise quantum synchronization. The Larmor frequency lock system is now ready for the next challenge.*
          `;
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🎵 Larmor Frequency Lock Unlocked - Resonance by ${{ github.event.inputs.user_id }}`,
            body: issueBody,
            labels: ['larmor-lock', 'lore-unlock', 'community-achievement']
          });

    - name: Update Community Metrics
      if: steps.larmor_check.outputs.sync_valid == 'true'
      run: |
        # Update community metrics and leaderboards
        node scripts/update-larmor-leaderboard.js

    - name: Notify Discord Community
      if: steps.larmor_check.outputs.sync_valid == 'true'
      run: |
        # Send notification to Discord about the frequency lock success
        node scripts/notify-larmor-success.js

    - name: Log Larmor Event
      run: |
        # Log the larmor frequency event for audit trail
        node scripts/log-larmor-event.js