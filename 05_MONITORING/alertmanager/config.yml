# Alertmanager Configuration

global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@p31ca.org'
  smtp_auth_username: 'alerts@p31ca.org'
  smtp_auth_password: 'password'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook'

  routes:
    - match:
        severity: critical
      receiver: 'critical-webhook'
      continue: true

    - match:
        severity: warning
      receiver: 'warning-webhook'

receivers:
  - name: 'webhook'
    webhook_configs:
      - url: 'http://localhost:3000/api/alerts'
        send_resolved: true

  - name: 'critical-webhook'
    webhook_configs:
      - url: 'http://localhost:3000/api/alerts/critical'
        send_resolved: true

  - name: 'warning-webhook'
    webhook_configs:
      - url: 'http://localhost:3000/api/alerts/warning'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'severity']
