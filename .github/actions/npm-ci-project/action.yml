name: npm ci (npm cache)
description: setup-node with npm cache + npm ci in a package directory
inputs:
  working-directory:
    description: Directory containing package-lock.json
    required: true
  cache-dependency-path:
    description: Path to package-lock.json for actions/cache
    required: true
  install-mode:
    description: ci | ci-prefer-offline
    default: ci

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION != '' && env.NODE_VERSION || '20' }}
        cache: npm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
    - name: Install
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        case "${{ inputs.install-mode }}" in
          ci-prefer-offline) npm ci --prefer-offline ;;
          *) npm ci ;;
        esac
