# Frozen install for jobs that only need the Turbo workspace under 04_SOFTWARE.
name: pnpm 04_SOFTWARE workspace
description: pnpm/action-setup, Node 20, install with 04_SOFTWARE/pnpm-lock.yaml only

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: pnpm
        cache-dependency-path: 04_SOFTWARE/pnpm-lock.yaml
    - name: Install
      shell: bash
      working-directory: 04_SOFTWARE
      run: pnpm install --frozen-lockfile
