# Real ESLint (flat config) for bonding + shared. Warnings are non-fatal; errors fail.
# Use path-based `pnpm -C` (not multiple `--filter` on one `run`) — pnpm 10 can raise
# ERR_PNPM_RECURSIVE_RUN_NO_SCRIPT for multi-filter `pnpm run` even when each package has `lint`.
name: ESLint (bonding + shared)
description: pnpm -C bonding and pnpm -C packages/shared run lint

runs:
  using: composite
  steps:
    - name: Lint
      shell: bash
      run: |
        set -euo pipefail
        cd 04_SOFTWARE
        pnpm -C bonding run lint
        pnpm -C packages/shared run lint
