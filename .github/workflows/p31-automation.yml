# Verify (PR + push) + Worker deploys on push. Pages deploys here are manual-only;
# path-scoped workflows own routine Pages ships (p31-technical-library, p31ca-hub, phosphorus31-site).
name: P31 Automation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_bouncer:
        description: Deploy p31-bouncer Worker
        type: boolean
        default: true
      deploy_command_center:
        description: Deploy command-center Worker
        type: boolean
        default: true
      deploy_docs:
        description: Build + deploy Starlight docs to Pages (p31-technical-library)
        type: boolean
        default: false
      deploy_p31ca:
        description: Build + deploy p31ca.org Astro hub to Pages (p31ca)
        type: boolean
        default: false
      deploy_phosphorus31:
        description: Build + deploy phosphorus31.org Astro site to Pages (phosphorus31-org)
        type: boolean
        default: false
      p31ca_strict_passport:
        description: p31ca deploy only — require cognitive-passport in tree (P31_STRICT_PASSPORT)
        type: boolean
        default: false

concurrency:
  group: p31-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 04_SOFTWARE/docs/package-lock.json

      - name: k4-mesh-core unit tests
        run: cd 04_SOFTWARE/packages/k4-mesh-core && node --test test/*.test.mjs

      - name: Install + build Starlight docs
        run: cd 04_SOFTWARE/docs && npm ci && npm run build

      - name: Stack link check (optional fleet URLs warn-only — see verify-stack-links.mjs)
        run: node 04_SOFTWARE/scripts/verify-stack-links.mjs

  paths:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      bouncer: ${{ steps.filter.outputs.bouncer }}
      command_center: ${{ steps.filter.outputs.command_center }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bouncer:
              - '04_SOFTWARE/cloudflare-worker/bouncer/**'
            command_center:
              - '04_SOFTWARE/cloudflare-worker/command-center/**'

  deploy-bouncer:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_bouncer == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.bouncer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install wrangler (bouncer)
        run: cd 04_SOFTWARE/cloudflare-worker/bouncer && npm install

      - name: Push BOUNCER_GATE_TOKEN from GitHub secret → Cloudflare Workers
        working-directory: 04_SOFTWARE/cloudflare-worker/bouncer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BOUNCER_GATE_TOKEN: ${{ secrets.BOUNCER_GATE_TOKEN }}
        run: |
          if [ -z "$BOUNCER_GATE_TOKEN" ]; then
            echo "No BOUNCER_GATE_TOKEN in GitHub secrets — skipping wrangler secret put"
            exit 0
          fi
          printf '%s' "$BOUNCER_GATE_TOKEN" | npx wrangler secret put BOUNCER_GATE_TOKEN

      - name: Deploy p31-bouncer
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: 04_SOFTWARE/cloudflare-worker/bouncer
          command: deploy
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-command-center:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_command_center == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.command_center == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - name: Deploy command-center
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: 04_SOFTWARE/cloudflare-worker/command-center
          command: deploy
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-docs:
    needs: paths
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/npm-ci-project
        with:
          working-directory: 04_SOFTWARE/docs
          cache-dependency-path: 04_SOFTWARE/docs/package-lock.json

      - name: Build Starlight
        working-directory: 04_SOFTWARE/docs
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: 04_SOFTWARE/docs
          command: pages deploy dist --project-name=p31-technical-library
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-p31ca:
    needs: paths
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_p31ca == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/npm-ci-project
        with:
          working-directory: 04_SOFTWARE/p31ca
          cache-dependency-path: 04_SOFTWARE/p31ca/package-lock.json

      - name: Verify passport mirror
        env:
          P31_STRICT_PASSPORT: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.p31ca_strict_passport == 'true') && '1' || '0' }}
          P31_WORKSPACE_ROOT: ${{ github.workspace }}
        working-directory: 04_SOFTWARE/p31ca
        run: npm run passport:verify

      - name: Build p31ca.org
        working-directory: 04_SOFTWARE/p31ca
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: 04_SOFTWARE/p31ca
          command: pages deploy dist --project-name=p31ca
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-phosphorus31:
    needs: paths
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_phosphorus31 == 'true'
    runs-on: ubuntu-latest
    env:
      SITE_DIR: phosphorus31.org/planetary-planet
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/npm-ci-project
        with:
          working-directory: ${{ env.SITE_DIR }}
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - name: Build phosphorus31.org
        working-directory: ${{ env.SITE_DIR }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: ${{ env.SITE_DIR }}
          command: pages deploy dist --project-name=phosphorus31-org
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
