# Verify (PR + push) + optional Cloudflare deploys (main / manual)
name: P31 Automation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_bouncer:
        description: Deploy p31-bouncer Worker
        type: boolean
        default: true
      deploy_command_center:
        description: Deploy command-center Worker
        type: boolean
        default: true
      deploy_docs:
        description: Build + deploy Starlight docs to Pages (p31-technical-library)
        type: boolean
        default: false
      deploy_p31ca:
        description: Build + deploy p31ca.org Astro hub to Pages (p31ca)
        type: boolean
        default: false
      deploy_phosphorus31:
        description: Build + deploy phosphorus31.org Astro site to Pages (phosphorus31-org)
        type: boolean
        default: false
      p31ca_strict_passport:
        description: p31ca deploy only — require cognitive-passport in tree (P31_STRICT_PASSPORT)
        type: boolean
        default: false

concurrency:
  group: p31-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: k4-mesh-core unit tests
        run: cd 04_SOFTWARE/packages/k4-mesh-core && node --test test/*.test.mjs

      - name: Install + build Starlight docs
        run: cd 04_SOFTWARE/docs && npm install && npm run build

      - name: Stack link check (optional fleet URLs warn-only — see verify-stack-links.mjs)
        run: node 04_SOFTWARE/scripts/verify-stack-links.mjs

  paths:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      bouncer: ${{ steps.filter.outputs.bouncer }}
      command_center: ${{ steps.filter.outputs.command_center }}
      docs: ${{ steps.filter.outputs.docs }}
      p31ca: ${{ steps.filter.outputs.p31ca }}
      phosphorus31: ${{ steps.filter.outputs.phosphorus31 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bouncer:
              - '04_SOFTWARE/cloudflare-worker/bouncer/**'
            command_center:
              - '04_SOFTWARE/cloudflare-worker/command-center/**'
            docs:
              - '04_SOFTWARE/docs/**'
            p31ca:
              - '04_SOFTWARE/p31ca/**'
            phosphorus31:
              - 'phosphorus31.org/**'

  deploy-bouncer:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_bouncer == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.bouncer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler (bouncer)
        run: cd 04_SOFTWARE/cloudflare-worker/bouncer && npm install

      - name: Push BOUNCER_GATE_TOKEN from GitHub secret → Cloudflare Workers
        working-directory: 04_SOFTWARE/cloudflare-worker/bouncer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BOUNCER_GATE_TOKEN: ${{ secrets.BOUNCER_GATE_TOKEN }}
        run: |
          if [ -z "$BOUNCER_GATE_TOKEN" ]; then
            echo "No BOUNCER_GATE_TOKEN in GitHub secrets — skipping wrangler secret put"
            exit 0
          fi
          printf '%s' "$BOUNCER_GATE_TOKEN" | npx wrangler secret put BOUNCER_GATE_TOKEN

      - name: Deploy p31-bouncer
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/cloudflare-worker/bouncer
          command: deploy
          wranglerVersion: "4.85.0"

  deploy-command-center:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_command_center == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.command_center == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy command-center
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/cloudflare-worker/command-center
          command: deploy
          wranglerVersion: "4.85.0"

  deploy-docs:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_docs == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Starlight
        run: cd 04_SOFTWARE/docs && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/docs
          command: pages deploy dist --project-name=p31-technical-library
          wranglerVersion: "4.85.0"

  deploy-p31ca:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_p31ca == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.p31ca == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install p31ca
        run: cd 04_SOFTWARE/p31ca && npm install

      - name: Verify passport mirror
        env:
          P31_STRICT_PASSPORT: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.p31ca_strict_passport == 'true') && '1' || '0' }}
          P31_WORKSPACE_ROOT: ${{ github.workspace }}
        run: cd 04_SOFTWARE/p31ca && npm run passport:verify

      - name: Build p31ca.org
        run: cd 04_SOFTWARE/p31ca && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/p31ca
          command: pages deploy dist --project-name=p31ca
          wranglerVersion: "4.85.0"

  deploy-phosphorus31:
    needs: paths
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_phosphorus31 == 'true') ||
      (github.event_name == 'push' && needs.paths.outputs.phosphorus31 == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: phosphorus31.org/planetary-planet/package-lock.json

      - name: Build phosphorus31.org
        run: cd phosphorus31.org/planetary-planet && npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: phosphorus31.org/planetary-planet
          command: pages deploy dist --project-name=phosphorus31-org
          wranglerVersion: "4.85.0"
