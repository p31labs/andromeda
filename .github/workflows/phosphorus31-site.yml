# phosphorus31.org (planetary-planet) — build on every PR; deploy Pages on main only.
# Parallel to 04_SOFTWARE/p31ca (separate team/path); same secrets + Wrangler 4.x.

name: Phosphorus31 site

on:
  push:
    branches: [main, 'feat/**']
    paths:
      - 'phosphorus31.org/**'
      - '.github/workflows/phosphorus31-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'phosphorus31.org/**'
      - '.github/workflows/phosphorus31-site.yml'

concurrency:
  group: phosphorus31-site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  SITE_DIR: phosphorus31.org/planetary-planet

jobs:
  build:
    name: Build Astro (phosphorus31.org)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - name: Install
        run: cd ${{ env.SITE_DIR }} && npm ci

      - name: Build
        run: cd ${{ env.SITE_DIR }} && npm run build

      - name: Upload dist (optional preview artifact)
        uses: actions/upload-artifact@v4
        with:
          name: phosphorus31-org-dist
          path: ${{ env.SITE_DIR }}/dist
          retention-days: 14
          if-no-files-found: error

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ env.SITE_DIR }}
          command: pages deploy dist --project-name=phosphorus31-org
          wranglerVersion: '4.85.0'
