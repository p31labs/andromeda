# Config + bundle validation for 04_SOFTWARE/p31-google-bridge (no Cloudflare auth required)
name: p31-google-bridge

on:
  push:
    branches: [main, develop]
    paths:
      - "04_SOFTWARE/p31-google-bridge/**"
      - ".github/actions/**"
      - ".github/workflows/p31-google-bridge.yml"
  pull_request:
    paths:
      - "04_SOFTWARE/p31-google-bridge/**"
      - ".github/actions/**"
      - ".github/workflows/p31-google-bridge.yml"

concurrency:
  group: p31-google-bridge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/npm-ci-project
        with:
          working-directory: 04_SOFTWARE/p31-google-bridge
          cache-dependency-path: 04_SOFTWARE/p31-google-bridge/package-lock.json

      - name: Verify (print redirect + preflight + wrangler dry-run)
        working-directory: 04_SOFTWARE/p31-google-bridge
        run: node scripts/verify.mjs
