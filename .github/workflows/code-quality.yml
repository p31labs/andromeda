# Emits status check **code-quality / code-quality** for branch protection rulesets.
name: code-quality

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/pnpm-andromeda-full

      # Real ESLint (flat config) per package; warnings are non-fatal, errors fail the job.
      # pnpm --filter (not `turbo run lint`) — nested 04_SOFTWARE workspace + turbo graph can
      # error with "Could not find task `lint` in project" on some package roots.
      - name: Lint (bonding + shared)
        run: cd 04_SOFTWARE && pnpm --filter @p31/bonding --filter @p31/shared run lint

      - name: Security audit (high+)
        run: pnpm audit --audit-level=high
