name: Coverage Report

on:
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Nested 04_SOFTWARE lockfile in sync
        run: pnpm install --frozen-lockfile --dir 04_SOFTWARE

      - name: Generate coverage for shared
        run: pnpm --filter @p31/shared test --run --coverage

      - name: Generate coverage for game-engine
        run: pnpm --filter @p31/game-engine test --run --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/shared/coverage
            packages/game-engine/coverage
          retention-days: 7
