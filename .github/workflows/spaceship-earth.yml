name: spaceship-earth

on:
  push:
    branches: [main]
    paths:
      - "04_SOFTWARE/spaceship-earth/**"
      - ".github/actions/**"
      - ".github/workflows/spaceship-earth.yml"
  workflow_dispatch:

env:
  WRANGLER_VERSION: "4.85.0"

concurrency:
  group: spaceship-earth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/pnpm-04-software

      - name: Build
        working-directory: 04_SOFTWARE
        run: pnpm --filter @p31/spaceship-earth run build

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/spaceship-earth
          command: pages deploy dist --project-name=spaceship-earth --branch=main
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
