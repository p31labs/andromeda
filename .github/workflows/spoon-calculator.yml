name: spoon-calculator

on:
  push:
    branches: [main]
    paths:
      - '04_SOFTWARE/spoon-calculator/**'
      - '.github/workflows/spoon-calculator.yml'
  workflow_dispatch:

concurrency:
  group: spoon-calculator-${{ github.ref }}
  cancel-in-progress: true

env:
  WRANGLER_VERSION: "4.85.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 04_SOFTWARE/spoon-calculator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 04_SOFTWARE/spoon-calculator/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/spoon-calculator
          command: pages deploy dist --project-name=spoon-calculator --branch=main
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
