# Canonical CI: lockfile + deploy guard + MAP + turbo build/test (entire 04_SOFTWARE graph).
name: Monorepo verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: monorepo-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/pnpm-andromeda-full

      - name: Deploy target guard (Pages)
        run: node scripts/enterprise-deploy-guard.mjs

      - name: MAP monetary surface (static)
        run: node scripts/verify-monetary-surface.mjs

      - name: Build (Turbo)
        run: pnpm run build

      - name: Test (Turbo)
        run: pnpm run test
