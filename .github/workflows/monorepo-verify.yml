# Canonical CI: full monorepo gate — implementation in reusable-monorepo-verify.yml
name: Monorepo verify

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: monorepo-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/reusable-monorepo-verify.yml
