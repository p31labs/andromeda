# CWP-P31-MAP-2026-01 (D-MAP-14) — tests + static surface checks, no live Stripe
name: donate-api (MAP pipeline)

on:
  push:
    branches: [main, develop]
    paths:
      - "04_SOFTWARE/donate-api/**"
      - "phosphorus31.org/planetary-planet/src/pages/donate.astro"
      - "scripts/verify-monetary-surface.mjs"
      - ".github/workflows/donate-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "04_SOFTWARE/donate-api/**"
      - "phosphorus31.org/planetary-planet/src/pages/donate.astro"
      - "scripts/verify-monetary-surface.mjs"
      - ".github/workflows/donate-api.yml"

concurrency:
  group: donate-api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 04_SOFTWARE/donate-api/package-lock.json

      - name: Install (donate-api)
        working-directory: 04_SOFTWARE/donate-api
        run: npm ci

      - name: Test (vitest)
        working-directory: 04_SOFTWARE/donate-api
        run: npm test

      - name: MAP static verify (from repo root)
        run: node scripts/verify-monetary-surface.mjs
