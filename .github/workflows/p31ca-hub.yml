# Regenerate *-about.html from registry, verify hub graph, Astro build — on p31ca changes only.
# Deploy spine vs bonding-soup manual Pages workflow vs local deploy:p31ca — bonding-soup docs/P31-DEPLOY-CANON.md
name: p31ca Hub

on:
  pull_request:
    branches: [main]
    paths:
      - "04_SOFTWARE/p31ca/**"
      - ".github/actions/**"
      - ".github/workflows/p31ca-hub.yml"
  push:
    branches: [main]
    paths:
      - "04_SOFTWARE/p31ca/**"
      - ".github/actions/**"
      - ".github/workflows/p31ca-hub.yml"

concurrency:
  group: p31ca-hub-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04_SOFTWARE/p31ca
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/npm-ci-project
        with:
          working-directory: 04_SOFTWARE/p31ca
          cache-dependency-path: 04_SOFTWARE/p31ca/package-lock.json
          install-mode: ci-prefer-offline

      - name: Hub CI (generate about pages + hub JSON + verify + Astro build)
        run: npm run hub:ci

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: 04_SOFTWARE/p31ca
          command: pages deploy dist --project-name=p31ca --branch=main
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
