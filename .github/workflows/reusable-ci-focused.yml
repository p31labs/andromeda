# Callable: filtered turbo + compliance checks.
name: Reusable CI (focused turbo)

on:
  workflow_call:

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/pnpm-andromeda-full

      # Bonding + shared: eslint (flat config). Warnings do not fail; errors fail the step.
      - name: ESLint (bonding + shared)
        run: cd 04_SOFTWARE && pnpm --filter @p31/bonding --filter @p31/shared run lint

      - name: Security audit (high+)
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Type check (core packages)
        run: cd 04_SOFTWARE && pnpm turbo run typecheck --filter=@p31/shared --filter=@p31/bonding --filter=@p31/spaceship-earth --filter=@p31/node-zero

      - name: Build packages
        run: cd 04_SOFTWARE && pnpm turbo run build --filter=@p31/shared --filter=@p31/bonding --filter=@p31/node-zero

      - name: Run tests
        run: cd 04_SOFTWARE && pnpm turbo run test --filter=@p31/bonding --filter=@p31/node-zero

      - name: Turborepo remote cache
        if: ${{ env.TURBO_TOKEN != '' }}
        run: cd 04_SOFTWARE && pnpm turbo run build --filter=@p31/bonding --filter=@p31/node-zero --remote

      - name: WCD documentation check
        run: |
          test -d "WCDs" || exit 1
          ls WCDs/*.md | wc -l | xargs -I{} sh -c 'test {} -ge 10 || exit 1'

      - name: ADA compliance check
        run: grep -r "aria-" 04_SOFTWARE/bonding/src/ || exit 1

      - name: Spoon Economy safety check
        run: |
          grep -r "spoon" 04_SOFTWARE/packages/ --include="*.ts" -l | wc -l | xargs -I{} sh -c 'test {} -ge 1 || exit 1'
