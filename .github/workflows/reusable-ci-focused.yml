# Callable: filtered turbo + compliance checks.
name: Reusable CI (focused turbo)

on:
  workflow_call:

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

       - uses: ./.github/actions/pnpm-andromeda-full

       - name: Lockfile consistency check
         if: env.LOCKFILE_FROZEN_SUCCESS == 'true' || env.LOCKFILE_FROZEN_SUCCESS_04 == 'true'
         run: |
           if [[ -n $(git status --porcelain pnpm-lock.yaml 04_SOFTWARE/pnpm-lock.yaml) ]]; then
             echo "ERROR: Lockfile(s) are out of sync despite frozen install succeeding. This indicates a CI environment issue."
             git status --porcelain pnpm-lock.yaml 04_SOFTWARE/pnpm-lock.yaml
             exit 1
           fi

       - uses: ./.github/actions/eslint-bonding-shared

      - name: Security audit (high+, informational)
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - uses: ./.github/actions/turbo-core-slice

      - name: WCD documentation check
        run: |
          test -d "WCDs" || exit 1
          ls WCDs/*.md | wc -l | xargs -I{} sh -c 'test {} -ge 10 || exit 1'

      - name: ADA compliance check
        run: grep -r "aria-" 04_SOFTWARE/bonding/src/ || exit 1

      - name: Spoon Economy safety check
        run: |
          grep -r "spoon" 04_SOFTWARE/packages/ --include="*.ts" -l | wc -l | xargs -I{} sh -c 'test {} -ge 1 || exit 1'
