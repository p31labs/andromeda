# One-click check that GitHub Actions secrets match a working Cloudflare token.
# Use after rotating CLOUDFLARE_API_TOKEN or changing account.

name: Cloudflare secrets smoke

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-secrets-smoke
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify CLOUDFLARE_API_TOKEN (+ optional account)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/verify-cloudflare-token.mjs
