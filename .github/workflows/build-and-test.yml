# Emits status check **build-and-test / build-and-test** for branch protection rulesets.
name: build-and-test

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

concurrency:
  group: build-and-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/pnpm-andromeda-full

      - uses: ./.github/actions/turbo-core-slice
