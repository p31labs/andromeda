name: Reusable coverage

on:
  workflow_call:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/pnpm-andromeda-full

      - name: Generate coverage for shared
        working-directory: 04_SOFTWARE
        run: pnpm --filter @p31/shared test --run --coverage

      - name: Generate coverage for game-engine
        working-directory: 04_SOFTWARE
        run: pnpm --filter @p31/game-engine test --run --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            04_SOFTWARE/packages/shared/coverage
            04_SOFTWARE/packages/game-engine/coverage
          retention-days: 7
