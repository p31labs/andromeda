name: p31-vault

on:
  push:
    branches: [main]
    paths:
      - '04_SOFTWARE/cloudflare-pages/p31-vault/**'
      - '.github/workflows/p31-vault.yml'
  workflow_dispatch:

concurrency:
  group: p31-vault-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy 04_SOFTWARE/cloudflare-pages/p31-vault --project-name=p31-vault --branch=main --commit-dirty=true
          wranglerVersion: '4.85.0'
