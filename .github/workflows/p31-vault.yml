name: p31-vault

on:
  push:
    branches: [main]
    paths:
      - "04_SOFTWARE/cloudflare-pages/p31-vault/**"
      - ".github/actions/**"
      - ".github/workflows/p31-vault.yml"
  workflow_dispatch:

concurrency:
  group: p31-vault-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - name: Deploy to Cloudflare Pages
        uses: ./.github/actions/wrangler-run
        with:
          working-directory: "."
          command: pages deploy 04_SOFTWARE/cloudflare-pages/p31-vault --project-name=p31-vault --branch=main --commit-dirty=true
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
