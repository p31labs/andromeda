# Callable: full monorepo gate (lockfiles, guards, MAP, turbo build/test). Scale by reusing from any workflow.
name: _ Reusable monorepo verify

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/toolchain-constants

      - uses: ./.github/actions/pnpm-andromeda-full

      - name: Deploy target guard (Pages)
        run: node scripts/enterprise-deploy-guard.mjs

      - name: MAP monetary surface (static)
        run: node scripts/verify-monetary-surface.mjs

      - name: Build (Turbo)
        run: pnpm run build

      - name: Test (Turbo)
        run: pnpm run test
