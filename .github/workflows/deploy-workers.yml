name: Deploy K4 Workers

on:
  push:
    branches:
      - workers-april22
      - main
    paths:
      - '04_SOFTWARE/k4-cage/**'
      - '04_SOFTWARE/k4-personal/**'
      - '04_SOFTWARE/k4-hubs/**'
      - '04_SOFTWARE/p31-agent-hub/**'
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy workers in dependency order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. k4-cage (no deps, KV-only fallback) ─────────────────────
      - name: Deploy k4-cage
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/k4-cage

      # ── 2. k4-personal (no deps) ────────────────────────────────────
      - name: Deploy k4-personal
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/k4-personal

      # ── 3. k4-hubs (binds to k4-cage + k4-personal) ─────────────────
      - name: Deploy k4-hubs
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/k4-hubs

      # ── 4. p31-agent-hub (binds to all three above) ─────────────────
      - name: Deploy p31-agent-hub
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 04_SOFTWARE/p31-agent-hub

      # ── 5. Post-deploy verification ──────────────────────────────────
      - name: Wait for propagation
        run: sleep 8

      - name: Health checks
        run: |
          fail=0
          check() {
            local name=$1 url=$2
            code=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo 000)
            if [[ "$code" == "200" ]]; then
              echo "✅ $name"
            else
              echo "❌ $name ($code) — $url"
              fail=1
            fi
          }
          check k4-cage     https://k4-cage.trimtab-signal.workers.dev/health
          check k4-personal https://k4-personal.trimtab-signal.workers.dev/health
          check k4-hubs     https://k4-hubs.trimtab-signal.workers.dev/health
          check p31-agent-hub https://p31-agent-hub.trimtab-signal.workers.dev/health
          exit $fail

      - name: Verify K4 mesh topology
        run: |
          MESH=$(curl -sf --max-time 10 https://k4-cage.trimtab-signal.workers.dev/api/mesh)
          echo "$MESH"
          python3 - <<'PY'
          import json, sys
          d = json.loads("""$MESH""")
          assert d.get('topology') == 'K4', f"Expected K4, got {d.get('topology')}"
          assert len(d.get('vertices', [])) == 4, f"Expected 4 vertices, got {len(d.get('vertices', []))}"
          assert len(d.get('edges', [])) == 6,   f"Expected 6 edges, got {len(d.get('edges', []))}"
          print("✅ K4 mesh: 4 vertices, 6 edges, topology verified")
          PY
        env:
          MESH: ${{ env.MESH }}

      - name: Verify ping (will → sj)
        run: |
          RESULT=$(curl -sf -X POST --max-time 10 https://k4-cage.trimtab-signal.workers.dev/api/ping/will/sj)
          echo "$RESULT"
          echo "$RESULT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d.get('ok') == True, f'Ping failed: {d}'
          print(f'✅ Ping ok — love: {d.get(\"love\")}')"
