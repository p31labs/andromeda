# Emits status check **compliance-check / compliance-check** for branch protection rulesets.
# Shell-only (no pnpm): same invariants as reusable-ci-focused compliance steps.
name: compliance-check

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

concurrency:
  group: compliance-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: WCD documentation check
        run: |
          test -d "WCDs" || exit 1
          ls WCDs/*.md | wc -l | xargs -I{} sh -c 'test {} -ge 10 || exit 1'

      - name: ADA compliance check
        run: grep -r "aria-" 04_SOFTWARE/bonding/src/ || exit 1

      - name: Spoon Economy safety check
        run: |
          grep -r "spoon" 04_SOFTWARE/packages/ --include="*.ts" -l | wc -l | xargs -I{} sh -c 'test {} -ge 1 || exit 1'
