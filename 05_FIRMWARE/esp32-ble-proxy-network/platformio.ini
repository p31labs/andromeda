; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Use NimBLE-Arduino library for minimal power consumption
lib_deps = 
    h2zero/NimBLE-Arduino@^1.5.0

; Optimize for size and power efficiency
build_flags = 
    -Os
    -DNDEBUG
    -DCORE_DEBUG_LEVEL=0

; Set upload speed for faster flashing
upload_speed = 921600

; Monitor speed for debugging
monitor_speed = 115200

; Board-specific settings
board_build.partitions = min_spiffs.csv

[env:esp32dev-dad-zone]
extends = env:esp32dev
build_flags = ${env.esp32dev.build_flags} -D ZONE_ID=1
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

[env:esp32dev-bash-zone]
extends = env:esp32dev
build_flags = ${env.esp32dev.build_flags} -D ZONE_ID=2
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

[env:esp32dev-kitchen-zone]
extends = env:esp32dev
build_flags = ${env.esp32dev.build_flags} -D ZONE_ID=3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L