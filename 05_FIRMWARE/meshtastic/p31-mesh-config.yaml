# P31 Family Mesh — Meshtastic Configuration
# EXEC-08 / Gap A — Decision: Meshtastic Phase 1, RNS Phase 2
#
# Apply via Meshtastic Python CLI:
#   pip install meshtastic
#   meshtastic --port /dev/ttyUSB0 --seturl <url-from-below> --ch-set-url
#   or: meshtastic --host <node-ip> --configure p31-mesh-config.yaml
#
# Node Zero (ESP32-S3 + SX1262): run this config on that node.
# iPhone: join via "Add by QR" in Meshtastic iOS app.

# ── Radio settings ────────────────────────────────────────────────────────
lora:
  region: US            # 902-928 MHz (FCC Part 97 / 15)
  modem_preset: LONG_FAST  # Good balance: ~5.5 km range, ~1.3 kbps
  # LONG_FAST: SF11/BW250/CR4-5 — adequate for Camden County terrain
  # Use LONG_SLOW (SF12) if coverage issues after testing
  hop_limit: 3          # Max 3 hops — family mesh is small
  tx_power: 22          # dBm (SX1262 max — verify antenna match before TX)
  bandwidth: 250
  spread_factor: 11
  coding_rate: 5

# ── Device role ───────────────────────────────────────────────────────────
device:
  role: CLIENT          # NODE_ZERO: CLIENT_MUTED after Android pairing (no BT ads)
  serial_enabled: false
  debug_log_enabled: false

# ── Channels ──────────────────────────────────────────────────────────────
# Channel 0: Primary (P31 mesh) — PSK encrypted, family only
# Channel 1: Emergency — unencrypted, for bootstrap when keys lost
channels:
  - index: 0
    settings:
      name: "P31_FAMILY"
      psk: "I7DwzJJpQhzyUZ2Cw6P9rGkfzIOsdYBxX/KC2lndmO4="  # Generate: python3 -c "import os,base64; print(base64.b64encode(os.urandom(32)).decode())"
      module_settings:
        position_precision: 0   # No location sharing (privacy)
    role: PRIMARY

  - index: 1
    settings:
      name: "P31_EMERGENCY"
      psk: ""            # Unencrypted — bootstrap only, never for sensitive content
      module_settings:
        position_precision: 0
    role: SECONDARY

# ── Network ──────────────────────────────────────────────────────────────
network:
  wifi_enabled: true
  wifi_ssid: "REPLACE_with_home_ssid"
  wifi_psk: "REPLACE_with_wifi_password"
  # MQTT bridge: Meshtastic → home.p31ca.org MQTT broker
  mqtt:
    enabled: true
    address: "home.p31ca.org"
    port: 1883
    username: "meshtastic"
    password: "REPLACE_with_mqtt_password"
    root: "msh/US"
    encryption_enabled: true   # TLS to broker

# ── Power (Node Zero always-on) ───────────────────────────────────────────
power:
  is_power_saving: false
  on_battery_shutdown_after_secs: 0   # Never shutdown (mains powered)
  ls_secs: 0                          # No light sleep

# ── Telemetry ─────────────────────────────────────────────────────────────
telemetry:
  device_update_interval: 900    # Report battery/CPU every 15 min
  environment_update_interval: 0 # No environment sensor
  air_quality_interval: 0
  power_update_interval: 0

# ── Position (disabled for privacy) ──────────────────────────────────────
position:
  gps_enabled: false
  position_broadcast_smart_disabled: true

# ── Node identity ─────────────────────────────────────────────────────────
# Set separately via:  meshtastic --set-owner "Node Zero" --set-owner-short "N0"
# Will's iPhone:      "Will" / "W"
# S.J.'s tablet:      "Bash" / "B"
# W.J.'s tablet:      "Willow" / "W2"
