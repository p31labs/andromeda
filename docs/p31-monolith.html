                    <p class="text-slate-500 text-sm">Questions? will@p31ca.org</p>
                    <p class="text-purple-400 mt-2">💜🔺💜</p>
                </div>
            </div>
        </section>

    </main>

    <script>
        // BELIEF ARTIFACTS DATA
        const beliefs = [
            { icon: "🌡️", title: "Broken Thermostat", text: "My calcium 'thermostat' is broken. Like a house furnace that never kicks on in winter." },
            { icon: "🔋", title: "Brain Battery", text: "Posner molecules are quantum batteries. Low calcium = uncharged batteries = brain fog." },
            { icon: "☀️", title: "Solar Power", text: "Decentralized systems like solar panels instead of one big power plant." },
            { icon: "🔺", title: "Tetrahedron", text: "The strongest shape in the universe. K4 complete graph. 4 nodes, 6 edges." },
            { icon: "🚗", title: "Wye → Delta", text: "Traffic jam (Wye) vs. multiple highways (Delta). Direct routes." },
            { icon: "🎮", text: "Video game progress for real-life accomplishments. Earn LOVE for helping." },
            { icon: "🧪", text: "BONDING game teaches real chemistry. Build real molecules." },
            { icon: "🌊", text: "Ripple effect. One solution creates waves of change." }
        ];

        let currentBelief = 0;

        function renderBeliefs() {
            const grid = document.getElementById('beliefs-grid');
            grid.innerHTML = beliefs.map((b, i) => `
                <div onclick="openFocus(${i})" class="bg-p31-panel hover:bg-purple-900/30 rounded-lg p-4 cursor-pointer border border-slate-700 hover:border-purple-500 transition-colors text-center">
                    <div class="text-3xl mb-2">${b.icon}</div>
                    <div class="font-bold text-white text-sm">${b.title || 'Concept'}</div>
                </div>
            `).join('');
        }

        function openFocus(index) {
            currentBelief = index;
            updateFocus();
            document.getElementById('focus-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeFocus() {
            document.getElementById('focus-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function updateFocus() {
            const b = beliefs[currentBelief];
            document.getElementById('focus-content').innerHTML = `
                <div class="text-center">
                    <div class="text-6xl mb-4">${b.icon}</div>
                    <h3 class="text-2xl font-bold text-white mb-4">${b.title || 'Concept'}</h3>
                    <p class="text-lg text-slate-300 italic">"${b.text}"</p>
                    <p class="text-xs text-slate-500 mt-4">${currentBelief + 1} of ${beliefs.length}</p>
                </div>
            `;
        }

        function nextBelief() {
            currentBelief = (currentBelief + 1) % beliefs.length;
            updateFocus();
        }

        function prevBelief() {
            currentBelief = (currentBelief - 1 + beliefs.length) % beliefs.length;
            updateFocus();
        }

        // SLIDE NAVIGATION
        function showSlide(id) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide-' + id).classList.add('active');
        }

        // KEYBOARD NAV
        document.addEventListener('keydown', (e) => {
            const slides = ['home', 'mission', 'quantum', 'products', 'beliefs', 'hiring', 'ops'];
            const current = slides.findIndex(s => document.getElementById('slide-' + s).classList.contains('active'));
            
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                showSlide(slides[(current + 1) % slides.length]);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                showSlide(slides[(current - 1 + slides.length) % slides.length]);
            } else if (e.key === 'Escape') {
                closeFocus();
            }
        });

        renderBeliefs();
    </script>
</body>
</html>
