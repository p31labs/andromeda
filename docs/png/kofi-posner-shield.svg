<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0f172a"/>
  
  <!-- Outer hexagonal ring (6 phosphates) -->
  <polygon points="200,80 320,140 320,260 200,320 80,260 80,140" 
           fill="none" stroke="#9c27b0" stroke-width="2"/>
  
  <!-- Inner circle (quantum core) -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="200" cy="200" r="20" fill="#22c55e" opacity="0.8"/>
  
  <!-- Calcium atoms (at vertices) -->
  <circle cx="200" cy="80" r="10" fill="#9c27b0"/>
  <circle cx="320" cy="140" r="10" fill="#9c27b0"/>
  <circle cx="320" cy="260" r="10" fill="#9c27b0"/>
  <circle cx="200" cy="320" r="10" fill="#9c27b0"/>
  <circle cx="80" cy="260" r="10" fill="#9c27b0"/>
  <circle cx="80" cy="140" r="10" fill="#9c27b0"/>
  
  <!-- Phosphate labels -->
  <text x="200" y="75" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  <text x="335" y="145" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  <text x="335" y="265" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  <text x="200" y="335" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  <text x="65" y="265" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  <text x="65" y="145" fill="#f472b6" font-size="12" font-family="monospace" text-anchor="middle">PO₄</text>
  
  <!-- Calcium bonds -->
  <line x1="200" y1="90" x2="200" y2="150" stroke="#475569" stroke-width="1"/>
  <line x1="310" y1="150" x2="260" y2="180" stroke="#475569" stroke-width="1"/>
  <line x1="310" y1="250" x2="260" y2="220" stroke="#475569" stroke-width="1"/>
  <line x1="200" y1="310" x2="200" y2="250" stroke="#475569" stroke-width="1"/>
  <line x1="90" y1="250" x2="140" y2="220" stroke="#475569" stroke-width="1"/>
  <line x1="90" y1="150" x2="140" y2="180" stroke="#475569" stroke-width="1"/>
  
  <!-- P31 nucleus -->
  <text x="200" y="205" fill="#0f172a" font-size="14" font-family="monospace" font-weight="bold" text-anchor="middle">P31</text>
  
  <!-- Text -->
  <text x="200" y="365" fill="#9c27b0" font-size="14" font-family="monospace" text-anchor="middle" letter-spacing="1">THE POSNER SHIELD</text>
  <text x="200" y="382" fill="#22c55e" font-size="9" font-family="monospace" text-anchor="middle">Ca₉(PO₄)₆</text>
</svg>