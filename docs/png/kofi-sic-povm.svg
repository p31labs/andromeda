<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0f172a"/>
  
  <!-- Quantum sphere -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#334155" stroke-width="2"/>
  
  <!-- SIC-POVM tetrahedron -->
  <path d="M 200 200 L 200 60" fill="none" stroke="#eab308" stroke-width="3"/>
  <path d="M 200 200 L 90 290" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <path d="M 200 200 L 310 290" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <path d="M 90 290 L 310 290" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- State vector -->
  <line x1="200" y1="200" x2="200" y2="120" stroke="#eab308" stroke-width="4" stroke-dasharray="6 3"/>
  
  <!-- Nodes -->
  <circle cx="200" cy="200" r="10" fill="#eab308"/>
  <circle cx="200" cy="60" r="8" fill="#eab308"/>
  <circle cx="90" cy="290" r="8" fill="#3b82f6"/>
  <circle cx="310" cy="290" r="8" fill="#3b82f6"/>
  
  <!-- Overlap visualization -->
  <circle cx="155" cy="245" r="25" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <circle cx="245" cy="245" r="25" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  
  <!-- Text -->
  <text x="200" y="340" fill="#94a3b8" font-size="14" font-family="monospace" text-anchor="middle" letter-spacing="2">SIC-POVM</text>
  <text x="200" y="360" fill="#3b82f6" font-size="10" font-family="monospace" text-anchor="middle">SYMMETRIC QUANTUM MEASUREMENT</text>
</svg>