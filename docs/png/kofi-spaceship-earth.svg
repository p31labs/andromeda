<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0f172a"/>
  
  <!-- Geodesic dome wireframe -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- Tetrahedron structure -->
  <path d="M 200 80 L 120 250 L 280 250 Z" fill="none" stroke="#06b6d4" stroke-width="3"/>
  <path d="M 200 80 L 200 210 L 120 250" fill="none" stroke="#06b6d4" stroke-width="3"/>
  <path d="M 200 210 L 280 250" fill="none" stroke="#06b6d4" stroke-width="3"/>
  
  <!-- Nodes -->
  <circle cx="200" cy="80" r="6" fill="#06b6d4"/>
  <circle cx="120" cy="250" r="6" fill="#06b6d4"/>
  <circle cx="280" cy="250" r="6" fill="#06b6d4"/>
  <circle cx="200" cy="210" r="6" fill="#06b6d4"/>
  
  <!-- Center pulse -->
  <circle cx="200" cy="180" r="20" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="20;30;20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Text -->
  <text x="200" y="320" fill="#94a3b8" font-size="14" font-family="monospace" text-anchor="middle" letter-spacing="2">SPACESHIP EARTH</text>
  <text x="200" y="340" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">GEODESIC DASHBOARD V1.0</text>
</svg>