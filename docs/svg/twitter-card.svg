<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="tcbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#264653"/>
      <stop offset="100%" stop-color="#1a3340"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#tcbg)"/>
  
  <!-- Background tetrahedra pattern -->
  <g stroke="#2A9D8F" stroke-width="1" fill="none" opacity="0.06">
    <polygon points="600,50 200,550 1000,550"/>
    <polygon points="400,100 100,500 700,500"/>
    <polygon points="800,80 500,520 1100,520"/>
  </g>
  
  <!-- Central content -->
  <text x="600" y="240" font-family="'Trebuchet MS', sans-serif" font-size="100" fill="#F0EEE9" font-weight="700" text-anchor="middle" letter-spacing="8">P31 LABS</text>
  
  <line x1="400" y1="280" x2="800" y2="280" stroke="#E76F51" stroke-width="3" opacity="0.6"/>
  
  <text x="600" y="340" font-family="'Georgia', serif" font-size="28" fill="#C9B1FF" text-anchor="middle" letter-spacing="2">Open-Source Assistive Technology</text>
  <text x="600" y="385" font-family="'Georgia', serif" font-size="22" fill="#F0EEE9" text-anchor="middle" opacity="0.5">for Neurodivergent Minds</text>
  
  <text x="600" y="460" font-family="'Courier New', monospace" font-size="16" fill="#2A9D8F" text-anchor="middle" opacity="0.5" letter-spacing="3">Georgia 501(c)(3) · phosphorus31.org</text>
  
  <!-- Molecule notation -->
  <text x="600" y="510" font-family="'Courier New', monospace" font-size="14" fill="#E76F51" text-anchor="middle" opacity="0.4" letter-spacing="4">Ca₉(PO₄)₆ · ³¹P · 172.35 Hz</text>
  
  <rect x="0" y="669" width="1200" height="6" fill="#E76F51" opacity="0.8"/>
