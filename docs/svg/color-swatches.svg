<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#FAFAFA"/>
  
  <text x="40" y="50" font-family="sans-serif" font-size="24" fill="#264653" font-weight="700">P31 Labs — Warm Tech Humanity Palette</text>
  <text x="40" y="75" font-family="monospace" font-size="12" fill="#999">Wye Topology (phosphorus31.org) + Delta Topology (p31ca.org)</text>
  
  <!-- Swatches -->
  <g transform="translate(40, 100)">
    <!-- Warm Teal -->
    <rect x="0" y="0" width="160" height="160" rx="8" fill="#2A9D8F"/>
    <text x="10" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Warm Teal</text>
    <text x="10" y="202" font-family="monospace" font-size="11" fill="#999">#2A9D8F</text>
    <text x="10" y="218" font-family="monospace" font-size="10" fill="#BBB">Primary · Trust</text>
    
    <!-- Soft Coral -->
    <rect x="180" y="0" width="160" height="160" rx="8" fill="#E76F51"/>
    <text x="190" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Soft Coral</text>
    <text x="190" y="202" font-family="monospace" font-size="11" fill="#999">#E76F51</text>
    <text x="190" y="218" font-family="monospace" font-size="10" fill="#BBB">Secondary · Energy</text>
    
    <!-- Butter Yellow -->
    <rect x="360" y="0" width="160" height="160" rx="8" fill="#E9C46A"/>
    <text x="370" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Butter Yellow</text>
    <text x="370" y="202" font-family="monospace" font-size="11" fill="#999">#E9C46A</text>
    <text x="370" y="218" font-family="monospace" font-size="10" fill="#BBB">Accent · Optimism</text>
    
    <!-- Soft Lavender -->
    <rect x="540" y="0" width="160" height="160" rx="8" fill="#C9B1FF"/>
    <text x="550" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Soft Lavender</text>
    <text x="550" y="202" font-family="monospace" font-size="11" fill="#999">#C9B1FF</text>
    <text x="550" y="218" font-family="monospace" font-size="10" fill="#BBB">Highlight · ND</text>
    
    <!-- Espresso Teal -->
    <rect x="720" y="0" width="160" height="160" rx="8" fill="#264653"/>
    <text x="730" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Espresso Teal</text>
    <text x="730" y="202" font-family="monospace" font-size="11" fill="#999">#264653</text>
    <text x="730" y="218" font-family="monospace" font-size="10" fill="#BBB">Text · Dark</text>
    
    <!-- Warm Cloud -->
    <rect x="900" y="0" width="160" height="160" rx="8" fill="#F0EEE9" stroke="#E0E0E0" stroke-width="1"/>
    <text x="910" y="185" font-family="sans-serif" font-size="13" fill="#264653" font-weight="600">Warm Cloud</text>
    <text x="910" y="202" font-family="monospace" font-size="11" fill="#999">#F0EEE9</text>
    <text x="910" y="218" font-family="monospace" font-size="10" fill="#BBB">Background</text>
  </g>
  
  <!-- Delta palette row -->
  <text x="40" y="345" font-family="monospace" font-size="11" fill="#999">Delta Topology: </text>
  <rect x="180" y="330" width="50" height="30" rx="4" fill="#020617"/>
  <text x="240" y="350" font-family="monospace" font-size="10" fill="#999">#020617 Void</text>
  <rect x="350" y="330" width="50" height="30" rx="4" fill="#FFB000"/>
  <text x="410" y="350" font-family="monospace" font-size="10" fill="#999">#FFB000 Amber</text>
  <rect x="530" y="330" width="50" height="30" rx="4" fill="#C9B1FF"/>
  <text x="590" y="350" font-family="monospace" font-size="10" fill="#999">#C9B1FF Phosphor</text>
  
  <text x="40" y="385" font-family="monospace" font-size="10" fill="#BBB">Larmor: 172.35 Hz · Ca₉(PO₄)₆ · 💜🔺💜</text>
</svg>
