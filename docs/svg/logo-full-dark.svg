<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="100%" stop-color="#264653"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  
  <!-- Mini tetrahedron mark -->
  <g transform="translate(20,10) scale(0.45)" stroke-width="3.5" fill="none" filter="url(#gl)">
    <line x1="200" y1="60" x2="200" y2="220" stroke="#2A9D8F" opacity="0.4"/>
    <line x1="80" y1="320" x2="200" y2="220" stroke="#2A9D8F" opacity="0.4"/>
    <line x1="320" y1="320" x2="200" y2="220" stroke="#2A9D8F" opacity="0.4"/>
    <line x1="200" y1="60" x2="80" y2="320" stroke="url(#tg)" stroke-width="4"/>
    <line x1="200" y1="60" x2="320" y2="320" stroke="url(#tg)" stroke-width="4"/>
    <line x1="80" y1="320" x2="320" y2="320" stroke="url(#tg)" stroke-width="4"/>
    <circle cx="200" cy="60" r="9" fill="#2A9D8F"/>
    <circle cx="80" cy="320" r="9" fill="#2A9D8F"/>
    <circle cx="320" cy="320" r="9" fill="#2A9D8F"/>
    <circle cx="200" cy="220" r="7" fill="#2A9D8F" opacity="0.5"/>
    <circle cx="200" cy="200" r="36" fill="none" stroke="#E76F51" stroke-width="3" opacity="0.8"/>
    <text x="184" y="192" font-family="monospace" font-size="14" fill="#E76F51" font-weight="bold">31</text>
    <text x="189" y="214" font-family="serif" font-size="28" fill="#E76F51" font-weight="bold">P</text>
  </g>
  
  <!-- Wordmark -->
  <text x="220" y="95" font-family="'Trebuchet MS', 'Helvetica Neue', sans-serif" font-size="64" fill="#F0EEE9" font-weight="700" letter-spacing="6">P31</text>
  <text x="220" y="145" font-family="'Trebuchet MS', 'Helvetica Neue', sans-serif" font-size="32" fill="#2A9D8F" font-weight="300" letter-spacing="12">LABS</text>
  
  <!-- Tagline -->
  <text x="220" y="178" font-family="'Georgia', serif" font-size="13" fill="#C9B1FF" font-style="italic" letter-spacing="1.5">Open-Source Assistive Technology</text>
</svg>
