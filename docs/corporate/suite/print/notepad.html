<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>P31 Labs — notepad (ruled)</title>
  <link rel="stylesheet" href="suite-tokens.css" />
  <style>
    h1 { font-size: 12pt; margin: 0 0 0.5em; color: var(--p31-dark); }
    .titleline { display: flex; gap: 0.5em; align-items: baseline; font-size: 10pt; color: var(--p31-gray); }
    .titleline input { flex: 1; border: none; border-bottom: 1px solid var(--p31-med); background: transparent; font: inherit; }
  </style>
</head>
<body class="p31-body p31-ruled">
  <p class="p31-hint no-print">Ruled for handwriting or paste-in notes. DRAFT watermark: add <code>p31-watermark-draft</code> to <code>body</code> next to <code>p31-body</code> to print a diagonal DRAFT overlay.</p>
  <div class="p31-surface">
    <div class="p31-masthead" style="margin-bottom: 0.6em">
      <strong>P31 LABS</strong> <span class="meta">Open Doc Suite &middot; notepad</span>
    </div>
    <h1>Scratch / court prep / LOR outline</h1>
    <div class="titleline">Date: <input type="text" aria-label="date" /> Topic: <input type="text" aria-label="topic" style="flex:2" /></div>
    <p style="margin: 0.5em 0; font-size: 9.5pt; color: var(--p31-coral)">The cage holds the atom — you hold the line.</p>

</html>
